<!-- ─────────────────────────────────────────────────────────────────
M060 R10055 + R10058-R10105 keyboard-nav snippet — canonical
~110-line block that ships in EVERY cockpit dashboard's <head>.

This file is documentation-only — the actual snippet is duplicated
verbatim into each dashboard's index.html so each page is self-
contained per the sovereignty-clean doctrine (no shared assets, no
CDN). Test `test_keyboard_nav_contract.py` enforces that every
adopted dashboard carries the IDENTICAL snippet.

Rationale: <head>-only embedding means Cmd-K + Cmd-N work BEFORE the
main dashboard JS loads. The palette backdrop is injected into
<body> at DOMContentLoaded so the snippet drops into <head> next to
the personalization apply-snippet without restructuring the page.

Shortcuts:
  Cmd-1 / Ctrl-1   → D-00 master-dashboard  (R10058)
  Cmd-2 / Ctrl-2   → D-01 active-sessions   (R10062)
  Cmd-3 / Ctrl-3   → D-02 profile-choices   (R10068)
  Cmd-4 / Ctrl-4   → D-03 model-health      (R10074)
  Cmd-5 / Ctrl-5   → D-04 costs             (R10082)
  Cmd-6 / Ctrl-6   → D-05 traces            (R10087)
  Cmd-7 / Ctrl-7   → D-06 pending-approvals (R10092)
  Cmd-8 / Ctrl-8   → D-07 memory-changes    (R10096)
  Cmd-9 / Ctrl-9   → D-08 rollback-points   (R10101)
  Cmd-0 / Ctrl-0   → D-09 hardware-pressure (R10105)
  Cmd-K / Ctrl-K   → palette overlay        (R10055) — covers D-10..D-20 + ⚙
  ESC              → close palette
  ↑/↓              → navigate palette results
  Enter            → activate selected palette result

Per "Respect the projects": navigation is CLIENT-SIDE only — uses
window.location.href, no server-mutation. Per the universal
text-input guard: Cmd-N is suppressed when typing in <input>/
<textarea>/[contenteditable] so the operator can still type digits.
-->
<style>
  .so-palette-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 9000; display: none; align-items: flex-start;
    justify-content: center; padding-top: 12vh;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .so-palette-backdrop.open { display: flex; }
  .so-palette-box {
    width: min(560px, 90vw); background: var(--panel, #171717);
    border: 1px solid var(--accent, #9bd1ff); border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6); overflow: hidden;
  }
  .so-palette-input {
    width: 100%; padding: .75rem 1rem; background: transparent;
    border: 0; border-bottom: 1px solid var(--border, #262626);
    color: var(--fg, #e6e6e6); font-size: 1rem;
    font-family: inherit; outline: none;
  }
  .so-palette-results { max-height: 50vh; overflow-y: auto; }
  .so-palette-row {
    display: flex; align-items: center; gap: .6rem;
    padding: .5rem .9rem; cursor: pointer; color: var(--fg, #e6e6e6);
    font-size: .9rem;
  }
  .so-palette-row:hover, .so-palette-row.active {
    background: rgba(155,209,255,.10);
  }
  .so-palette-row .id {
    font-weight: 600; color: var(--accent, #9bd1ff);
    min-width: 3.5rem; font-size: .82rem;
  }
  .so-palette-row .lbl { flex: 1; }
  .so-palette-row .hint {
    font-size: .72rem; color: var(--muted, #888);
  }
  .so-palette-footer {
    padding: .4rem .9rem; font-size: .72rem; color: var(--muted, #888);
    border-top: 1px solid var(--border, #262626);
    display: flex; gap: 1rem; flex-wrap: wrap;
  }
  .so-palette-footer kbd {
    background: var(--bg, #0e0e0e); border: 1px solid var(--border, #262626);
    border-radius: 3px; padding: 0 .35rem; font-size: .7rem;
    color: var(--fg, #e6e6e6);
  }
</style>
<script>
  (function(){
    var ROOT = (function(){
      var p = window.location.pathname.replace(/\/$/, '');
      var i = p.lastIndexOf('/');
      return i > 0 ? p.slice(0, i + 1) : '/';
    })();
    var DASHBOARDS = [
      { id: 'D-00', dir: 'master-dashboard',          label: 'master dashboard',         shortcut: '1' },
      { id: 'D-01', dir: 'd-01-active-sessions',      label: 'active sessions',          shortcut: '2' },
      { id: 'D-02', dir: 'd-02-profile-choices',      label: 'profile choices',          shortcut: '3' },
      { id: 'D-03', dir: 'd-03-model-health',         label: 'model health',             shortcut: '4' },
      { id: 'D-04', dir: 'd-04-costs',                label: 'costs',                    shortcut: '5' },
      { id: 'D-05', dir: 'd-05-traces',               label: 'traces',                   shortcut: '6' },
      { id: 'D-06', dir: 'd-06-pending-approvals',    label: 'pending approvals',        shortcut: '7' },
      { id: 'D-07', dir: 'd-07-memory-changes',       label: 'memory changes',           shortcut: '8' },
      { id: 'D-08', dir: 'd-08-rollback-points',      label: 'rollback points',          shortcut: '9' },
      { id: 'D-09', dir: 'd-09-hardware-pressure',    label: 'hardware pressure',        shortcut: '0' },
      { id: 'D-10', dir: 'd-10-eval-history',         label: 'eval history',             shortcut: null },
      { id: 'D-11', dir: 'd-11-adapter-status',       label: 'adapter status',           shortcut: null },
      { id: 'D-12a', dir: 'network-edge',             label: 'network edge (D-12 split)', shortcut: null },
      { id: 'D-12b', dir: 'edge-firewall',            label: 'edge firewall (D-12 split)', shortcut: null },
      { id: 'D-13', dir: 'd-13-filesystem-grants',    label: 'filesystem grants',        shortcut: null },
      { id: 'D-14', dir: 'd-14-capability-tokens',    label: 'capability tokens',        shortcut: null },
      { id: 'D-15', dir: 'd-15-sandboxes',            label: 'sandboxes',                shortcut: null },
      { id: 'D-16', dir: 'd-16-audit',                label: 'audit chain',              shortcut: null },
      { id: 'D-17', dir: 'd-17-quarantine',           label: 'quarantine',               shortcut: null },
      { id: 'D-18', dir: 'd-18-trust-scores',         label: 'trust scores',             shortcut: null },
      { id: 'D-19', dir: 'd-19-super-model-manifest', label: 'super-model manifest',     shortcut: null },
      { id: 'D-20', dir: 'd-20-peace-machine-health', label: 'peace-machine health',     shortcut: null },
      { id: 'D-21', dir: 'd-21-lm-orchestration',      label: 'LM orchestration',         shortcut: null },
      { id: 'D-22', dir: 'd-22-lm-status-operability', label: 'LM status & operability',  shortcut: null },
      { id: 'cfg',  dir: 'personalization',            label: 'personalization',          shortcut: null },
    ];
    function jump(d) { window.location.href = ROOT + d.dir + '/'; }
    var SHORTCUT = {};
    DASHBOARDS.forEach(function(d) { if (d.shortcut) SHORTCUT[d.shortcut] = d; });

    var backdrop, input, results, activeIdx = 0, filtered = [];
    function openPalette() {
      if (!backdrop) return;
      backdrop.classList.add('open');
      input.value = ''; activeIdx = 0;
      filtered = DASHBOARDS.slice();
      renderResults();
      setTimeout(function(){ input.focus(); }, 0);
    }
    function closePalette() { if (backdrop) backdrop.classList.remove('open'); }
    function renderResults() {
      var html = '';
      filtered.forEach(function(d, i) {
        html += '<div class="so-palette-row' + (i === activeIdx ? ' active' : '') +
                '" data-idx="' + i + '"><span class="id">' + d.id + '</span>' +
                '<span class="lbl">' + d.label + '</span>' +
                (d.shortcut ? '<span class="hint">⌘' + d.shortcut + '</span>' : '') +
                '</div>';
      });
      results.innerHTML = html;
      Array.prototype.forEach.call(results.querySelectorAll('.so-palette-row'), function(el) {
        el.addEventListener('click', function() { jump(filtered[Number(el.dataset.idx)]); });
      });
      var active = results.querySelector('.so-palette-row.active');
      if (active && active.scrollIntoView) active.scrollIntoView({ block: 'nearest' });
    }
    function filterPalette() {
      var q = (input.value || '').trim().toLowerCase();
      filtered = q ? DASHBOARDS.filter(function(d) {
        return d.id.toLowerCase().indexOf(q) >= 0 ||
               d.label.toLowerCase().indexOf(q) >= 0 ||
               d.dir.toLowerCase().indexOf(q) >= 0;
      }) : DASHBOARDS.slice();
      activeIdx = 0;
      renderResults();
    }

    // Skip the snippet's Cmd-N jump when the operator is already on
    // the target dashboard — that way each dashboard's own Cmd-N
    // handler (e.g. d-05 Cmd-6 focuses search) keeps working without
    // being clobbered by a no-op page-reload. Detection: the current
    // pathname contains the target dir as a segment.
    function isOnDashboard(d) {
      var p = window.location.pathname;
      return p.indexOf('/' + d.dir + '/') >= 0 || p.indexOf('/' + d.dir) >= 0 && p.endsWith(d.dir);
    }

    function onKeydown(e) {
      var open = backdrop && backdrop.classList.contains('open');
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault(); e.stopImmediatePropagation();
        open ? closePalette() : openPalette(); return;
      }
      if (open) {
        if (e.key === 'Escape')    { e.preventDefault(); e.stopImmediatePropagation(); closePalette(); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); activeIdx = Math.min(activeIdx + 1, filtered.length - 1); renderResults(); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); e.stopImmediatePropagation(); activeIdx = Math.max(activeIdx - 1, 0); renderResults(); return; }
        if (e.key === 'Enter')     { e.preventDefault(); e.stopImmediatePropagation(); if (filtered[activeIdx]) jump(filtered[activeIdx]); return; }
        return;
      }
      if ((e.metaKey || e.ctrlKey) && SHORTCUT[e.key]) {
        var tgt = e.target;
        if (tgt && (tgt.tagName === 'INPUT' || tgt.tagName === 'TEXTAREA' || tgt.isContentEditable)) return;
        // If already on target, let local handlers run (focus search, refresh, etc.)
        if (isOnDashboard(SHORTCUT[e.key])) return;
        e.preventDefault(); e.stopImmediatePropagation();
        jump(SHORTCUT[e.key]);
      }
    }

    function init() {
      // Inject backdrop into <body> on DOMContentLoaded
      if (!document.getElementById('so-palette-backdrop')) {
        var d = document.createElement('div');
        d.className = 'so-palette-backdrop';
        d.id = 'so-palette-backdrop';
        d.setAttribute('role', 'dialog');
        d.setAttribute('aria-modal', 'true');
        d.setAttribute('aria-label', 'dashboard navigator');
        d.innerHTML =
          '<div class="so-palette-box">' +
            '<input type="text" class="so-palette-input" id="so-palette-input" ' +
            'placeholder="jump to dashboard… (try: audit / costs / 17)" autocomplete="off">' +
            '<div class="so-palette-results" id="so-palette-results"></div>' +
            '<div class="so-palette-footer">' +
              '<span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>' +
              '<span><kbd>Enter</kbd> open</span>' +
              '<span><kbd>Esc</kbd> close</span>' +
              '<span style="flex:1"></span><span>M060 R10055</span>' +
            '</div>' +
          '</div>';
        document.body.appendChild(d);
      }
      backdrop = document.getElementById('so-palette-backdrop');
      input    = document.getElementById('so-palette-input');
      results  = document.getElementById('so-palette-results');
      if (!backdrop || !input || !results) return;
      input.addEventListener('input', filterPalette);
      backdrop.addEventListener('click', function(e) { if (e.target === backdrop) closePalette(); });
    }
    // Always bind keydown immediately (init may run later)
    window.addEventListener('keydown', onKeydown);
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
</script>
