<script>
(function(){
  "use strict";
  if (window.__soAppShell) return; window.__soAppShell = true;
  // ── catalog: groups → panels, with per-panel assistant data (desc).
  //    Generated from config/dashboard-catalog.yaml (single source of truth). ──
  var GROUPS = [
    {name:'Learn', items:[
      {id:'—', dir:'course', label:'Course', ico:'✦', desc:'The guided course — a persistent bottom journey-rail that walks you through sovereign-os module by module, most-important pieces first (Trinity, the build pipeline, security & selfdef), then the rest, clearly tier-labelled. Survives navigation; press Next and it travels you to the next lesson’s panel. Distinct from the Assistant (this is a tour ACROSS panels, not help for the one you are on).', menuHover:'The guided tour of the whole box — start here if you are new. Where the Assistant explains the panel you are on, the Course is a linear journey ACROSS panels: it opens a slim rail along the bottom, teaches one lesson at a time, and on Next travels you to that lesson’s panel and resumes there, so exploring and learning are the same motion. It is ordered by importance — Orientation and the Trinity first, then the build pipeline, then models, security & selfdef, hardware, governance, and finally the optional science tools — with every module tier-labelled (Core / Standard / Advanced / Optional) so nothing is hidden and nothing pretends to be more central than it is. Your place and progress are saved on this device, so you can leave, explore freely, and come back to exactly where you were. Open it to get the lay of the land in order rather than clicking around blind; it works in DEMO mode, so you can take the whole tour with no daemon running.'}
    ]},
    {name:'Trinity & Orchestration', items:[
      {id:'—', dir:'trinity', label:'Trinity', ico:'△', desc:'The 3-tier runtime at a glance — Pulse (CPU/AVX-512 ternary), Weaver (sandboxed GPU fabric), Auditor (immutable gatekeeper): live tier status, model assignments, health.', menuHover:'The three-part mind of the box at a glance — Pulse, Weaver, and Auditor (M066), the arrangement that lets you trust compute you cannot personally verify. Pulse does the thinking on cheap CPU ternary, Weaver shapes and steers it on the sandboxed GPU fabric, and the Auditor watches both from an immutable perch that cannot be bribed or bypassed. The whole point is separation of powers: no single tier can both act and vouch for itself. Open it for the one-screen answer to ‘is the trinity intact’ — all three up, each doing its own job — before you rely on anything the box produced. It is the parent of the Weaver and Auditor panels and the human-readable face of what D-16 (the audit chain) and D-18 (trust) enforce underneath.'},
      {id:'—', dir:'brain', label:'Sovereign Brain', ico:'◆', desc:'Observe + operate the Rust intelligence layer — the DECODED cortex memory (the 8 CoALA types, trust/value, ground-truths) beside the Python Memory-OS, live gateway telemetry + the never-cloud-spill tripwire, a routing probe that shows the brain decide, inline chat with the local model, and the daemon/crate map.', menuHover:'The brain made concrete and operable. Where Trinity shows the three-tier architecture, this opens the actual M048 gateway (sovereign-gatewayd on :8787) over the deterministic cortex: the memory it has LEARNED — not a count, but every item with its CoALA type, trust and value and its cold ground-truth episode/summary/facts — beside the Python Memory-OS operational store, the two brains that now share a persistence substrate. It answers ‘what does the box remember, and what does it decide.’ Drive it: the routing probe sends a real 7-axis request and shows which SRP role, device and verdict the brain reaches (a read-only preview — it never pollutes memory); chat streams from the local model through the OpenAI shim. Everything is read-only over the gateway’s read surfaces plus a non-mutating decide/chat — forget and clear stay CLI-gated. Open it to look INTO the intelligence layer rather than trust that it exists, and to see the nine daemons behind it.'},
      {id:'—', dir:'weaver', label:'Weaver (fabric)', ico:'☲', desc:'The sandboxed fabric layer — Podman/VFIO isolation, the state-fabric (tank/context) writers, CCD1 allocation. Where untrusted work runs.', menuHover:'The sandboxed fabric layer — where untrusted and heavy work actually runs, walled off from everything that matters. Weaver owns the GPU fabric (Podman + VFIO isolation), the writers that persist state into tank/context, and the CCD1 core allocation, so it is the tier you look at to answer ‘where is the risky work contained, and is the containment holding.’ It is deliberately the messy tier — bursty, GPU-hungry, running things the box does not fully trust — which is exactly why it is isolated. Open it when you want to see what the fabric is doing, whether a sandbox has the resources it needs, or whether Weaver’s work is staying inside its VFIO boundary rather than leaking toward the host. It sits under the Trinity umbrella beside Pulse (compute) and the Auditor (the watcher that keeps Weaver honest).'},
      {id:'—', dir:'auditor', label:'Auditor (gatekeeper)', ico:'🔍', desc:'The always-on immutable gatekeeper — Tetragon eBPF perimeter + Guardian violation tail. The last line that cannot be bypassed.', menuHover:'The always-on gatekeeper — the one tier that only watches and can never be talked out of it. The Auditor runs the Tetragon eBPF perimeter at the kernel boundary and tails the Guardian daemon’s violations, so it is the last line that observes every syscall and cannot be bypassed from userspace. Its whole value is incorruptibility: it does no work of its own, which is precisely why its verdicts can be trusted about the work others do. Open it to confirm the perimeter is live and streaming — because a blind Auditor is a security event, not a slow one — and to read what it has flagged. It is the enforcement half of the Trinity (Pulse computes, Weaver steers, the Auditor judges), and it feeds the tamper-evident record you inspect on D-16.'},
      {id:'—', dir:'router', label:'Router', ico:'⎈', desc:'The deterministic request router (SDD-011): which tier answers a prompt, per-rule classification, routing-decision metrics. Pairs with the thinking-router planner (CLI: router plan).', menuHover:'The loopback traffic cop every prompt passes through — the deterministic request router (SDD-011) that decides, in a fixed rule order, which tier answers a given prompt. It classifies each request against an ordered rule set (first match wins, so the same prompt always routes the same way) and dispatches it to Pulse (cheap ternary), the Logic engine (mid-scale Q4), or the Oracle (deep reasoning). The doctrine it enforces is that most prompts do not deserve the expensive model. Open it to see the routing rules, the backends’ health as route targets, and the live counts of where prompts actually landed — and to catch a rules-vs-reality mismatch (everything piling onto Oracle, or the cheap tier being bypassed). It pairs with the thinking-router (orchestration) which adds reasoning escalation on top of this tier choice.'},
      {id:'—', dir:'runtime-modes', label:'Runtime Modes', ico:'◑', desc:'The master-spec §18 runtime profiles (ultra-sovereign-efficiency / high-concurrency / deep-context) — pick the mode; it drives core pinning, GPU power, model allocation.', menuHover:'The runtime posture chooser, seen from the mode angle — the same M076 profiles as D-21 but framed as ‘what mode is the box in.’ Each mode (ultra-sovereign-efficiency, high-concurrency, deep-context) is a whole coherent stance that drives core pinning, GPU power, and model allocation together, so switching mode reshapes how the entire machine thinks rather than tweaking one knob. Open it when you want to change the box’s character — cheapest cognition, most parallel agents, or longest contexts — and to understand the trade-off each mode makes (you cannot have all three at once). It is the plain-language sibling of D-21 (which shows the same choice as a model-to-hardware grid) and of profile-generation (which produces these modes from hardware and strategy).'},
      {id:'D-01', dir:'d-01-active-sessions', label:'D-01 Active Sessions', ico:'▣', desc:'The 12-step task lifecycle per live operator session (init → inference → response → validation → cleanup).', menuHover:'The live-sessions board — every operator session in flight and where each one sits in the 12-step task lifecycle (M057), from init through inference, response, validation, to cleanup. It answers ‘what is the box actually working on right now, and is anything stuck.’ Each session walks the same lifecycle, so a session parked at one step is a session that needs attention — a stalled validation, an inference that never returned. Open it to see concurrency at a glance, to find a hung session, or to confirm work is draining through the lifecycle cleanly rather than piling up. It is the per-session counterpart to D-03 (which shows the models those sessions are hitting) and D-09 (the pressure a burst of sessions produces).'},
      {id:'D-03', dir:'d-03-model-health', label:'D-03 Model Health', ico:'♥', desc:'Per-tier inference health — SRP role, GPU binding, KV-cache pressure, latency. The live-serving view (distinct from the catalog).', menuHover:'How well the models are actually SERVING right now — the live-inference counterpart to the catalog. Where D-23 tells you which models exist, this tells you how the loaded ones are performing across the three SRP tiers (M075): the Conductor on CPU ternary, the Logic engine on the RTX 5090 (internal secondary), and the Oracle on the Blackwell PRO 6000. It reads each tier’s utilization and headroom, per-model latency at the p50/p95/p99 tails (because the tail is what a user feels, not the average), KV-cache occupancy and prefill-hit rate per model, and a 24-hour availability heatmap that turns momentary blips into a pattern. Open it when a response felt slow and you need to know which tier and which model was the cause; open it before loading a new model to see which tier has room; open it after a profile change to confirm the reassignment is serving cleanly. It pairs with D-09 (the raw hardware pressure underneath these numbers), D-21 (the profile that assigned models to tiers), and D-23 (the portfolio these live models are drawn from).'},
      {id:'D-05', dir:'d-05-traces', label:'D-05 Traces', ico:'⋮', desc:'Distributed span search — 13-field trace tree, OCSF export. Debug why a request went where it did.', menuHover:'The debugger’s panel — distributed span search across the box, where you reconstruct exactly what happened to one request. It gives you the 13-field trace tree per request and an OCSF export, so when something went wrong or slow you can follow the span-by-span path: which tier classified it, which model served it, where the time went, where it errored. It answers ‘why did THIS request behave this way’ rather than ‘how is the box in aggregate.’ Open it after a bad response, a mysterious latency, or a routing surprise — the trace is the ground truth that the summary dashboards abstract away. It complements D-01 (the session the trace belongs to) and D-04 (the cost that trace incurred), and its OCSF output is the security-legible form auditors consume.'},
    ]},
    {name:'Models & Compute', items:[
      {id:'D-21', dir:'d-21-lm-orchestration', label:'D-21 LM Orchestration', ico:'⛭', desc:'Profiles + model→hardware assignment grid (GPU0/GPU1/EXT_GPU/CPU0 = Oracle/Logic/draft/Conductor per M075, D-022) + CPU AVX-512 / GPU capability panel. Read-only: Apply copies the signed profile verb.', menuHover:'Where you choose the whole machine’s inference posture in one move. A runtime profile (M076) is not a setting — it is a coherent bundle that assigns every model to a device and pins the CPU cores to match (the SRP split, M075), so picking one rebalances the Conductor, Logic, and Oracle tiers together. This panel lets you preview a profile as a concrete model→hardware grid before you commit it, and shows the silicon it’s built to exploit (the CPU’s AVX-512 extensions for the ternary path, the GPUs’ capabilities like NVFP4). Open it when you want to change how the box thinks as a whole — trade deep-context reach for concurrency, or park the GPUs and run cheap on CPU — rather than tweaking one model. It’s the strategic counterpart to D-03 (which shows how the current assignment is actually serving) and D-09 (which shows the pressure each posture produces). Read-only: applying a profile is a signed verb-chain through osctl, because reshuffling models across devices is a real, heavy operation, not a web click.'},
      {id:'D-24', dir:'d-24-cpu-features', label:'D-24 CPU Features', ico:'⊞', desc:'The deep AVX-512 capability view — extension map, per-AI-workload fit verdict, and advisory. Reuses avx512-advisor. Distinct from D-21 Features-CPU summary.', menuHover:'The deep read on what the CPU can actually do for AI — the full AVX-512 extension map and, more usefully, a verdict on how well this exact silicon fits each AI workload. It matters because the whole cheap-cognition story rests on ternary inference running fast on CPU, and that speed comes from specific AVX-512 instructions (VNNI for integer dot-products, BF16 for half-precision, VPOPCNTDQ for bit-counting the ternary path leans on). If an extension is missing, the Conductor tier silently falls back to a slower path — so this panel is where you learn whether \u201cefficiency mode\u201d will actually be efficient on THIS chip. It goes deeper than D-21\u2019s at-a-glance CPU-features summary: here each extension is mapped to the workloads it enables, with a fit verdict and an advisory (from the avx512-advisor, R272). Open it when deciding whether to lean on CPU inference, diagnosing why the Conductor is slower than expected, or planning a build for specific silicon. It pairs with D-09 (the CCD load these instructions drive) and D-21 (the efficiency profile that depends on them).'},
      {id:'D-23', dir:'d-23-models-catalog', label:'D-23 Model Catalog', ico:'▤', desc:'The canonical model registry (models/catalog.yaml) browsed by SRP tier — id, class, engine, precision, params, context, license, purpose, status. The portfolio view (distinct from D-03 live health).', menuHover:'The full portfolio of models the box COULD run, browsed by SRP tier — the catalog, as opposed to D-03 which shows the few that are loaded and serving. Every entry comes straight from the canonical registry (models/catalog.yaml) with its real attributes: id, class (ternary-lm / RLM / SLM / LLM / mixture), engine, precision, parameter count, context window, license, purpose, and status. This is where you shop before you load: to find a model that fits a tier\u2019s VRAM budget, to compare two candidates\u2019 context windows or licenses, or to understand what the box is capable of beyond what happens to be resident right now. It is deliberately read-only reference \u2014 loading a model you find here is done from D-03 or D-21, as a signed action. Open it when you\u2019re choosing what to run, auditing licenses across the fleet, or answering \u201cdo we even have a model for this?\u201d It pairs with D-03 (which of these are live) and D-21 (which tier/device a chosen model would land on).'},
      {id:'D-22', dir:'d-22-lm-status-operability', label:'D-22 LM Status & Operability', ico:'◐', desc:'Per-device (CPU0/GPU0/GPU1) Model 0/1/2 status + History|Selected latency + operability Actions/Tests + render-only Chat. Reuses the model-health core; Actions copy signed CLI verbs.', menuHover:'The device-by-device operability view — and the one place in the whole cockpit where you actually talk to the box\u2019s brain. Where D-03 aggregates model health by SRP tier, this pins it to the physical devices (CPU0, GPU0, GPU1) and adds the thing that proves the machine is more than dashboards: a sovereign loopback chat that sends a prompt straight to the local LM over 127.0.0.1 and shows the answer. That chat is the single deliberate exception to the read-only rule \u2014 it is a real compute call, but it never leaves the box, which is the whole sovereignty argument made tangible: your AI, on your silicon, answering with nothing crossing the network. Open it to confirm a device is not just loaded but actually responding; open it to sanity-check the box end to end after a profile change; open the chat when you want to feel the machine think without a cloud in the loop. It pairs with D-03 (tier health), D-21 (the profile that placed these models on these devices), and D-09 (the pressure a chat request produces).'},
      {id:'—', dir:'code-console', label:'Code Console', ico:'⌘', desc:'A claude.ai/code-style interface for the box’s OWN local LM — a left M057 session rail, a center conversation over the loopback router, a right Plan/artifact pane, and a bottom composer with an M075 device target. Read-only (R10212): the one sanctioned POST is the loopback chat.', menuHover:'The one panel where you sit down and CODE with your sovereign machine instead of a cloud. It re-creates the claude.ai/code shape natively — a session rail on the left (real M057 OS task-sessions), a conversation in the middle, a plan/artifact pane on the right, and a composer at the bottom with a device target (CPU0 Conductor / GPU0 Oracle / GPU1 Logic) — but every token is served by the box’s own local LM over 127.0.0.1, nothing crossing the network. It is honest by construction: the rail and the composer are live, while the persisted conversation, the Plan pane, and the repo chips have no producer on the box yet and say so plainly rather than faking them (SB-077). It is read-only like every panel (R10212): the single mutating-looking call is the loopback chat, a non-mutating inference read-compute; any real action is a signed CLI verb you copy. Open it to talk to the machine directly, to sanity-check that a device actually responds, or to feel the box think with no cloud in the loop. It extends D-22, whose per-device chat this grows into a full IDE-style surface.'},
      {id:'—', dir:'models-catalog', label:'Models & Catalog', ico:'▤', desc:'The full model catalog (68 models across ternary-lm/RLM/SLM/LLM/mixture, every quantization) with VRAM-aware selection — browse and filter by class/quant/tier/purpose/VRAM. Backed by models/catalog.yaml (served at /models-catalog.json); operator CLI e.g. models select --class rlm --vram 48.', menuHover:'The full model shelf with VRAM-aware selection — the complete catalog (68 models across ternary-lm, RLM, SLM, LLM, and mixture, at every quantization) that you browse and filter to choose what to run. Where D-23 is the tier-grouped portfolio view, this is the working selector: filter by class, quant, tier, purpose, or VRAM budget and it shows you what actually fits. It answers ‘which model should I load for this job on this hardware’ — the VRAM filter is the key, because a model that will not fit is not a candidate no matter how good. Open it when picking a model to load, comparing quantizations of the same base, or checking whether a workload has a model that fits a tier’s memory. It feeds D-03 and D-21, where a chosen model becomes a signed load.'},
      {id:'—', dir:'cpu-features', label:'CPU / AVX-512 Choice', ico:'⊞', desc:'The tiered AVX-512 exploitation surface — which instructions (F/VL/BW/VNNI/BF16/VPOPCNTDQ…) THIS CPU exposes and how they map to the AI workloads they enable (Pulse ternary path). Live probe via avx512-advisor (R272), served at /cpu-avx.json.', menuHover:'The CPU-as-AI-accelerator chooser — the tiered AVX-512 exploitation surface that shows which instruction families this chip exposes (F, VL, BW, VNNI, BF16, VPOPCNTDQ…) and how they map to the AI workloads they enable. It matters because the box’s cheap-cognition claim rests on ternary inference running fast on CPU, and that speed comes from these specific extensions — a missing one silently downgrades the Pulse path. Open it to decide whether to lean on CPU inference on this silicon, or to understand why the Conductor is slower than expected. It is the selection-oriented sibling of D-24 (the deep per-workload fit and advisory) and it grounds the efficiency profile on runtime-modes / D-21, which only makes sense if the instructions it needs are present.'},
      {id:'—', dir:'avx-modes', label:'AVX Modes', ico:'⋔', desc:'The AVX execution-mode surface (SDD-600) — Custom-AVX (the M002/M007/M008 bit-machine: policy becomes bits, token-by-token routing) vs BuiltIn-Features-AVX (stock AVX-512 math) vs Hybrid vs Off, in one select, with the full mode inventory (M008 13 bit-cheats + cpu-dispatch paths + precision tiers). Kernels real + live-verified; per-token inference integration is downstream.', menuHover:'Where the box picks HOW it uses AVX-512. Two very different powers live here: the Custom bit-machine (a packed control word per branch — M002/M007/M008 — where policy becomes bits and one masked AVX-512 op routes many branches at once, token-by-token, at hardware speed) and the BuiltIn math side (stock VNNI/BF16/tier acceleration the CPU/AVX-512 Choice panel already surfaces). It matters because the custom bit-machine is the "using the bits for various purposes" superpower and it had no panel until now. Open it to swap the mode, read why it is a superpower, and see the full inventory of sub-modes — the honest ledger: the kernels are real + live-verified (see docs/src/avx-mode-bit-machine.md); the remaining step is wiring the bit-machine into per-token inference routing.'},
      {id:'—', dir:'orchestration', label:'Thinking Router / Orchestration', ico:'⧉', desc:'The thinking-router / orchestration view — the 7-axis routing rules (SDD-011) + live routing metrics (which tier/class/task-type requests landed on) + the per-profile escalation (CoT → Validator → self-consistency → MoE). Served at /orchestration.json (router rules|metrics).', menuHover:'The thinking-router — the layer above tier choice that decides HOW HARD to reason, not just which model answers. It applies the 7-axis routing rules (SDD-011) and then the per-profile escalation ladder: chain-of-thought, then a validator, then self-consistency (multiple samples), then mixture-of-experts, each rung costing more but reasoning harder. It answers ‘is the box thinking as deeply as this prompt deserves, and no deeper.’ Open it to see which tier/class/task-type requests landed on, and how far up the escalation ladder the active profile climbs — too eager wastes compute, too shy gives shallow answers. It sits on top of the plain router (which picks the tier) and its escalation depth is set by the runtime profile you choose on D-21 / runtime-modes.'},
      {id:'—', dir:'profile-generation', label:'Runtime-Profile Generation', ico:'⌘', desc:'Generate a whole runtime profile from hardware × strategy, with tier_intent resolved against the catalog (the \'20+ combos\' producer) — shows the resolved allocations each strategy produces + the generate command. Served at /profile-generation.json from profiles/runtime/*.yaml.', menuHover:'The profile foundry — where a whole runtime profile is generated from hardware × strategy, resolving each tier’s intent against the real catalog. It is the producer behind the ‘20+ combos’: give it this silicon and a strategy and it computes the concrete model-to-device allocations that strategy implies, plus the exact generate command. It answers ‘what would a deep-context (or high-concurrency, or efficiency) profile actually look like on THIS box,’ before you ever apply one. Open it when you want to create or understand a profile rather than just pick from existing ones — it is the design-time counterpart to D-21 (which previews and applies a chosen profile) and runtime-modes (which switches between them). The output is what those panels then let you commit as a signed chain.'},
      {id:'D-10', dir:'d-10-eval-history', label:'D-10 Eval History', ico:'∿', desc:'Per-task/model eval results (mmlu/humaneval/gsm8k/…), white-box + black-box.', menuHover:'The report card — per-task and per-model eval results over time (MATH, HumanEval, GSM8K and the rest), in both white-box and black-box form. It answers the question no live dashboard can: ‘is the box actually getting better, or just changing.’ Black-box pass (outcome only) is the number that cannot be gamed; the per-task trends turn a single accuracy figure into a diagnosis of which model regressed on which task. Open it before promoting an adapter (to see if it earned it), after a model change (to confirm improvement, not drift), or when a suite result looks off. It is where measurement lives, feeding D-11 (adapter promotion decisions rest on these scores) and grounding the M078/M080 benchmark targets the box is tuned against.'},
      {id:'D-11', dir:'d-11-adapter-status', label:'D-11 Adapter Status', ico:'⚙', desc:'LoRA adapter inventory + rollback state — which fine-tunes are resident and active.', menuHover:'The specializations board — the LoRA adapter inventory (M046 Foundry) and rollback state: which fine-tunes are resident, which are live, and which are waiting on the gate. An adapter is a small low-rank skill stacked on a base model, stored at NVFP4 4-bit so many coexist in the VRAM one full fine-tune would need. Because promoting one can change how the box behaves, promotion runs the MS041 high-risk triple-gate (eval, safety, signed intent — all three must pass), which is why an adapter can ace evals and still be pending. Open it to see what specializations are active, what is waiting, and what was rolled back (a rollback is the system working, not failing). It pairs with D-10 (the evals that qualify an adapter) and D-03 (how an adapter performs once live).'},
      {id:'D-19', dir:'d-19-super-model-manifest', label:'D-19 Super-Model Manifest', ico:'≣', desc:'The live super-model version + the M001..M080 module table — what capabilities are shipped.', menuHover:'The bill of materials for the whole box — the live super-model version plus the M001..M080 module table that composes it. The super-model is not one model; it is the manifest that binds an exact version of every module into one verified system, which is what a rollback targets and what an audit pins the box’s behavior to. It answers ‘which build of the sovereign OS is this, and are all its parts at the versions they should be.’ Open it to check the composed version, to spot a module lagging its expected version (composition drift), or to see how far the 11-phase build has progressed. It tracks the M066 Trinity and the build phases, and a module lagging here is often the root of behavior that surfaces as a problem on some other panel.'},
    ]},
    {name:'Hardware & Operations', items:[
      {id:'D-09', dir:'d-09-hardware-pressure', label:'D-09 Hardware Pressure', ico:'▰', desc:'Live PSI (CPU/mem/IO), per-CCD load, GPU utilization + power, ZFS pool health. The physical-stress view.', menuHover:'The box’s vital signs — not “how busy” but “how stressed”. Where you go when something feels slow and you need to know whether the machine is genuinely out of headroom or just working hard. It reads Linux PSI (stall, not utilization — the honest signal of contention), the two Ryzen CCDs separately (because crossing the Infinity Fabric between them costs latency the pinning is meant to avoid), both GPUs’ utilization/VRAM/thermals/KV-cache, the ZFS pool’s tail latency, and the M058 backpressure rules that are actively shedding work right now. Open it before launching a heavy build or eval to see if there’s room; open it when a response is slow to tell load apart from contention; open it when a backpressure rule fires to see which resource tripped and what the scheduler gave up to protect live serving. It pairs with the runtime-profile panels (which set the core pinning and GPU budget this reflects) and with D-08 (the ZFS snapshots the scrub here protects).'},
      {id:'D-04', dir:'d-04-costs', label:'D-04 Costs', ico:'$', desc:'Budget + spend by project / profile / model — local compute cost + any cloud fallback.', menuHover:'The honest ledger — what the box’s cognition actually costs, built on the principle that local inference is free and that saying so plainly is the point ($0-is-honest, SDD-102). It shows request volume, average and most-expensive requests, an end-of-day forecast, and budget burn — but the load-bearing truth is that cloud is off by default, so most of what a hosted assistant would bill for costs nothing here. Open it to see where any spend actually comes from (a rare cloud escalation, not the local tiers), to check a forecast before a heavy run, or to confirm the box is living within its sovereign, near-zero cost model. It reads against D-05 (the traces that incur cost) and the routing panels (which keep prompts on the free local tiers).'},
      {id:'D-08', dir:'d-08-rollback-points', label:'D-08 Rollback Points', ico:'↺', desc:'ZFS snapshots as recovery points, with a dry-run preview of what a rollback would change.', menuHover:'The undo button for the whole machine — the ZFS snapshots and signed rollback points that make ‘reversible enough to trust’ a real property, not a hope. Because the pool runs sync=always and snapshots are cheap, the box can capture a known-good state and return to it, and a rollback is a signed operation (MS003) so it cannot be triggered carelessly. It answers ‘if this change goes wrong, can I get back — and to when.’ Open it before a risky change to confirm you have a recent point to fall back to, or after one to roll back cleanly. It is the reversibility half of the peace-machine properties (D-20), underpinned by the same pool whose health you watch on D-09, and it is what a scrub there protects the integrity of.'},
      {id:'D-02', dir:'d-02-profile-choices', label:'D-02 Profile Choices', ico:'◈', desc:'The active OS profile mirrored read-only — hardware, kernel, packages, hooks in effect.', menuHover:'The authority dial — where you set how much the box may do on its own. An MS040 profile is an envelope that caps two things at once: the maximum authority level an agent may reach on the L0..L6 ladder (Observe to Persist) and the trust ring it runs in (R0 Kernel to R4 Cloud, per MS039). It is the single most consequential control on the machine, because it decides how much happens without your signature — tight profiles withhold authority, the autonomous profile grants most of it, bounded only by predeclared gates. Open it to change the box’s autonomy posture, to review the authority ladder and trust rings a profile permits, or to audit who last changed the envelope. It is the authority-side view of the same MS039 rings that D-12 enforces on the network.'},
      {id:'—', dir:'global-history', label:'Global History', ico:'🕑', desc:'A unified change log across 6 sources (apt/dpkg/shell/osctl/events/modules) — \'what changed since I last looked?\'', menuHover:'The whole-machine timeline — every subsystem’s events (the audit chain, the router, memory, selfdef) aggregated into one cross-box history above any single panel’s view. It answers ‘what happened across the entire machine,’ which no individual dashboard can, and it is where correlation lives: an event from one source sitting next to one from another is how a pattern that spans subsystems becomes visible. Open it to reconstruct a sequence that crossed several systems, to spot a rhythm (a nightly job colliding with serving), or to confirm a silent source is actually emitting. It complements D-05 (deep single-request traces) with breadth rather than depth, and a source gone quiet here is itself a signal worth chasing.'},
      {id:'—', dir:'build-configurator', label:'Build Configurator', ico:'▶', desc:'Compose an OS image (or manage this host) and RUN the build — the Run console (validate/preflight/BUILD, bake toggles). The one page that actually builds sovereign-os.', menuHover:'The factory floor — the twelve-section wizard that assembles the entire sovereign OS image, the source of everything every other panel later runs. You walk it section by section (hardware preflight, profile, substrate and posture, kernel, CPU features, modules, packages, operator tools, storage, networking, hooks, observability), and it emits a reproducible build command plus the config artifacts that make the build bit-for-bit repeatable. It answers ‘how is the OS built, and what would change if I built it differently.’ Open it to plan or understand a build — this is the one panel where a decision propagates into every other (a kernel march, a VFIO cmdline, an encryption choice). Nothing here touches a running box; the build runs via orchestrate.sh, then you rehearse the image on Emulate and write it with Flash.'},
      {id:'—', dir:'emulate', label:'Emulate (QEMU)', ico:'◴', desc:'Boot a built image in a throwaway QEMU VM before flashing — interactive serial console, configurable QEMU options (uefi/direct boot, kvm/tcg, cpu/mem, snapshot), auto-login. Catches a broken image in a VM, never on the USB key.', menuHover:'The safe rehearsal — QEMU booting the freshly built image in a disposable VM before it ever touches real hardware. It matters because a broken build discovered on a physical device costs a re-flash and a reboot cycle; here it fails harmlessly in a console you can read. The choices that make the test faithful are the ones to know: uefi boot runs the real OVMF → systemd-boot → signed-UKI chain (so it tests actual secure boot), kvm acceleration runs at near-native speed, snapshot mode discards writes so every boot is clean, and no-reboot halts a boot loop instead of spinning. Open it after a build to confirm the image boots and comes up, especially after a kernel or module change. It sits between Build Configurator (which produces the image) and Flash (which writes the verified image to hardware).'},
      {id:'—', dir:'flash', label:'Flash to USB', ico:'⚡', desc:'Write a built image onto a removable disk from the panel — a safety-classified device picker (system disks hard-protected), type-to-arm confirm, and live dd progress. Shells the gated sovereign-osctl install image; never raw dd.', menuHover:'The point of no return — writing a built image to a real device, which irreversibly wipes it. The whole panel is a safety interlock because getting the target wrong destroys the wrong disk: you flash only images already booted on Emulate, Plan is a free dry-run that writes nothing, and the real Flash unlocks only after you ARM by re-typing the device path matched against its fingerprint (size, model, serial — so /dev/sdX renumbering cannot fool you). It answers ‘write this exact image to this exact device, and prove I mean it.’ Open it as the final step of a build: verified image, correct device, arm, write. It is the destructive end of the pipeline that starts at Build Configurator and is rehearsed on Emulate — treat armed state as live.'},
      {id:'—', dir:'ups', label:'UPS (APC Smart-UPS)', ico:'🔋', desc:'Live APC Smart-UPS (SMT2200C SmartConnect) state (battery %, runtime, load, on-line/on-battery) via NUT apc_modbus over Modbus TCP (:502) or serial, plus the graceful soft-shutdown posture — an orderly poweroff when battery runtime drops below 30 minutes. Read-only over power-status + NUT upsc.', menuHover:'The insurance policy against a dirty power loss — the UPS status and the graceful-shutdown guard that powers the box off cleanly before the battery dies. It matters because the pool runs sync=always: a hard cut mid-write risks corruption, so the guard (checked every minute) triggers an orderly shutdown when battery runtime drops below a minutes threshold, reserving the time a clean shutdown needs to flush ZFS and stop services. It answers ‘is the box protected if the power fails, and how long do I have on battery.’ Open it when on battery to read the remaining runtime, to confirm the guard is armed (disarmed risks ZFS on a battery-death), or after a power event. It protects the same pool and snapshots you rely on for D-08 rollback.'},
    ]},
    {name:'Security & selfdef', items:[
      {id:'D-25', dir:'d-25-selfdef-management', label:'D-25 Self-Defense Management', ico:'⛨', desc:'READ-ONLY consumer view (R10212) of the selfdef IPS — on/off enablement + M060 mirror-chain health + links to the 6 domain panels (D-13..D-18). Derives state via the m060-health probe() proxy; on/off is a clipboard-copied signed CLI verb.', menuHover:'The bridge monitor — the health and freshness of the M060 mirror chain that carries selfdef’s truth (rules, grants, audit, trust) into this box’s read-only panels. It is the most load-bearing integration on the machine: when this chain is healthy the selfdef mirror panels (D-12 through D-18) show live data; when it breaks they silently freeze at the last good mirror, which is dangerous precisely because they will not look broken. It answers ‘can I trust what the selfdef panels are showing me right now.’ Open it to confirm the bridge is flowing, to see which individual mirrors are current versus stale, and to read the per-producer detail when only some panels look wrong. It is the management view of the same M060 chain the master dashboard surfaces as a single health banner.'},
      {id:'—', dir:'selfdef-management', label:'selfdef (IPS) Management', ico:'⛨', desc:'The intrusion-prevention system — live on/off state + unit/mirror health, unifying the 6 mirror dashboards (D-13..D-18) + perimeter. Served at /selfdef-management.json (selfdef status); controls (on/off/sync/doctor + perimeter) via the Controls surface.', menuHover:'The control room for selfdef itself — the IPS whose defenses this whole box reflects but does not own. Where the D-panels mirror selfdef’s state read-only, this is where selfdef’s management surface is presented: the daemon’s health, its enforcement posture, and the R10212 boundary that keeps sovereign-os checking while selfdef owns. It answers ‘is the defense system itself healthy and enforcing,’ as distinct from ‘what are its current rules.’ Open it to confirm selfdef is up and doing its job before you trust any of the mirror panels downstream of it, or when diagnosing why those mirrors look stale. It pairs with D-25 (the mirror-chain bridge) and the Auditor (the kernel perimeter selfdef’s Guardian daemon provides).'},
      {id:'D-12b', dir:'edge-firewall', label:'Edge Firewall', ico:'🛡', desc:'Host firewall posture — nftables / fail2ban / crowdsec / suricata state + install recommendations.', menuHover:'The defense-in-depth planner for the network edge — it reads what the box enforces locally and what the upstream OPNsense edge enforces, and finds the exposure: a threat that neither line currently stops. Enforcement candidates are grouped on a 4-class ladder from baseline must-haves to situational hardening, and it turns ‘the edge has gaps’ into specific rules the box could add, previewing each as a read-only install plan before you commit. It answers ‘given what the perimeter already does, how much should the box firewall itself, and what exactly should I add.’ Open it when hardening the box, after an edge change, or when deciding whether a weak edge means the box must self-enforce more. It reads against Network Edge (the edge’s capabilities) and D-12 (the rules the box actually runs).'},
      {id:'D-12a', dir:'network-edge', label:'Network Edge', ico:'⇄', desc:'The edge topology — OPNsense bridge, ISP NAT layers, VPN, per-interface state. Where the box sits in the network.', menuHover:'The map of the box’s boundary with the world — the dual-NIC edge (an upstream interface and a LAN interface) with OPNsense as the perimeter authority, and, crucially, multi-NAT visibility. One NAT hop is a normal edge; two or more (an ISP router in front of your firewall) breaks inbound connectivity and hides where the real perimeter is, and this panel makes that hidden second NAT visible. It answers ‘what does the box’s path to the internet actually look like, and is the topology what I think.’ Open it when connectivity is odd, when setting up the edge, or to confirm the OPNsense perimeter can enforce what you expect before traffic reaches the box. It grounds Edge Firewall (which plans local enforcement against this edge’s gaps) and D-12 (the firewall rules that ride on this topology).'},
      {id:'D-12', dir:'d-12-networking', label:'D-12 Networking', ico:'⇄', desc:'The cockpit networking view — the selfdef MS039 Ring-0-4 nftables rules mirror (read-only via selfdef-rules-mirror), per-ring rule counts + traffic + dispositions.', menuHover:'The firewall, read-only — a mirror of selfdef’s enforced nftables ruleset, ring-aware per MS039 so each rule is scoped to a trust ring from R0 Kernel inward to R4 Cloud outward (off by default). It shows what is enforced, the traffic through it, and the ring distribution, but it does not enforce: rules change only through selfdefctl plus your MS003 signature (R10113), so anything pending here is a proposal, never yet live. It answers ‘what is the box’s firewall actually doing, and where is enforcement concentrated.’ Open it to read the live ruleset, to check whether an unexpected ring (like cloud) carries rules, or to see a pending change before it is signed. Enforcement is authoritative on selfdef; this is the sovereign-os window onto it via the M060 bridge.'},
      {id:'D-06', dir:'d-06-pending-approvals', label:'D-06 Pending Approvals', ico:'✋', desc:'The operator approval queue + stage gates — actions waiting for a human yes/no.', menuHover:'The operator-in-the-loop queue — everything the box has decided it will not do on its own and is holding for your signature. This is the M065 stage-gate machinery made concrete: consequential actions (an L5+ commit, a cloud egress, a key operation) stop here and wait, because the sovereignty property is that intelligence stays in your hands and every gated commit needs your MS003 signature. It answers ‘what is waiting on me, and how consequential is each item.’ Open it to clear the queue, to see what the box paused rather than assume it proceeded, and to exercise the human-gate that the backpressure ladder (D-09) escalates to. It is where the peace-machine’s sovereign property (D-20) is lived out, decision by decision.'},
      {id:'D-07', dir:'d-07-memory-changes', label:'D-07 Memory Changes', ico:'✎', desc:'The 8-type memory-graph diff — what the agent\'s memory added/changed/removed.', menuHover:'The mind’s filing system — the M028 memory OS, the eight-tier store that is the difference between an agent that repeats your corrections and one that remembers them. Every candidate memory walks an 11-stage admission lifecycle and is trust-filtered on seven dimensions before it is kept, so the store stays signal rather than noise, and forgetting or force-admitting a memory is a signed act. It answers ‘what does the box remember, what changed recently, and what memory operations are waiting on me.’ Open it to see how full each tier is, to review a graph diff of the last day, to approve a pending forget, or to query the graph read-only via the RLM navigator. It is the persistence layer beneath everything the box learns, and its ground-truth tier is what protects against memory drift and poisoning.'},
      {id:'D-13', dir:'d-13-filesystem-grants', label:'D-13 Filesystem Grants', ico:'📁', desc:'selfdef filesystem-grant mirror (read-only) — which paths are granted to whom.', menuHover:'The permission slips — the scoped, time-bounded filesystem grants selfdef issues (MS007), each a specific path a specific actor may touch, expiring unless renewed. It matters because standing access is the thing attackers inherit; TTL-bounded grants mean permissions decay to nothing on their own, so the live grant list is the true filesystem attack surface at this moment. It answers ‘who can touch what on disk right now, and for how much longer.’ Open it to audit active access, to spot a grant broader or longer-lived than it should be, or to confirm a grant expired as intended. It is one of the selfdef mirrors (read-only, fed by the M060 bridge) and it sits in the same MS039 ring model that governs capability tokens (D-14) and sandboxes (D-15).'},
      {id:'D-14', dir:'d-14-capability-tokens', label:'D-14 Capability Tokens', ico:'⚷', desc:'selfdef capability-token mirror — issued/revoked capabilities.', menuHover:'The capability decoder — the tokens that encode, bit by bit, exactly what an actor is permitted to do, read through the capability_word bit map. Rather than a coarse allow/deny, each token is a precise set of capabilities packed into bits, and this panel decodes them so you can see the granular truth: not ‘can act’ but which specific capabilities are granted, and in which MS039 trust ring. It answers ‘what precisely is this actor allowed to do, at the bit level.’ Open it to audit a token that looks too powerful, to understand why an action was permitted or denied, or to see how capabilities inherit across the ring model. It is a selfdef mirror (read-only via M060), a finer-grained companion to filesystem grants (D-13) and the sandbox tiers (D-15) that contain what these capabilities permit.'},
      {id:'D-15', dir:'d-15-sandboxes', label:'D-15 Sandboxes', ico:'▢', desc:'selfdef sandbox mirror — active sandboxes + their isolation state.', menuHover:'The containment view — the sandbox tiers (MS036) that wall off untrusted work, from namespace isolation up to full VFIO device passthrough. It shows what is running contained and how strongly: a sandbox tier decides how much a compromised process could reach, and VFIO is where a whole GPU (the 4090 Scout) is handed into isolation so its work cannot touch the host. It answers ‘what is contained, at what strength, and is the containment intact.’ Open it to confirm untrusted work is boxed in, to check a sandbox has the tier it needs, or — a security question — to verify the 4090 is actually sandboxed rather than host-claimed. It is a selfdef mirror (read-only via M060) enforcing the MS039 rings that D-14’s capability tokens and D-13’s grants describe, and it is the containment the Weaver fabric runs inside.'},
      {id:'D-16', dir:'d-16-audit', label:'D-16 Audit Chain', ico:'☑', desc:'selfdef append-only audit-chain mirror — the tamper-evident event log.', menuHover:'The tamper-evident record — the MS016 hash-chained audit log, where every entry is cryptographically linked to the last so the history cannot be altered without the break showing. It is the box being ‘disciplined enough to explain itself’: a complete, incorruptible account of what happened, which is worthless if it can be quietly edited and priceless because it cannot. It answers ‘what is the trustworthy record of events, and is the chain unbroken.’ Open it to reconstruct an incident with confidence, to verify chain integrity and continuity, or to satisfy an audit that the box’s own account is intact. It is the Auditor’s ledger (the gatekeeper tier feeds it) and a selfdef mirror via M060 — a broken or stale chain here is a reason to distrust the box’s self-account until it is explained.'},
      {id:'D-17', dir:'d-17-quarantine', label:'D-17 Quarantine', ico:'⚠', desc:'selfdef quarantine mirror — what\'s been isolated and why.', menuHover:'The holding cell — the MS042 quarantine where things selfdef has judged untrustworthy are isolated pending disposition. Rather than delete on suspicion or ignore on doubt, quarantine is the middle path: contain it, keep it inspectable, decide deliberately. It answers ‘what has the box flagged as suspect, why, and what is waiting to be dealt with.’ Open it to review quarantined items, to understand what tripped the judgment that put them there, or to confirm a threat is contained rather than loose. It is a selfdef mirror (read-only via M060), the disposition side of the trust machinery whose scores you read on D-18, and it works with the audit chain (D-16) that records why each item was quarantined.'},
      {id:'D-18', dir:'d-18-trust-scores', label:'D-18 Trust Scores', ico:'★', desc:'selfdef trust-score mirror — per-entity trust levels driving policy.', menuHover:'The trust ledger — the bands that rate how much the box trusts each actor, model, or source, the same seven-dimension trust model that gates what enters memory (D-07) now applied across the machine. Trust here is earned and revocable, not assumed: a low band constrains what something is allowed to influence, and a dropping score is an early warning that something is behaving less trustworthily than it did. It answers ‘how much does the box trust each thing, and is any trust eroding.’ Open it to see the trust landscape, to understand why an actor is constrained, or to catch a trust drop before it becomes a problem. It is a selfdef mirror (read-only via M060) and the scoring layer behind the quarantine decisions (D-17) and capability grants (D-13/D-14).'},
      {id:'D-20', dir:'d-20-peace-machine-health', label:'D-20 Peace Machine Health', ico:'☮', desc:'The M059 peace-machine 5-property verdict — the top-level \'is the system at peace\' signal.', menuHover:'The box’s conscience in one screen — the verdict on whether it is still a peace machine, meaning all five R09966 properties hold at once: powerful enough to act, disciplined enough to explain itself, reversible enough to trust, flexible enough to evolve, and — the load-bearing one — sovereign, so intelligence stays in your hands. The verdict is a conjunction: all five, or not peace. It answers the highest-level question about the box, above any single subsystem: ‘is the machine still behaving as designed.’ Open it for a one-read health check on the whole doctrine, and when it degrades, to see which property slipped and its backing modules. Each property maps to real infrastructure (M047 rollback, M049 observability, MS003 signatures), so a red property points you straight at the subsystem that broke it.'},
      {id:'D-26', dir:'d-26-friction-audit', label:'D-26 Friction Audit', ico:'⚙', desc:'The M060 boot-time friction-audit gate — 6 hardware/integrity gates (PCIe / ZFS / memory / immutability / MS003 signature / timeout), PASS/FAIL/SKIP/OVERRIDE, rendered in-browser by sovereign-cockpit-friction-audit-panel. Read-only: selfdef owns the verdict ring, the cockpit renders it.', menuHover:'The boot-time honesty gate — the six hardware and integrity checks the machine runs before it trusts itself: PCIe bifurcation, ZFS pool health, memory geometry, script immutability, the MS003 signature chain, and a gate-timeout backstop. Each renders PASS, FAIL, SKIP, or OVERRIDE, and the panel is emphatic about what it does NOT know: a gate with no verdict shows a gray dash, never a fabricated pass. It answers ‘did the box clear its own preflight, and if not, which gate stopped it.’ The verdicts are written by selfdef into its friction-audit ring; this panel only renders them (the sacrosanct cross-repo rule), running the real sovereign-cockpit-friction-audit-panel crate in your browser to lay out the six-gate table. Open it after a boot or a firmware change to confirm the machine still passes its own gate, or when something downstream feels wrong and you want to rule out a preflight regression. It sits beside D-20 (the peace verdict) and the selfdef mirror panels as the earliest, most literal ‘is the foundation sound’ signal.'},
      {id:'D-27', dir:'d-27-guardian', label:'D-27 Guardian Daemon', ico:'⛨', desc:'The selfdef IPS Guardian Daemon (sain-01 §10 guardian-core) — recent kill/audit verdicts + the 3-step SIGKILL / audit-append / console-alert response, rendered in-browser by sovereign-cockpit-guardian-panel. Read-only: selfdef owns the verdict ring + Tetragon socket.', menuHover:'The circuit-breaker made visible — the selfdef Guardian that watches the Tetragon sovereign-kernel-fence and kills what crosses it, then does three things every time: SIGKILL the offender, append the event to the audit chain, and raise a console alert. This panel shows its recent verdicts newest-first, each with the offending binary, the target PID, and whether every response step succeeded — plus whether the Tetragon socket is even present, because a Guardian with no socket is a Guardian that cannot see. It answers ‘what has the box killed lately, and did the kill-chain complete.’ The verdicts are selfdef’s, written to its guardian ring; this panel only renders them, running the real guardian-panel crate in your browser and never inventing a kill. Open it after an alert, when hunting a process that vanished, or to confirm the fence is actually enforcing. It sits beside D-26 (the boot-time friction gate that precedes runtime enforcement) and D-16 (the audit chain the audit-append step lands in).'},
      {id:'D-28', dir:'d-28-perimeter', label:'D-28 Perimeter Fence', ico:'⬡', desc:'The selfdef IPS security perimeter (Tetragon sovereign-kernel-fence) — recent SIGKILL / allowlist / extension-allowed verdicts + active signed extensions, rendered in-browser by sovereign-cockpit-perimeter-panel. Read-only: selfdef owns the verdict ring + TracingPolicy.', menuHover:'The kernel boundary made visible — the Tetragon sovereign-kernel-fence that decides, at the moment a binary tries to execute, whether it lives: SIGKILL an unknown, allowlist a known-good, or grant a signed, time-boxed extension. This panel shows the recent verdicts newest-first (the attempted binary, the PID, the cmdline, the outcome) and the extensions currently in force (their manifests, expiry, and signer). It answers ‘what has the fence stopped or permitted, and what standing exceptions exist right now.’ The verdicts, manifests, and policy are selfdef’s, written to its perimeter ring; this panel only renders them, running the real perimeter-panel crate in your browser and never inventing a verdict. Open it after a blocked launch, when auditing which extensions are live, or to confirm the fence is enforcing. It sits beside D-27 (the Guardian runtime circuit-breaker) and D-14 (what a permitted binary is then allowed to do).'},
      {id:'D-29', dir:'d-29-scheduler', label:'D-29 Goldilocks Scheduler', ico:'◑', desc:'The selfdef IPS Goldilocks Scheduler — recent 7-axis routing decisions + the 6 backpressure surfaces, rendered in-browser by sovereign-cockpit-scheduler-panel. Read-only: selfdef owns the decision ring.', menuHover:'The router’s conscience — the Goldilocks Scheduler that, for every request, weighs seven axes (latency, cost, risk, energy, human-attention, hardware-pressure, and their compound) to pick a device: Blackwell, RTX-4090, CPU, hybrid, or hibernate. This panel shows the six live backpressure surfaces (per-device VRAM, CPU/RAM/IO PSI, the human-gate queue) and the recent decisions newest-first, each with its profile, chosen route, compound score, and whether it was force-overridden. It answers ‘why did the box route work where it did, and what pressure shaped that choice.’ The decisions are selfdef’s, written to its decision ring; this panel only renders them, running the real scheduler-panel crate in your browser and never inventing a route. Open it to understand a routing choice, to see which surface is throttling, or to audit an override. It sits beside D-21 (the profiles it routes) and D-09 (the hardware pressure its surfaces watch).'},
      {id:'—', dir:'compliance', label:'Compliance', ico:'⚖', desc:'The §1g/§1h compliance aggregator — per-module pass/fail against the operator mandate.', menuHover:'The top of the anti-minimization stack — the meta-instrument that composes the four §1g audits (surface-map, doc-coverage, anti-minimization, ux-design) into one verdict, because ‘done properly’ is all four at once: a feature can be delivered on every surface and still be undocumented, or documented and still unusable. §1h then extends the same bar across repos to selfdef. It answers ‘is the whole fleet honoring the delivery contract, and where is the leverage to improve it.’ Open it for the single composite read, the worst-modules list ranked by combined gap (the highest-leverage cleanups), and the trend of whether the fleet is honoring the contract more or less over time. It rolls up the four instrument panels beneath it; a red composite sends you to whichever axis is dragging it down.'},
      {id:'—', dir:'auth-tier', label:'Auth Tier', ico:'🔑', desc:'The 6-tier auth ladder (no-auth → basic → advanced → social → enterprise → network) + per-surface requirement.', menuHover:'The authentication-strength audit — a ladder of operator-named tiers measuring how strongly each surface proves who is calling and what they may do, and an upgrade-priority matrix ranking who is under-authenticating for their power. A module’s correct tier is set by what it can do: a surface that can mutate the box belongs high on the ladder, one that only reads can sit lower, and a mutating surface authenticating weakly is the priority to fix. It answers ‘does each surface authenticate as strongly as its capability warrants.’ Open it to audit the fleet’s auth posture, to find the biggest auth gaps, or before hardening a surface that can change the box. It is one of the §1g instruments the Compliance panel rolls up, alongside the surface, doc, and UX audits.'},
      {id:'—', dir:'anti-minimization-audit', label:'Anti-Minimization Audit', ico:'⛶', desc:'The \'do not minimize\' audit — flags where scope was silently shrunk vs the mandate.', menuHover:'The cut-corner detector, built from the operator’s own directive: do not minimize. It greps the whole fleet for eight nameable smells of work that looks finished but is not — a TODO with no anchor, an empty stub, a silent skip, a surface or doc gap, a mandate-TODO owed upward, minimizing language (‘just’, ‘basic’, ‘for now’), and a status that claims done over a stub. Each finding is a specific place a corner was cut and not owned. It answers ‘where is the fleet pretending to be more finished than it is.’ Open it to see the minimization debt, to distinguish intentional waived shortcuts from accidental ones, and to find modules short on both surface and doc axes at once (the efficient place to start). It is a §1g instrument feeding the Compliance rollup; a finding is a corner to close, not to explain away.'},
    ]},
    {name:'Governance & Meta', items:[
      {id:'D-00', dir:'master-dashboard', label:'Master Dashboard', ico:'◎', desc:'The aggregator — the route table + health of every panel + selfdef cross-repo manifest discovery. The front door (this catalog is its new global index).', menuHover:'The front door and the switchboard — the one panel that knows about all the others. It answers a different question than any single dashboard: not “how is this subsystem,” but “is everything reachable, is anything colliding, and is the safety spine intact?” It carries the route table (every panel and whether the aggregator can reach it), the coverage view that proves nothing is stranded off the §1g contract, the collision list where two things claim the same route, the cross-repo manifests selfdef publishes, and — most importantly — the four health banners that are the box’s pulse: the M060 mirror chain (the selfdef→sovereign-os bridge), the MS022 SSE subscriber quota, the four-watchdog IPS spine (whether Guardian/Tetragon is up, which sovereign-os checks but selfdef owns), and AppArmor enforcement. Open it first on any session to see the whole surface at a glance; open it when a panel seems missing or misrouted; open it when you want a single yes/no on whether the defense spine is healthy before trusting anything else. It is the map every other panel is a place on.'},
      {id:'—', dir:'surface-map', label:'Surface Map', ico:'🗺', desc:'The §1g 8-surface taxonomy coverage — which of the 8 operator surfaces each module delivers.', menuHover:'The reachability audit — proof that every module is present on all eight operator-named surfaces (core, cli, tui, api, mcp, dashboard, webapp, service), because a feature is not delivered until it is reachable everywhere it should be. A module whose core logic works but has no CLI verb, no MCP tool, or no visible panel is minimized, and this panel counts exactly that gap, milestone by milestone, so ‘done’ milestones whose modules are still short stand out. It answers ‘is everything actually reachable, or does some capability exist only for those who already know it is there.’ Open it to find invisible (unreachable, unwaived) surfaces, to see which module needs which surface built, and to keep §1g coverage honest. It is the surface axis of the Compliance rollup.'},
      {id:'—', dir:'doc-coverage', label:'Doc Coverage', ico:'☷', desc:'Documentation coverage per module — what\'s documented vs shipped.', menuHover:'The documentation audit — whether every module carries all six operator-named doc kinds (readme, sdd, helptext, metric-inventory, mandate-row, man-page), each written for a different reader at a different moment. A module missing one is under-documented in a specific, nameable way: no readme strands the newcomer, no sdd strands the changer, no helptext strands the operator mid-task. It answers ‘is every module actually documented, and for whom is it not.’ Open it to see the matrix of which module lacks which doc (every empty cell is a concrete writing task, not a vague ‘needs docs’), and to keep the doc half of the delivery contract honest across the fleet. It is the doc axis of the §1g Compliance rollup, extended cross-repo to selfdef via §1h.'},
      {id:'—', dir:'ux-design-audit', label:'UX Design Audit', ico:'◓', desc:'The UX design-stage audit — consistency/accessibility scoring across the panels.', menuHover:'The experience audit — scoring surfaces on six operator-named UX dimensions (action-budget, discoverable, recoverable, next-step, operator-named, readable-30s), because a feature can render perfectly and still fail its operator. It is the exact bar this very cockpit is held to: a surface that works but takes ten clicks, hides its controls, punishes mistakes, or needs a manual to read is not done. It answers ‘is each surface actually usable, not just correct.’ Open it to see which surface is weak on which quality (every low cell is a concrete fix, like ‘add a next-step’ or ‘use the operator’s words’), and to keep usability from being the silent gap behind ‘it technically works.’ It is the UX axis of the §1g Compliance rollup, and the reason ‘it works’ was never enough.'},
      {id:'—', dir:'feature-test-lab', label:'Feature Test Lab', ico:'🧪', desc:'Live per-feature testing — click Run to exercise a shipped feature for real and watch result / path-taken / timing / pass-fail checks.', menuHover:'The hands-on proving ground — where you drive each shipped feature yourself and watch it work, not a unit-test report but a live bench. Every card runs one real capability: the backend cards shell the actual Rust kernel through sovereign-feature-selftest so a SIMD sum-of-squares or a safetensors load runs on this box and reports the code path it took (which AVX tier fired, which dequant branch), the wall-clock it took, and a pass/fail on each internal check; the client cards exercise in-page cockpit behavior. It answers a question the status panels cannot: not ‘does the config say this is on’ but ‘does it actually do the thing, right now, on this hardware.’ Open it to confirm a feature works after a change, to see the real path and timing a capability takes rather than trust the spec, or to demonstrate the box doing the thing end to end. It is the operator’s live-testing surface — deliberately not automated CI — and it reads real kernels, so a failing check here is a genuine regression, not a stale mirror.'},
      {id:'—', dir:'personalization', label:'Personalization', ico:'✦', desc:'Theme / accent / typography control (localStorage-backed) applied across all panels before paint.', menuHover:'Operator comfort, kept deliberately apart from machine state — theme, accent color, and typography scale for the cockpit, and nothing that touches the box’s behavior. It is the one panel where you genuinely cannot break anything: everything here is presentation, saved locally, so you can make the cockpit easy to read at the bench (larger, high-contrast) or dense at the desk without any risk to the machine. It answers ‘how do I make the cockpit comfortable for me.’ Open it to set the look, or to export and import your preferences as a cosmetic JSON that carries your look between machines with no box state or secrets in it. The strict separation of presentation from state is the point — this is the safe panel, on purpose.'},
      {id:'—', dir:'rustdoc-panel', label:'Rustdoc', ico:'🦀', desc:'The generated Rust kernel API docs — browse crate-level documentation, modules, types, and traits from the sovereign-os Rust codebase.', menuHover:'The Rust kernel documentation browser — every public crate, module, type, and trait in the sovereign-os Rust codebase, generated by rustdoc and served as a self-contained panel. It answers “what does this crate do, what are its types, and what traits does it implement” without leaving the cockpit. Open it when you are reading code and need the API surface of a module, when you want to understand how a subsystem is structured, or when you need the exact signature of a function the panels call. It is the human-readable face of the Rust codebase, kept current by the build pipeline, and the natural companion to the Code Console when you are working on or debugging the kernel.'},
    ]},
    {name:'Science & Simulation', items:[
      {id:'—', dir:'science', label:'Science Tools', ico:'⚛', desc:'The operator\'s science catalog — DNA / protein / particle tools. NVIDIA Warp (particles) is integrated: a differentiable particle sim on GPU (RTX PRO 6000) or CPU fallback. Read-only; running a sim is the gated sovereign-osctl science run.', menuHover:'The GPU as a scientific instrument — NVIDIA Warp compiling Python kernels to run simulation and numeric compute on the same Blackwell silicon (RTX PRO 6000 + RTX 5090) and RTX 4090 that serve inference, so the machine is a compute instrument, not only an inference server. It answers ‘what can the box compute for me beyond serving models, and is that capability ready.’ Open it to confirm Warp is live and which GPU it targets, to browse the available science tools, or to run a simulation — remembering that a heavy run competes for the very VRAM inference needs (watch D-09). It is the panel that shows the box is general-purpose compute you own, not a single-purpose appliance, and it draws on the same GPU budget the orchestration and hardware-pressure panels track.'},
      {id:'—', dir:'warp', label:'Warp Management', ico:'✵', desc:'Real management of the warp-solar-system-shaders NVIDIA-Warp engine — 217 scenes + 20 lib packages, the scene→lib / lib→lib relation graph drawn inline, and per-scene Render / Bench execution through the control-exec rail (GPU or CPU fallback).', menuHover:'The engine room of the box’s NVIDIA-Warp rendering project, made navigable and runnable. Where the Science panel catalogs Warp as one tool, this opens the whole warp-solar-system-shaders engine: 217 auto-discovered scene shaders and the 20 lib packages they are built from, with the real Python import graph between them drawn as a dependency map so you can SEE which scenes lean on which libs and how the libs stack. It answers ‘what is in this engine and how does it fit together’ — and then lets you act: each scene carries Render and Bench buttons that execute through the same sanctioned control-exec rail as every other privileged action (dry-run by default, type-to-confirm), or degrade to a copyable command where the panel is not fronted by the exec daemon. Open it to explore the engine’s structure, to render or benchmark a specific scene from the cockpit, or to understand the relations a flat catalog hides. The scene/lib catalog is generated from the project and committed, so it is the source of truth even though the shaders repo is not resident on the host.'},
      {id:'—', dir:'chromofold', label:'ChromoFold', ico:'🧬', desc:'ChromoFold compressed-domain search (SDD-400) — the GPU-resident, random-access, searchable entropy+index layer over the data an LLM runs on (KV, weights, MoE, adapters, prompt caches, token streams), from the ../chromoFold engine. Read-only status; opt-in and OFF by default.', menuHover:'The read-only face of the ChromoFold integration — a GPU-resident, searchable compression engine for the token- and tensor-shaped data an LLM runs on, composed ON TOP OF quantization (it is the lossless entropy + random-access + FM-index layer, not a quantizer). It answers ‘is the compressed-domain search engine present, and what can it do here’ — showing the bound C-ABI capabilities (packed-wavelet access/rank, the RRR self-index, and the Lane-A FM-index count/ranges/locate) read from the native capability descriptor. It is opt-in and OFF by default: with no engine checkout + GPU resident it honestly reports OFFLINE and never fabricates a result (SB-077); the real device search is the hardware-gated step, and this panel only ever reads (R10212). Open it to confirm the engine’s presence and ABI, to see which primitives are available, or to read where the integration stands. It sits beside the Warp panel — both surface the sibling warp-solar-system-shaders / ../chromoFold projects.'},
    ]},
  ];
  // Expose the catalog (labels + rich per-panel narratives) so the course
  // snippet can reuse them without duplicating the text — config/dashboard-
  // catalog.yaml stays the single source of truth. Set at parse time so the
  // course block (injected before </body>) always sees it.
  window.__soCatalog = GROUPS;
  var PKEY='sovereign-os.personalization', PSCHEMA=1;
  function loadPrefs(){ try{var r=localStorage.getItem(PKEY);var p=r?JSON.parse(r):null;if(!p||p.schema!==PSCHEMA)return{schema:PSCHEMA,theme:'auto',accent:'#9bd1ff',font_scale:1};return p;}catch(e){return{schema:PSCHEMA,theme:'auto',accent:'#9bd1ff',font_scale:1};} }
  function savePrefs(p){ try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){} }
  // assistant open/closed state — persisted separately so the exportable personalization profile stays cosmetic-only.
  var AKEY='sovereign-os.assist';
  function loadAssist(){ try{var r=localStorage.getItem(AKEY);var a=r?JSON.parse(r):null;return(a&&typeof a.open==='boolean')?a:null;}catch(e){return null;} }
  function saveAssist(open){ try{localStorage.setItem(AKEY,JSON.stringify({schema:1,open:!!open}));}catch(e){} }
  function applyTheme(p){ var r=(p.theme==='dark'||p.theme==='light')?p.theme:((window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');
    document.documentElement.setAttribute('data-theme',r);
    document.documentElement.style.setProperty('--accent',p.accent||'#9bd1ff'); document.documentElement.style.setProperty('--so-accent',p.accent||'#9bd1ff'); }
  var THEME_ICON={auto:'◑ auto',dark:'☾ dark',light:'☀ light'};
  function syncThemeBtn(p){ var b=document.getElementById('so-theme'); if(b) b.textContent=THEME_ICON[p.theme]||'◑ auto'; }
  function cycleTheme(){ var p=loadPrefs(); p.theme=p.theme==='auto'?'dark':p.theme==='dark'?'light':'auto'; savePrefs(p); applyTheme(p); syncThemeBtn(p); }
  function curDir(){ var seg=location.pathname.replace(/\/+$/,'').split('/'); return seg[seg.length-1]||''; }
  function findPanel(dir){ for(var g=0;g<GROUPS.length;g++){var it=GROUPS[g].items;for(var i=0;i<it.length;i++){if(it[i].dir===dir)return it[i];}} return null; }
  function el(h){ var d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function buildHeader(cur){
    var crumb = cur ? ('<b>'+esc(cur.id!=='—'?cur.id:'')+'</b> '+(cur.id!=='—'?'· ':'')+esc(cur.label)) : 'cockpit';
    document.body.appendChild(el(
      '<header id="so-header" role="banner"><div class="so-h-left">'+
        '<button class="so-h-btn" id="so-menu-toggle" title="Toggle sidemenu" aria-label="Toggle sidemenu">☰</button>'+
        '<span class="so-brand"><span class="mark">⬢</span> sovereign-os</span>'+
        '<span class="so-crumb">'+crumb+'</span></div>'+
      '<div class="so-h-right">'+
        '<span class="so-pill" title="data source"><span class="dot"></span> live ✓</span>'+
        '<button class="so-h-btn" id="so-palette" title="Command palette (⌘K)">⌘K</button>'+
        '<button class="so-h-btn" id="so-theme" title="Theme (auto / dark / light)">◑ auto</button>'+
        '<button class="so-h-btn" id="so-assist-toggle" title="Assistant (contextual help)">✦ Assist</button>'+
        '<button class="so-h-btn" id="so-compat-badge" hidden title="Compatibility findings — click to open the ⚖ pane" aria-label="Compatibility findings">⚖</button>'+
        '<button class="so-h-btn" id="so-settings-toggle" title="Settings" aria-label="Settings" aria-haspopup="true" aria-expanded="false">⚙</button>'+
      '</div></header>'));
  }
  function buildSidemenu(dir){
    var root='../';
    var html=GROUPS.map(function(g){
      var items=g.items.map(function(it){
        var a=it.dir===dir?' active':'';
        return '<a class="so-sm-item'+a+'" href="'+root+it.dir+'/" data-dir="'+it.dir+'" data-label="'+esc(it.label)+'" title="'+esc(it.label)+'">'+
          '<span class="ico">'+it.ico+'</span><span class="lbl">'+esc(it.label)+'</span><span class="id">'+esc(it.id!=='—'?it.id:'')+'</span></a>';
      }).join('');
      return '<div class="so-grp"><button class="so-grp-h" type="button"><span>'+esc(g.name)+'</span><span class="chev">▾</span></button><div class="so-grp-items">'+items+'</div></div>';
    }).join('');
    document.body.appendChild(el('<nav id="so-sidemenu" aria-label="dashboards"><div class="so-sm-filter"><input type="text" id="so-sm-search" placeholder="filter panels…" autocomplete="off"></div><div class="so-sm-scroll">'+html+'</div></nav>'));
  }
  function buildAssistant(cur){
    var help=(cur&&cur.desc)||(cur?('The '+cur.label+' cockpit panel.'):'A cockpit panel.');
    var title=cur?((cur.id!=='—'?esc(cur.id)+' ':'')+esc(cur.label)):'this panel';
    document.body.appendChild(el(
      '<aside id="so-assist" role="complementary" aria-label="assistant"><div class="so-assist-h"><span class="t"><span class="spark">✦</span> Assistant</span>'+
        '<button class="so-h-btn" id="so-assist-speak" title="Read this pane aloud" aria-label="Read assistant pane aloud" aria-pressed="false" style="margin-left:auto">🔊</button>'+
