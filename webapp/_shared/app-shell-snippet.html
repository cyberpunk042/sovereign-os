<!-- ─────────────────────────────────────────────────────────────────
M067 app-shell snippet — canonical source-of-truth (SDD-067).

The persistent cockpit chrome: a top HEADER (brand · breadcrumb ·
status pill · ⌘K launcher · theme toggle · ✦ Assistant) + a grouped
collapsible SIDEMENU + a client-side ASSISTANT drawer (contextual help).

The SIDEMENU is self-documenting: every link carries a real, strong
description (assistant data), sourced from config/dashboard-catalog.yaml
(the authoritative panel registry) — hovering / focusing a link surfaces
that panel's explanation in the Assistant drawer, and the same text is
the panel's own "This panel" help. Content elements a panel annotates
with data-assist get their own hover-help + a guided tour that walks them.

Per the sovereignty-clean doctrine there is NO shared runtime asset — this
block (catalog + all descriptions included) is duplicated verbatim into
each adopted panel's <body> by scripts/webapp/sync-app-shell.py and
enforced identical by tests/lint/test_app_shell_contract.py. The catalog
is generated from config/dashboard-catalog.yaml; to change a description,
edit the yaml and regenerate (single source of truth).

Distribution: the generator injects THIS block as the first child of
<body>. At DOMContentLoaded the script reparents the panel's existing body
content into a #so-content wrapper (moves nodes, never rewrites) and
appends the fixed header / sidemenu / assistant as siblings, then offsets
#so-content by the chrome. No per-panel markup is edited.

Integrates with the four existing canonical <head> snippets (theme toggle
reuses the sovereign-os.personalization key; ⌘K button dispatches to the
palette; hover-help fires on keyboard focus for a11y; sidemenu goes off-
canvas at the existing ≤1024px breakpoint). Chrome is ghost/.btn — NEVER
`.primary`, NEVER server-mutating. Motion gated by prefers-reduced-motion.
──────────────────────────────────────────────────────────────────── -->

        return '<a class="so-sm-item'+a+'" href="'+root+it.dir+'/" data-dir="'+it.dir+'" data-label="'+esc(it.label)+'" title="'+esc(it.label)+'">'+
          '<span class="ico">'+it.ico+'</span><span class="lbl">'+esc(it.label)+'</span><span class="id">'+esc(it.id!=='—'?it.id:'')+'</span></a>';
      }).join('');
      return '<div class="so-grp"><button class="so-grp-h" type="button"><span>'+esc(g.name)+'</span><span class="chev">▾</span></button><div class="so-grp-items">'+items+'</div></div>';
    }).join('');
    document.body.appendChild(el('<nav id="so-sidemenu" aria-label="dashboards"><div class="so-sm-filter"><input type="text" id="so-sm-search" placeholder="filter panels…" autocomplete="off"></div><div class="so-sm-scroll">'+html+'</div></nav>'));
  }
  function buildAssistant(cur){
    var help=(cur&&cur.desc)||(cur?('The '+cur.label+' cockpit panel.'):'A cockpit panel.');
    var title=cur?((cur.id!=='—'?esc(cur.id)+' ':'')+esc(cur.label)):'this panel';
    document.body.appendChild(el(
      '<aside id="so-assist" role="complementary" aria-label="assistant"><div class="so-assist-h"><span class="t"><span class="spark">✦</span> Assistant</span>'+
        '<button class="so-h-btn" id="so-assist-close" title="Close" style="margin-left:auto">✕</button></div>'+
      '<div class="so-assist-body">'+
        '<div class="so-assist-sec"><h4>This panel — '+title+'</h4><div>'+esc(help)+'</div></div>'+
        '<div class="so-assist-sec"><h4>Focus / hover</h4><div id="so-assist-el"><span class="so-assist-hint">Hover a menu link or any highlighted control and its explanation appears here.</span></div></div>'+
        '<div class="so-assist-sec"><h4>Tour</h4><button class="so-h-btn" id="so-tour-btn" style="border-color:var(--border,#262626)">▶ Start tour</button> <span class="so-assist-hint" id="so-tour-status"></span></div>'+
      '</div></aside>'));
  }
  function wire(){
    document.getElementById('so-menu-toggle').addEventListener('click',function(){
      if(window.matchMedia('(max-width:1024px)').matches) document.body.classList.toggle('so-sm-open');
      else document.body.classList.toggle('so-sm-collapsed'); });
    document.getElementById('so-theme').addEventListener('click',cycleTheme);
    document.getElementById('so-assist-toggle').addEventListener('click',function(){document.body.classList.toggle('so-assist-open');});
    document.getElementById('so-assist-close').addEventListener('click',function(){document.body.classList.remove('so-assist-open');});
    document.getElementById('so-palette').addEventListener('click',function(){
      window.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true,bubbles:true}));
      window.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true})); });
    Array.prototype.forEach.call(document.querySelectorAll('.so-grp-h'),function(b){ b.addEventListener('click',function(){b.parentNode.classList.toggle('closed');}); });
    var s=document.getElementById('so-sm-search');
    s.addEventListener('input',function(){ var q=s.value.trim().toLowerCase();
      Array.prototype.forEach.call(document.querySelectorAll('.so-grp'),function(grp){ var any=false;
        Array.prototype.forEach.call(grp.querySelectorAll('.so-sm-item'),function(it){ var hit=!q||it.dataset.label.toLowerCase().indexOf(q)>=0||it.dataset.dir.toLowerCase().indexOf(q)>=0; it.style.display=hit?'':'none'; if(hit)any=true; });
        grp.style.display=any?'':'none'; }); });
    var box=document.getElementById('so-assist-el');
    function openAssist(){ if(!document.body.classList.contains('so-assist-open')) document.body.classList.add('so-assist-open'); }
    function clr(tg){ if(tg)tg.classList.remove('so-assist-hot'); }
    function reduced(){ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
    // render a gold-data card {id?,title?,msg,more?} into the drawer
    function renderCard(e,tg){ box.classList.add('hot');
      var h='';
      if(e.title) h+='<div class="lbl">'+(e.id?'<span class="id">'+esc(e.id)+'</span> ':'')+esc(e.title)+'</div>';
      h+='<div>'+esc(e.msg||'')+'</div>';
      if(e.more) h+='<button class="so-h-btn" id="so-more-btn" style="margin-top:.5rem;border-color:var(--border,#262626);font-size:.74rem">more ▾</button>'+
        '<div id="so-more" style="display:none;margin-top:.4rem;color:var(--muted,#8a8a8a)">'+esc(e.more)+'</div>';
      box.innerHTML=h;
      var mb=document.getElementById('so-more-btn');
      if(mb) mb.addEventListener('click',function(){ var d=document.getElementById('so-more'); var open=d.style.display!=='none'; d.style.display=open?'none':'block'; mb.textContent=open?'more ▾':'less ▲'; });
      if(tg)tg.classList.add('so-assist-hot'); openAssist(); }
    // ── unified gold-data target list: window.SO_ASSIST (selector→{title,msg,more}) ∪ inline [data-assist] ──
    var TARGETS=[], seen=[];
    function pushTarget(el,e){ if(!el||seen.indexOf(el)>=0) return; seen.push(el); TARGETS.push({el:el,title:e.title||'',msg:e.msg||'',more:e.more||''}); }
    try { var SA=window.SO_ASSIST; if(SA&&SA.length) SA.forEach(function(e){ if(!e||!e.sel) return;
      try { Array.prototype.forEach.call(document.querySelectorAll('#so-content '+e.sel),function(el){ pushTarget(el,e); }); } catch(x){} }); } catch(err){}
    Array.prototype.forEach.call(document.querySelectorAll('#so-content [data-assist]'),function(el){ pushTarget(el,{msg:el.getAttribute('data-assist')}); });
    TARGETS.sort(function(a,b){ var p=a.el.compareDocumentPosition(b.el); return (p&Node.DOCUMENT_POSITION_FOLLOWING)?-1:((p&Node.DOCUMENT_POSITION_PRECEDING)?1:0); });
    TARGETS.forEach(function(t){
      t.el.addEventListener('mouseenter',function(){renderCard(t,t.el);});
      t.el.addEventListener('focus',function(){renderCard(t,t.el);});
      t.el.addEventListener('mouseleave',function(){clr(t.el);});
      t.el.addEventListener('blur',function(){clr(t.el);}); });
    // every menu link explains its panel (catalog gold data)
    Array.prototype.forEach.call(document.querySelectorAll('.so-sm-item'),function(it){
      var p=findPanel(it.dataset.dir); if(!p) return; var e={title:p.label,id:(p.id!=='—'?p.id:''),msg:p.desc};
      it.addEventListener('mouseenter',function(){renderCard(e,it);});
      it.addEventListener('focus',function(){renderCard(e,it);});
      it.addEventListener('mouseleave',function(){clr(it);});
      it.addEventListener('blur',function(){clr(it);}); });
    // ── guided tour: walk the unified gold-data targets in DOM order ──
    var tour={i:-1,on:false}, tourBtn=document.getElementById('so-tour-btn'), tourStatus=document.getElementById('so-tour-status');
    function tourClear(){ TARGETS.forEach(function(t){ t.el.classList.remove('so-assist-hot'); }); }
    function tourEnd(){ tour.on=false; tourClear(); box.classList.remove('hot');
      box.innerHTML='<span class="so-assist-hint">Hover a menu link or any highlighted control and its explanation appears here.</span>';
      if(tourStatus) tourStatus.textContent=''; if(tourBtn) tourBtn.textContent='▶ Start tour'; }
    function tourShow(i){ if(i<0||i>=TARGETS.length){ tourEnd(); return; } tour.i=i; tourClear();
      var t=TARGETS[i]; t.el.classList.add('so-assist-hot');
      if(t.el.scrollIntoView) t.el.scrollIntoView({block:'center', behavior: reduced()?'auto':'smooth'});
      box.classList.add('hot');
      box.innerHTML=(t.title?'<div class="lbl">'+esc(t.title)+'</div>':'')+'<div style="margin-bottom:.5rem">'+esc(t.msg||'')+'</div>'+
        (t.more?'<div style="margin-bottom:.5rem;color:var(--muted,#8a8a8a)">'+esc(t.more)+'</div>':'')+
        '<div style="display:flex;gap:.4rem;align-items:center">'+
        '<button class="so-h-btn" id="so-tour-prev"'+(i===0?' disabled':'')+'>←</button>'+
        '<button class="so-h-btn" id="so-tour-next">'+(i===TARGETS.length-1?'done':'→')+'</button>'+
        '<span class="so-assist-hint">step '+(i+1)+' / '+TARGETS.length+'</span></div>';
      var pv=document.getElementById('so-tour-prev'), nx=document.getElementById('so-tour-next');
      if(pv) pv.addEventListener('click',function(){ tourShow(tour.i-1); });
      if(nx) nx.addEventListener('click',function(){ tour.i===TARGETS.length-1 ? tourEnd() : tourShow(tour.i+1); });
    }
    function tourStart(){ if(!TARGETS.length){ if(tourStatus) tourStatus.textContent='no annotated elements on this panel yet — the menu links (← left) each carry a description.'; return; }
      tour.on=true; openAssist(); if(tourBtn) tourBtn.textContent='✕ End tour'; tourShow(0); }
    if(tourBtn) tourBtn.addEventListener('click',function(){ tour.on ? tourEnd() : tourStart(); });
    window.addEventListener('keydown',function(ev){ if(!tour.on) return;
      if(ev.key==='ArrowRight'){ ev.preventDefault(); tour.i===TARGETS.length-1 ? tourEnd() : tourShow(tour.i+1); }
      else if(ev.key==='ArrowLeft'){ ev.preventDefault(); tourShow(Math.max(0,tour.i-1)); }
      else if(ev.key==='Escape'){ ev.preventDefault(); tourEnd(); } });
  }
  function init(){
    var dir=curDir(), cur=findPanel(dir);
    var content=document.createElement('div'); content.id='so-content';
    while(document.body.firstChild){ content.appendChild(document.body.firstChild); }
    document.body.appendChild(content);
    buildHeader(cur); buildSidemenu(dir); buildAssistant(cur); wire();
    applyTheme(loadPrefs()); syncThemeBtn(loadPrefs());
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>
