<!-- ─────────────────────────────────────────────────────────────────
M067 app-shell snippet — canonical source-of-truth (SDD-067).

The persistent cockpit chrome: a top HEADER (brand · breadcrumb ·
status pill · ⌘K launcher · theme toggle · ✦ Assistant) + a grouped
collapsible SIDEMENU + a client-side ASSISTANT drawer (hover / keyboard-
focus contextual help). It weaves the ~52 self-contained cockpit panels
into one product WITHOUT a shared runtime asset — per the sovereignty-
clean doctrine this block is duplicated verbatim into each adopted
panel's <body>, between the APP-SHELL:BEGIN / APP-SHELL:END markers,
by `scripts/webapp/sync-app-shell.py` and enforced by
`tests/lint/test_app_shell_contract.py`.

Distribution: the generator injects THIS block (everything between the
two markers below, inclusive) as the first child of <body>. The block
carries its own <style> + <script>; at DOMContentLoaded the script
reparents the panel's existing body content into a #so-content wrapper
(non-destructive — it moves nodes, never rewrites them) and appends the
fixed header / sidemenu / assistant as siblings, then offsets #so-content
by the chrome. No per-panel markup is edited.

Integrates with the four existing canonical <head> snippets:
  · personalization apply-snippet — the theme toggle reads/writes the
    SAME `sovereign-os.personalization` localStorage object, so theme
    stays a single source of truth (no FOUC, no divergence).
  · keyboard-nav (⌘K palette) — the header ⌘K button dispatches a
    synthetic Cmd-K so the existing palette opens; ⌘1..0 still work.
  · a11y — hover-help ALSO fires on keyboard focus; the skip-link still
    resolves (chrome is appended, #so-content keeps the content id).
  · responsive — sidemenu goes off-canvas ≤1024px, breadcrumb hides
    ≤600px; reuses the existing breakpoints, adds none.

Design grammar: all chrome controls are ghost/.btn — chrome is NEVER
`.primary` and NEVER executes anything server-side (it navigates + explains).
Motion is gated behind `prefers-reduced-motion`.
──────────────────────────────────────────────────────────────────── -->
<!-- APP-SHELL:BEGIN M067 -->
<style id="so-app-shell-style">
  :root{
    --so-header-h:48px; --so-sidemenu-w:244px; --so-sidemenu-w-collapsed:56px; --so-assist-w:340px;
  }
  #so-content{ margin-top:var(--so-header-h); margin-left:var(--so-sidemenu-w); }
  body.so-sm-collapsed #so-content{ margin-left:var(--so-sidemenu-w-collapsed); }
  body.so-assist-open #so-content{ margin-right:var(--so-assist-w); }
  @media (prefers-reduced-motion: no-preference){
    .so-h-btn,.so-sm-item,.so-grp-h,[data-assist]{transition:background .12s ease,border-color .12s ease,box-shadow .12s ease,transform .12s ease}
    #so-assist{transition:transform .18s ease} #so-sidemenu{transition:width .16s ease,transform .16s ease} #so-content{transition:margin .16s ease}
  }
  /* header */
  #so-header{position:fixed; top:0; left:0; right:0; height:var(--so-header-h); z-index:9500;
    display:flex; align-items:center; gap:.5rem; padding:0 .6rem;
    background:var(--panel,#171717); border-bottom:1px solid var(--border,#262626);
    color:var(--fg,#e6e6e6); font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; font-size:.82rem;}
  .so-h-left{display:flex; align-items:center; gap:.55rem; min-width:0;}
  .so-h-right{display:flex; align-items:center; gap:.35rem; margin-left:auto;}
  .so-h-btn{display:inline-flex; align-items:center; justify-content:center; gap:.35rem; height:30px;
    padding:0 .5rem; background:transparent; color:var(--fg,#e6e6e6); border:1px solid transparent;
    border-radius:6px; cursor:pointer; font:inherit; font-size:.82rem;}
  .so-h-btn:hover{background:color-mix(in srgb,var(--accent,#9bd1ff) 14%,transparent); border-color:color-mix(in srgb,var(--accent,#9bd1ff) 40%,transparent);}
  .so-brand{display:flex; align-items:center; gap:.4rem; font-weight:600; letter-spacing:.02em;}
  .so-brand .mark{color:var(--accent,#9bd1ff);}
  .so-crumb{color:var(--muted,#8a8a8a); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:40vw;}
  .so-crumb b{color:var(--fg,#e6e6e6); font-weight:600;}
  .so-pill{display:inline-flex; align-items:center; gap:.35rem; font-size:.72rem; color:var(--muted,#8a8a8a);
    border:1px solid var(--border,#262626); border-radius:999px; padding:.1rem .5rem;}
  .so-pill .dot{width:7px; height:7px; border-radius:50%; background:var(--ok,#7fd18a);}
  /* sidemenu */
  #so-sidemenu{position:fixed; top:var(--so-header-h); left:0; bottom:0; width:var(--so-sidemenu-w); z-index:9400;
    background:var(--panel,#171717); border-right:1px solid var(--border,#262626); display:flex; flex-direction:column; overflow:hidden;
    font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;}
  body.so-sm-collapsed #so-sidemenu{width:var(--so-sidemenu-w-collapsed);}
  .so-sm-filter{padding:.5rem; border-bottom:1px solid var(--border,#262626);}
  .so-sm-filter input{width:100%; height:28px; background:var(--bg,#0e0e0e); color:var(--fg,#e6e6e6);
    border:1px solid var(--border,#262626); border-radius:6px; padding:0 .5rem; font:inherit; font-size:.78rem; outline:none;}
  .so-sm-filter input:focus{border-color:var(--accent,#9bd1ff);}
  body.so-sm-collapsed .so-sm-filter{display:none;}
  .so-sm-scroll{flex:1; overflow-y:auto; padding:.25rem 0 1rem;}
  .so-grp-h{display:flex; align-items:center; gap:.4rem; width:100%; background:transparent; color:var(--muted,#8a8a8a);
    border:0; cursor:pointer; font:inherit; font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; padding:.5rem .7rem .25rem; text-align:left;}
  .so-grp-h .chev{margin-left:auto; transition:transform .12s ease;}
  .so-grp.closed .chev{transform:rotate(-90deg);} .so-grp.closed .so-grp-items{display:none;}
  body.so-sm-collapsed .so-grp-h{justify-content:center; font-size:0; padding:.4rem 0;} body.so-sm-collapsed .so-grp-h .chev{display:none;}
  .so-sm-item{display:flex; align-items:center; gap:.55rem; width:100%; text-decoration:none; color:var(--fg,#e6e6e6);
    background:transparent; border:0; border-left:2px solid transparent; cursor:pointer; font:inherit; font-size:.8rem; padding:.32rem .7rem; text-align:left;}
  .so-sm-item .ico{width:1.1rem; text-align:center; flex:none; opacity:.9;}
  .so-sm-item .lbl{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .so-sm-item .id{font-size:.64rem; color:var(--muted,#8a8a8a);}
  .so-sm-item:hover{background:color-mix(in srgb,var(--accent,#9bd1ff) 12%,transparent);}
  .so-sm-item.active{background:color-mix(in srgb,var(--accent,#9bd1ff) 18%,transparent); border-left-color:var(--accent,#9bd1ff);}
  body.so-sm-collapsed .so-sm-item{justify-content:center; padding:.4rem 0;} body.so-sm-collapsed .so-sm-item .lbl, body.so-sm-collapsed .so-sm-item .id{display:none;}
  /* assistant */
  #so-assist{position:fixed; top:var(--so-header-h); right:0; bottom:0; width:var(--so-assist-w); max-width:92vw; z-index:9450;
    background:var(--panel,#171717); border-left:1px solid var(--border,#262626); transform:translateX(100%); display:flex; flex-direction:column;
    font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--fg,#e6e6e6);}
  body.so-assist-open #so-assist{transform:translateX(0);}
  .so-assist-h{display:flex; align-items:center; gap:.5rem; padding:.6rem .8rem; border-bottom:1px solid var(--border,#262626);}
  .so-assist-h .t{font-weight:600; font-size:.85rem;} .so-assist-h .t .spark{color:var(--accent,#9bd1ff);}
  .so-assist-body{flex:1; overflow-y:auto; padding:.8rem; font-size:.82rem; line-height:1.5;}
  .so-assist-sec{margin-bottom:1.1rem;} .so-assist-sec h4{margin:0 0 .3rem; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted,#8a8a8a);}
  .so-assist-hint{color:var(--muted,#8a8a8a); font-style:italic;}
  #so-assist-el{border:1px dashed var(--border,#262626); border-radius:8px; padding:.6rem .7rem; background:var(--bg,#0e0e0e); min-height:3rem;}
  #so-assist-el.hot{border-color:var(--accent,#9bd1ff); border-style:solid;}
  [data-assist].so-assist-hot{outline:2px solid var(--accent,#9bd1ff); outline-offset:2px; border-radius:6px;}
  /* responsive — reuse the existing breakpoints */
  @media (max-width:1024px){
    #so-sidemenu{transform:translateX(-100%);} body.so-sm-open #so-sidemenu{transform:translateX(0); width:var(--so-sidemenu-w);}
    #so-content{margin-left:0 !important;} body.so-assist-open #so-content{margin-right:0 !important;}
  }
  @media (max-width:600px){ .so-crumb{display:none;} #so-assist{width:100vw;} }
</style>
<script>
(function(){
  "use strict";
  if (window.__soAppShell) return; window.__soAppShell = true;
  // ── full navigable catalog: groups → panels (draft taxonomy; Stage-4 makes this /catalog-driven) ──
  var GROUPS = [
    {name:'Overview', items:[
      {id:'D-00', dir:'master-dashboard', label:'master dashboard', ico:'◎'},
      {id:'—', dir:'surface-map', label:'surface map', ico:'\u{1f5fa}'},
      {id:'—', dir:'global-history', label:'global history', ico:'\u{1f551}'}]},
    {name:'Sessions & Memory', items:[
      {id:'D-01', dir:'d-01-active-sessions', label:'active sessions', ico:'▣'},
      {id:'D-07', dir:'d-07-memory-changes', label:'memory changes', ico:'✎'},
      {id:'D-08', dir:'d-08-rollback-points', label:'rollback points', ico:'↺'}]},
    {name:'Models & Inference', items:[
      {id:'D-02', dir:'d-02-profile-choices', label:'profile choices', ico:'◈'},
      {id:'D-03', dir:'d-03-model-health', label:'model health', ico:'♥'},
      {id:'D-10', dir:'d-10-eval-history', label:'eval history', ico:'∿'},
      {id:'D-11', dir:'d-11-adapter-status', label:'adapter status', ico:'⚙'},
      {id:'D-19', dir:'d-19-super-model-manifest', label:'super-model manifest', ico:'≣'},
      {id:'D-21', dir:'d-21-lm-orchestration', label:'LM orchestration', ico:'⛭'},
      {id:'D-22', dir:'d-22-lm-status-operability', label:'LM status', ico:'◐'},
      {id:'D-23', dir:'d-23-models-catalog', label:'model catalog', ico:'▤'}]},
    {name:'Cost & Load', items:[
      {id:'D-04', dir:'d-04-costs', label:'costs', ico:'$'},
      {id:'D-05', dir:'d-05-traces', label:'traces', ico:'⋮'},
      {id:'D-09', dir:'d-09-hardware-pressure', label:'hardware pressure', ico:'▰'},
      {id:'D-24', dir:'d-24-cpu-features', label:'CPU features', ico:'⊞'},
      {id:'—', dir:'ups', label:'UPS', ico:'\u{1f50b}'}]},
    {name:'Security & Trust', items:[
      {id:'D-06', dir:'d-06-pending-approvals', label:'pending approvals', ico:'✋'},
      {id:'D-13', dir:'d-13-filesystem-grants', label:'filesystem grants', ico:'\u{1f4c1}'},
      {id:'D-14', dir:'d-14-capability-tokens', label:'capability tokens', ico:'⚷'},
      {id:'D-15', dir:'d-15-sandboxes', label:'sandboxes', ico:'▢'},
      {id:'D-16', dir:'d-16-audit', label:'audit chain', ico:'☑'},
      {id:'D-17', dir:'d-17-quarantine', label:'quarantine', ico:'⚠'},
      {id:'D-18', dir:'d-18-trust-scores', label:'trust scores', ico:'★'},
      {id:'D-25', dir:'d-25-selfdef-management', label:'selfdef management', ico:'⛨'},
      {id:'—', dir:'auditor', label:'auditor', ico:'\u{1f50d}'},
      {id:'—', dir:'auth-tier', label:'auth tier', ico:'\u{1f511}'},
      {id:'—', dir:'compliance', label:'compliance', ico:'⚖'}]},
    {name:'Network', items:[
      {id:'D-12a', dir:'network-edge', label:'network edge', ico:'⇄'},
      {id:'D-12b', dir:'edge-firewall', label:'edge firewall', ico:'\u{1f6e1}'}]},
    {name:'System & Trinity', items:[
      {id:'D-20', dir:'d-20-peace-machine-health', label:'peace-machine health', ico:'☮'},
      {id:'—', dir:'trinity', label:'trinity', ico:'△'},
      {id:'—', dir:'weaver', label:'weaver', ico:'☲'},
      {id:'—', dir:'router', label:'router', ico:'⎈'},
      {id:'—', dir:'orchestration', label:'orchestration', ico:'⧉'},
      {id:'—', dir:'runtime-modes', label:'runtime modes', ico:'◑'}]},
    {name:'Build & Configure', items:[
      {id:'—', dir:'build-configurator', label:'build configurator', ico:'▶'},
      {id:'—', dir:'flash', label:'flash', ico:'⚡'},
      {id:'—', dir:'emulate', label:'emulate', ico:'◴'},
      {id:'—', dir:'profile-generation', label:'profile generation', ico:'⌘'},
      {id:'—', dir:'models-catalog', label:'models catalog', ico:'▤'},
      {id:'—', dir:'personalization', label:'personalization', ico:'✦'}]},
    {name:'Audits & Meta', items:[
      {id:'—', dir:'doc-coverage', label:'doc coverage', ico:'☷'},
      {id:'—', dir:'ux-design-audit', label:'UX design audit', ico:'◓'},
      {id:'—', dir:'anti-minimization-audit', label:'anti-minimization audit', ico:'⛶'},
      {id:'—', dir:'cpu-features', label:'cpu features (raw)', ico:'⊞'}]}
  ];
  var PANEL_HELP = {
    'd-04-costs':'Per-session and per-model spend with budget thresholds. Read-only — nothing here executes on the server.'
  };
  var PKEY='sovereign-os.personalization', PSCHEMA=1;
  function loadPrefs(){ try{var r=localStorage.getItem(PKEY);var p=r?JSON.parse(r):null;if(!p||p.schema!==PSCHEMA)return{schema:PSCHEMA,theme:'auto',accent:'#9bd1ff',font_scale:1};return p;}catch(e){return{schema:PSCHEMA,theme:'auto',accent:'#9bd1ff',font_scale:1};} }
  function savePrefs(p){ try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){} }
  function applyTheme(p){ var r=(p.theme==='dark'||p.theme==='light')?p.theme:((window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');
    document.documentElement.setAttribute('data-theme',r);
    document.documentElement.style.setProperty('--accent',p.accent||'#9bd1ff'); document.documentElement.style.setProperty('--so-accent',p.accent||'#9bd1ff'); }
  var THEME_ICON={auto:'◑ auto',dark:'☾ dark',light:'☀ light'};
  function syncThemeBtn(p){ var b=document.getElementById('so-theme'); if(b) b.textContent=THEME_ICON[p.theme]||'◑ auto'; }
  function cycleTheme(){ var p=loadPrefs(); p.theme=p.theme==='auto'?'dark':p.theme==='dark'?'light':'auto'; savePrefs(p); applyTheme(p); syncThemeBtn(p); }
  function curDir(){ var seg=location.pathname.replace(/\/+$/,'').split('/'); return seg[seg.length-1]||''; }
  function findPanel(dir){ for(var g=0;g<GROUPS.length;g++){var it=GROUPS[g].items;for(var i=0;i<it.length;i++){if(it[i].dir===dir)return it[i];}} return null; }
  function el(h){ var d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function buildHeader(cur){
    var crumb = cur ? ('<b>'+esc(cur.id)+'</b> · '+esc(cur.label)) : 'cockpit';
    document.body.appendChild(el(
      '<header id="so-header" role="banner"><div class="so-h-left">'+
        '<button class="so-h-btn" id="so-menu-toggle" title="Toggle sidemenu" aria-label="Toggle sidemenu">☰</button>'+
        '<span class="so-brand"><span class="mark">⬢</span> sovereign-os</span>'+
        '<span class="so-crumb">'+crumb+'</span></div>'+
      '<div class="so-h-right">'+
        '<span class="so-pill" title="data source"><span class="dot"></span> live ✓</span>'+
        '<button class="so-h-btn" id="so-palette" title="Command palette (⌘K)">⌘K</button>'+
        '<button class="so-h-btn" id="so-theme" title="Theme (auto / dark / light)">◑ auto</button>'+
        '<button class="so-h-btn" id="so-assist-toggle" title="Assistant (contextual help)">✦ Assist</button>'+
      '</div></header>'));
  }
  function buildSidemenu(dir){
    var root='../';
    var html=GROUPS.map(function(g){
      var items=g.items.map(function(it){
        var a=it.dir===dir?' active':'';
        return '<a class="so-sm-item'+a+'" href="'+root+it.dir+'/" data-dir="'+it.dir+'" data-label="'+esc(it.label)+'" title="'+esc(it.label)+'">'+
          '<span class="ico">'+it.ico+'</span><span class="lbl">'+esc(it.label)+'</span><span class="id">'+esc(it.id)+'</span></a>';
      }).join('');
      return '<div class="so-grp"><button class="so-grp-h" type="button"><span>'+esc(g.name)+'</span><span class="chev">▾</span></button><div class="so-grp-items">'+items+'</div></div>';
    }).join('');
    document.body.appendChild(el('<nav id="so-sidemenu" aria-label="dashboards"><div class="so-sm-filter"><input type="text" id="so-sm-search" placeholder="filter panels…" autocomplete="off"></div><div class="so-sm-scroll">'+html+'</div></nav>'));
  }
  function buildAssistant(cur){
    var help=(cur&&PANEL_HELP[cur.dir])||(cur?('The '+cur.label+' cockpit panel.'):'A cockpit panel.');
    var title=cur?(esc(cur.id)+' '+esc(cur.label)):'this panel';
    document.body.appendChild(el(
      '<aside id="so-assist" role="complementary" aria-label="assistant"><div class="so-assist-h"><span class="t"><span class="spark">✦</span> Assistant</span>'+
        '<button class="so-h-btn" id="so-assist-close" title="Close" style="margin-left:auto">✕</button></div>'+
      '<div class="so-assist-body">'+
        '<div class="so-assist-sec"><h4>This panel — '+title+'</h4><div>'+esc(help)+'</div></div>'+
        '<div class="so-assist-sec"><h4>Hovered element</h4><div id="so-assist-el"><span class="so-assist-hint">Hover any highlighted control and its explanation appears here.</span></div></div>'+
        '<div class="so-assist-sec"><h4>Tour</h4><div class="so-assist-hint">Guided walkthrough — coming in Stage 2.</div></div>'+
      '</div></aside>'));
  }
  function wire(){
    document.getElementById('so-menu-toggle').addEventListener('click',function(){
      if(window.matchMedia('(max-width:1024px)').matches) document.body.classList.toggle('so-sm-open');
      else document.body.classList.toggle('so-sm-collapsed'); });
    document.getElementById('so-theme').addEventListener('click',cycleTheme);
    document.getElementById('so-assist-toggle').addEventListener('click',function(){document.body.classList.toggle('so-assist-open');});
    document.getElementById('so-assist-close').addEventListener('click',function(){document.body.classList.remove('so-assist-open');});
    document.getElementById('so-palette').addEventListener('click',function(){
      window.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true,bubbles:true}));
      window.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true})); });
    Array.prototype.forEach.call(document.querySelectorAll('.so-grp-h'),function(b){ b.addEventListener('click',function(){b.parentNode.classList.toggle('closed');}); });
    var s=document.getElementById('so-sm-search');
    s.addEventListener('input',function(){ var q=s.value.trim().toLowerCase();
      Array.prototype.forEach.call(document.querySelectorAll('.so-grp'),function(grp){ var any=false;
        Array.prototype.forEach.call(grp.querySelectorAll('.so-sm-item'),function(it){ var hit=!q||it.dataset.label.toLowerCase().indexOf(q)>=0||it.dataset.dir.toLowerCase().indexOf(q)>=0; it.style.display=hit?'':'none'; if(hit)any=true; });
        grp.style.display=any?'':'none'; }); });
    var box=document.getElementById('so-assist-el');
    function show(t,tg){ box.classList.add('hot'); box.textContent=t; if(tg)tg.classList.add('so-assist-hot'); if(!document.body.classList.contains('so-assist-open'))document.body.classList.add('so-assist-open'); }
    function clr(tg){ if(tg)tg.classList.remove('so-assist-hot'); }
    Array.prototype.forEach.call(document.querySelectorAll('[data-assist]'),function(t){
      t.addEventListener('mouseenter',function(){show(t.getAttribute('data-assist'),t);});
      t.addEventListener('focus',function(){show(t.getAttribute('data-assist'),t);});
      t.addEventListener('mouseleave',function(){clr(t);});
      t.addEventListener('blur',function(){clr(t);}); });
  }
  function init(){
    var dir=curDir(), cur=findPanel(dir);
    // non-destructive reparent: move existing body content into #so-content, then append chrome as siblings
    var content=document.createElement('div'); content.id='so-content';
    while(document.body.firstChild){ content.appendChild(document.body.firstChild); }
    document.body.appendChild(content);
    buildHeader(cur); buildSidemenu(dir); buildAssistant(cur); wire();
    applyTheme(loadPrefs()); syncThemeBtn(loadPrefs());
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>
<!-- APP-SHELL:END M067 -->
