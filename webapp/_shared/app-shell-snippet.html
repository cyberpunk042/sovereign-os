<!-- ─────────────────────────────────────────────────────────────────
M067 app-shell snippet — canonical source-of-truth (SDD-067).

The persistent cockpit chrome: a top HEADER (brand · breadcrumb ·
status pill · ⌘K launcher · theme toggle · ✦ Assistant) + a grouped
collapsible SIDEMENU + a client-side ASSISTANT drawer (contextual help).

The SIDEMENU is self-documenting: every link carries a real, strong
description (assistant data), sourced from config/dashboard-catalog.yaml
(the authoritative panel registry) — hovering / focusing a link surfaces
that panel's explanation in the Assistant drawer, and the same text is
the panel's own "This panel" help. Content elements a panel annotates
with data-assist get their own hover-help + a guided tour that walks them.

Per the sovereignty-clean doctrine there is NO shared runtime asset — this
block (catalog + all descriptions included) is duplicated verbatim into
each adopted panel's <body> by scripts/webapp/sync-app-shell.py and
enforced identical by tests/lint/test_app_shell_contract.py. The catalog
is generated from config/dashboard-catalog.yaml; to change a description,
edit the yaml and regenerate (single source of truth).

The chrome navigates + explains and does not mutate server state, with ONE
sanctioned exception (R10212): the Assistant's "Ask" footer may POST to the
loopback chat (/api/code-console/chat, 127.0.0.1 only) — the same
non-mutating inference read-compute the Code Console / D-22 panels use. No
other fetch/XHR/sendBeacon/form-POST is permitted, and nothing crosses the
network. The ChatGPT / Claude buttons are the operator deliberately opening
their own question in an external tab (a navigation, not a box call).

Distribution: the generator injects THIS block as the first child of
<body>. At DOMContentLoaded the script reparents the panel's existing body
content into a #so-content wrapper (moves nodes, never rewrites) and
appends the fixed header / sidemenu / assistant as siblings, then offsets
#so-content by the chrome. No per-panel markup is edited.

Integrates with the four existing canonical <head> snippets (theme toggle
reuses the sovereign-os.personalization key; ⌘K button dispatches to the
palette; hover-help fires on keyboard focus for a11y; sidemenu goes off-
canvas at the existing ≤1024px breakpoint). Chrome is ghost/.btn — NEVER
`.primary`, NEVER server-mutating. Motion gated by prefers-reduced-motion.
──────────────────────────────────────────────────────────────────── -->

  .so-ctx-title{font-weight:600; font-size:.92rem; margin-bottom:.35rem;}
  .so-ctx-content{color:var(--fg-2,#c8c8c8); font-size:.8rem; line-height:1.55; white-space:pre-line;}
  /* interaction-path nodes */
  .so-node{padding:.55rem .65rem; margin:.5rem 0; border-left:2px solid transparent; border-radius:0 6px 6px 0; transition:background .12s ease,border-color .12s ease;}
  .so-node.in-chain{border-left-color:rgba(155,209,255,.18); opacity:.82;}
  .so-node.active{border-left-color:var(--accent,#9bd1ff); border-left-width:3px; background:rgba(155,209,255,.045); box-shadow:inset 0 0 22px rgba(155,209,255,.03);}
  .so-node-title{font-weight:600; font-size:.83rem; margin-bottom:.3rem;} .so-node-title .id{color:var(--accent,#9bd1ff); font-size:.72rem; font-weight:500;}
  .so-node-content{color:var(--fg-2,#c8c8c8); font-size:.8rem; line-height:1.55; white-space:pre-line;}
  .so-node-expanded{margin-top:.55rem; padding-top:.55rem; border-top:1px solid rgba(155,209,255,.13); font-size:.78rem; line-height:1.6; color:var(--muted,#a8a8a8); white-space:pre-line;}
  /* rich expanded cards */
  .so-card{border:1px solid var(--border,#262626); border-radius:7px; padding:.55rem .65rem; margin-top:.45rem; background:var(--bg,#0e0e0e); white-space:normal; line-height:1.55;}
  .so-card.info{border-color:rgba(155,209,255,.28); background:rgba(155,209,255,.035);}
  .so-card.ok{border-color:rgba(127,209,143,.34); background:rgba(127,209,143,.045);}
  .so-card.warn{border-color:rgba(224,192,122,.38); background:rgba(224,192,122,.05);}
  .so-card.err{border-color:rgba(224,138,138,.4); background:rgba(224,138,138,.055);}
  .so-card-label{font-weight:600; font-size:.79rem; margin-bottom:.3rem;}
  .so-card.ok .so-card-label{color:#7fd18f;} .so-card.warn .so-card-label{color:#e0c07a;} .so-card.err .so-card-label{color:#e08a8a;} .so-card.info .so-card-label{color:var(--accent,#9bd1ff);}
  .so-grid{display:grid; grid-template-columns:auto 1fr; gap:.22rem .6rem; margin:.35rem 0; font-size:.76rem; white-space:normal;}
  .so-grid .k{color:var(--accent,#9bd1ff); font-weight:500;}
  .so-li{margin:.2rem 0; font-size:.77rem; color:var(--fg-2,#c8c8c8);} .so-li .ok{color:#7fd18f;} .so-li .no{color:#e08a8a;} .so-li .warn{color:#e0c07a;}
  .so-xref{margin-top:.4rem; font-size:.76rem; color:var(--fg-2,#c8c8c8);} .so-xref .x{color:var(--accent,#9bd1ff); font-weight:500;}
  /* SDD-135 — sibling D-xx references in the assistant become deep links to ../<slug>/ */
  a.so-dxx-link{color:var(--accent,#9bd1ff); text-decoration:none; border-bottom:1px dotted var(--accent,#9bd1ff);} a.so-dxx-link:hover{border-bottom-style:solid;}
  .so-tip{margin-top:.4rem; font-size:.77rem; color:var(--muted,#a8a8a8);}
  .so-assist-idle{color:var(--muted,#8a8a8a); font-style:italic; padding:.4rem 0;}
  /* responsive — reuse the existing breakpoints */
  @media (max-width:1024px){
    #so-sidemenu{transform:translateX(-100%);} body.so-sm-open #so-sidemenu{transform:translateX(0); width:var(--so-sidemenu-w);}
    #so-content{margin-left:0 !important;} body.so-assist-open #so-content{margin-right:0 !important;}
  }
  @media (max-width:600px){ .so-crumb{display:none;} #so-assist{width:100vw;} }
  /* command palette (⌘K) — self-contained, supersedes the head-snippet palette */
  #so-cmdk-backdrop{position:fixed; inset:0; z-index:9600; display:none; align-items:flex-start; justify-content:center; padding-top:12vh;
    background:rgba(0,0,0,.55); font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;}
  #so-cmdk-backdrop.open{display:flex;}
  .so-cmdk-box{width:min(560px,92vw); max-height:70vh; display:flex; flex-direction:column; background:var(--panel,#171717);
    border:1px solid var(--accent,#9bd1ff); border-radius:8px; box-shadow:0 8px 32px rgba(0,0,0,.6); overflow:hidden;}
  #so-cmdk-input{width:100%; box-sizing:border-box; padding:.75rem 1rem; background:transparent; border:0; border-bottom:1px solid var(--border,#262626);
    color:var(--fg,#e6e6e6); font:inherit; font-size:1rem; outline:none;}
  #so-cmdk-results{overflow-y:auto; padding:.25rem 0;}
  .so-cmdk-row{display:flex; align-items:center; gap:.6rem; padding:.5rem .9rem; cursor:pointer; color:var(--fg,#e6e6e6); font-size:.86rem;}
  .so-cmdk-row:hover, .so-cmdk-row.active{background:color-mix(in srgb,var(--accent,#9bd1ff) 12%,transparent);}
  .so-cmdk-row .ico{width:1.2rem; text-align:center; flex:none; opacity:.9;}
  .so-cmdk-row .id{color:var(--accent,#9bd1ff); font-weight:600; font-size:.74rem; min-width:2.6rem;}
  .so-cmdk-row .lbl{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .so-cmdk-row .grp{font-size:.68rem; color:var(--muted,#8a8a8a);}
  .so-cmdk-foot{padding:.4rem .9rem; font-size:.7rem; color:var(--muted,#8a8a8a); border-top:1px solid var(--border,#262626);
    display:flex; gap:.9rem; flex-wrap:wrap;}
  .so-cmdk-foot kbd{background:var(--bg,#0e0e0e); border:1px solid var(--border,#262626); border-radius:3px; padding:0 .35rem; font-size:.68rem; color:var(--fg,#e6e6e6);}
  /* deep-link (#id permalink) transient highlight + keyboard affordances */
  .so-deeplink-hot{animation:so-dl-pulse 2.1s ease; border-radius:6px;}
  @keyframes so-dl-pulse{0%,100%{box-shadow:none;} 12%,55%{box-shadow:0 0 0 2px var(--accent,#9bd1ff),0 0 14px rgba(155,209,255,.5);}}
  .so-sm-item.kbsel{background:color-mix(in srgb,var(--accent,#9bd1ff) 22%,transparent); outline:1px solid var(--accent,#9bd1ff); outline-offset:-1px;}
  #so-keys-backdrop{position:fixed; inset:0; z-index:9600; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5);}
  #so-keys-backdrop.open{display:flex;}
  .so-keys-box{width:min(430px,92vw); background:var(--panel,#171717); border:1px solid var(--border,#262626); border-radius:10px; padding:1rem 1.15rem; font-size:.84rem; box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .so-keys-box h3{margin:0 0 .7rem; font-size:.92rem;} .so-keys-box .spark{color:var(--accent,#9bd1ff);}
  .so-keys-box dl{display:grid; grid-template-columns:auto 1fr; gap:.45rem .9rem; margin:0; align-items:center;}
  .so-keys-box dt{text-align:right; white-space:nowrap;} .so-keys-box dd{margin:0; color:var(--muted,#8a8a8a);}
  .so-keys-box kbd{background:var(--bg,#0e0e0e); border:1px solid var(--border,#262626); border-radius:3px; padding:0 .35rem; font-size:.72rem; color:var(--fg,#e6e6e6);}
  @media (prefers-reduced-motion: reduce){ .so-deeplink-hot{animation:none; outline:2px solid var(--accent,#9bd1ff); outline-offset:-2px;} }
  /* assistant "Ask" footer — hand off the current context to ChatGPT / Claude / the local AI */
  .so-ask{flex-shrink:0; border-top:1px solid var(--border,#262626); background:var(--panel,#171717); padding:.55rem .7rem .65rem;}
  .so-ask-h{display:flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--muted,#8a8a8a); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.4rem;}
  .so-ask-h .chev{margin-left:auto; transition:transform .12s ease; cursor:pointer;}
  .so-ask.collapsed .chev{transform:rotate(-90deg);} .so-ask.collapsed .so-ask-in, .so-ask.collapsed .so-ask-row, .so-ask.collapsed .so-ask-opt, .so-ask.collapsed .so-ask-ans{display:none;}
  .so-ask-opt{margin-top:.35rem;}
  .so-ask-chk{display:inline-flex; align-items:center; gap:.32rem; font-size:.72rem; color:var(--muted,#8a8a8a); cursor:pointer; user-select:none;}
  .so-ask-chk input{accent-color:var(--accent,#9bd1ff); margin:0;}
  .so-ask-in{width:100%; box-sizing:border-box; min-height:44px; max-height:120px; resize:vertical; background:var(--bg,#0e0e0e); color:var(--fg,#e6e6e6);
    border:1px solid var(--border,#262626); border-radius:6px; padding:.4rem .5rem; font:inherit; font-size:.78rem; line-height:1.45; outline:none;}
  .so-ask-in:focus{border-color:var(--accent,#9bd1ff);}
  .so-ask-row{display:flex; align-items:center; gap:.35rem; margin-top:.4rem; flex-wrap:wrap;}
  .so-ask-dev{height:26px; background:var(--bg,#0e0e0e); color:var(--fg,#e6e6e6); border:1px solid var(--border,#262626); border-radius:6px; font:inherit; font-size:.72rem; padding:0 .3rem;}
  .so-ask-btn{display:inline-flex; align-items:center; gap:.3rem; height:26px; padding:0 .5rem; cursor:pointer; font:inherit; font-size:.74rem;
    background:transparent; color:var(--fg,#e6e6e6); border:1px solid var(--border,#262626); border-radius:6px;}
  .so-ask-btn:hover{background:color-mix(in srgb,var(--accent,#9bd1ff) 14%,transparent); border-color:color-mix(in srgb,var(--accent,#9bd1ff) 40%,transparent);}
  .so-ask-btn.local{border-color:color-mix(in srgb,var(--accent,#9bd1ff) 45%,transparent);}
  .so-ask-ans{margin-top:.5rem; padding:.5rem .55rem; background:var(--bg,#0e0e0e); border:1px solid var(--border,#262626); border-radius:6px;
    font-size:.77rem; line-height:1.5; white-space:pre-wrap; word-break:break-word; max-height:34vh; overflow-y:auto; display:none;}
  .so-ask-ans.show{display:block;} .so-ask-ans .err{color:#e08a8a;} .so-ask-ans .meta{color:var(--muted,#8a8a8a); font-size:.7rem; margin-top:.35rem;}
  .so-ask-ans .oc{display:inline-block; margin-top:.4rem; color:var(--accent,#9bd1ff); font-size:.73rem; text-decoration:none;}
  .so-ask-ans .oc:hover{text-decoration:underline;}
