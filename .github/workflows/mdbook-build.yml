name: mdbook-build

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/mdbook-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  MDBOOK_VERSION: 0.4.40

permissions:
  contents: read

jobs:
  build:
    name: build mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: ${{ env.MDBOOK_VERSION }}
      - working-directory: docs
        run: mdbook build
