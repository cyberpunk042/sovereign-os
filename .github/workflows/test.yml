name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

permissions:
  contents: read

jobs:
  schema-lint:
    name: layer 1 — schema + lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml jsonschema
      - name: pytest layer 1
        run: |
          python3 -m pytest tests/schema tests/lint -v

  unit:
    name: layer 2 — unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml jsonschema
      - name: pytest layer 2
        run: |
          python3 -m pytest tests/unit -v

  layer3-stage-acceptance:
    name: layer 3 — stage acceptance (nspawn-style)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema
      - name: profile schema-validation (raw + resolved)
        run: |
          scripts/validate-profiles.sh
      - name: nspawn — whitelabel render to disk (mkosi substrate)
        run: |
          tests/nspawn/test_whitelabel_render_to_disk.sh sain-01
      - name: nspawn — whitelabel render to disk (live-build substrate + substrate-agnostic content)
        run: |
          tests/nspawn/test_whitelabel_render_live_build.sh sain-01
          tests/nspawn/test_whitelabel_render_live_build.sh minimal
      - name: nspawn — profile hook resolution
        run: |
          tests/nspawn/test_profile_hooks_resolve.sh sain-01
          tests/nspawn/test_profile_hooks_resolve.sh old-workstation
          tests/nspawn/test_profile_hooks_resolve.sh minimal
          tests/nspawn/test_profile_hooks_resolve.sh developer
          tests/nspawn/test_profile_hooks_resolve.sh headless
      - name: nspawn — orchestrator status surface
        run: |
          tests/nspawn/test_orchestrator_status.sh
      - name: nspawn — state lib (IaC restart-from-state)
        run: |
          tests/nspawn/test_state_lib.sh
      - name: nspawn — common lib (helpers + profile_field + confirm)
        run: |
          tests/nspawn/test_common_lib.sh
      - name: nspawn — mkosi adapter (substrate-pattern correctness)
        run: |
          tests/nspawn/test_mkosi_adapter.sh sain-01
          tests/nspawn/test_mkosi_adapter.sh old-workstation
          tests/nspawn/test_mkosi_adapter.sh minimal
          tests/nspawn/test_mkosi_adapter.sh developer
          tests/nspawn/test_mkosi_adapter.sh headless
      - name: nspawn — live-build adapter (ALT-A substrate + substrate-agnosticism)
        run: |
          tests/nspawn/test_live_build_adapter.sh sain-01
          tests/nspawn/test_live_build_adapter.sh minimal
      - name: nspawn — sovereign-osctl management surface (Q-019)
        run: |
          tests/nspawn/test_sovereign_osctl.sh
      - name: nspawn — orchestrator dry-run end-to-end (all 9 steps planned)
        run: |
          tests/nspawn/test_orchestrator_dry_run.sh sain-01
          tests/nspawn/test_orchestrator_dry_run.sh old-workstation
          tests/nspawn/test_orchestrator_dry_run.sh minimal
          tests/nspawn/test_orchestrator_dry_run.sh developer
          tests/nspawn/test_orchestrator_dry_run.sh headless
      - name: nspawn — orchestrator preflight (pre-install lifecycle hooks)
        run: |
          tests/nspawn/test_orchestrator_preflight.sh sain-01
          tests/nspawn/test_orchestrator_preflight.sh old-workstation
          tests/nspawn/test_orchestrator_preflight.sh minimal
          tests/nspawn/test_orchestrator_preflight.sh developer
          tests/nspawn/test_orchestrator_preflight.sh headless
      - name: nspawn — install configs lockstep (SDD-013 Q-008 gate)
        run: |
          tests/nspawn/test_install_configs.sh
      - name: nspawn — decommission gates (SDD-014 Q-014 gate)
        run: |
          tests/nspawn/test_decommission_gates.sh
      - name: nspawn — recurrent log-rotate
        run: |
          tests/nspawn/test_log_rotate.sh
      - name: nspawn — inference router HTTP spawn + classify()
        run: |
          tests/nspawn/test_inference_router_http.sh
      - name: nspawn — first-login assistant (Q-018 idempotency + state + force)
        run: |
          tests/nspawn/test_first_login_assistant.sh
      - name: nspawn — observability lib (SDD-016 Layer B emit_metric)
        run: |
          tests/nspawn/test_observability_lib.sh
      - name: nspawn — during-install gates (profile-conditioned skips + env-gate refusals)
        run: |
          tests/nspawn/test_during_install_gates.sh
      - name: nspawn — reproducibility inputs (SDD-019 wiring: SOURCE_DATE_EPOCH, DEBIAN_SNAPSHOT, sha256sums, in-toto)
        run: |
          tests/nspawn/test_reproducibility_inputs.sh
      - name: nspawn — kernel-step short-circuit (SDD-018 Q18-A: substrate-default profiles skip steps 02/03/04)
        run: |
          tests/nspawn/test_kernel_step_short_circuit.sh
      - name: nspawn — kernel-fetch SHA recording (step 02 against fake git remote)
        run: |
          tests/nspawn/test_kernel_fetch_sha_recording.sh
      - name: nspawn — whitelabel overlays substantive (Round 33: plymouth + grub themes carry operator motd)
        run: |
          tests/nspawn/test_whitelabel_overlays_present.sh
      - name: nspawn — inference start scripts (Round 34: argv shape + Layer B metrics + idempotency)
        run: |
          tests/nspawn/test_inference_start_scripts.sh
      - name: nspawn — new recurrent hooks (Round 35: security-update-check + backup-snapshot)
        run: |
          tests/nspawn/test_recurrent_new_hooks.sh
      - name: nspawn — image-sign gates (Round 39: SDD-015 posture none/shim/signed + PK preference)
        run: |
          tests/nspawn/test_image_sign_gates.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: lint scripts
        run: |
          find scripts -name '*.sh' -type f -print0 | \
            xargs -0 shellcheck --severity=warning --external-sources --source-path=scripts/build/lib || true
        # Currently warning-only; tighten to fail-on-error once all
        # scripts are shellcheck-clean.
