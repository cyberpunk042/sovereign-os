# yaml-language-server: $schema=../schemas/profile.schema.yaml
#
# developer — developer-workstation profile.
#
# Q-012 future-profile slot 2/3 (after minimal). Targets developer
# machines: full toolchain, debuggers, multiple language ecosystems,
# containers. Does NOT require AI-workstation hardware (no GPU
# requirement, no VFIO, no Tetragon perimeter, no ZFS).
#
# Typical hardware: x86-64-v3 desktop / laptop with 16+ GB RAM, single
# NVMe or SATA SSD, optional discrete GPU (not VFIO-bound).

schema_version: "1.0.0"

mixins:
  - role-developer
  - whitelabel-default
  - observability-tier-1

identity:
  id: developer
  name: "Developer Workstation"
  version: "0.1.0"
  parent: null
  status: draft
  maintainer: cyberpunk042
  description: |
    Developer-workstation profile: full polyglot toolchain (gcc/clang/
    rust/go/python/node), debuggers, containers, multiple editors. No
    AI-workstation coupling — works on commodity x86-64-v3 hardware
    with or without a discrete GPU. Q-012 future-profile demonstration
    that the schema can express interactive-dev shapes without
    requiring sovereign-os-specific hardware.

hardware:
  cpu:
    architecture: x86_64
    family: generic
    march: x86-64-v3
    features:
      required:
        - sse4_2
        - avx2
      preferred:
        - avx
        - fma
        - bmi2
    cores:
      physical: 4
      threads: 8
      topology: monolithic

  # Optional GPU — developer profile permits but doesn't require one
  gpu: []

  memory:
    minimum_gb: 8
    target_gb: 16
    type: ddr4
    ecc: false

  storage:
    layout: ext4
    devices:
      - role: rootfs
        type: nvme-pcie-4
        count: 1
        topology: single

  network:
    - role: lan
      speed_gbps: 1
      default_gateway: true

  motherboard:
    vendor: generic
    model: "consumer desktop / laptop"
    bios_pinned: false

kernel:
  source: substrate-default
  version_minimum: "6.1"
  packaging: substrate-default
  config:
    enable: []
    require_microcode: none
  cmdline:
    base:
      - quiet
      - splash
    secure_boot: shim   # developers commonly want third-party kernel modules; shim is the path

packages:
  base:
    - openssh-server
    - sudo
    - ca-certificates
    - curl
    - htop
  profile:
    - apt-utils
    - software-properties-common
    - lsb-release
  deny:
    - popularity-contest
    - apport
    - whoopsie
    - snapd
    - ubuntu-advantage-tools

hooks:
  pre_install:
    - id: friction-audit-spec
      type: validation
      script: scripts/hooks/pre-install/friction-audit-spec.sh
      mandatory: true
    - id: preflight-network
      type: validation
      script: scripts/hooks/pre-install/preflight-network.sh
      mandatory: false
    - id: preflight-storage
      type: validation
      script: scripts/hooks/pre-install/preflight-storage.sh
      mandatory: true

  during_install:
    - id: rootfs-format
      type: setup
      script: scripts/hooks/during-install/rootfs-format-ext4.sh
      mandatory: true

  post_install_first_boot:
    - id: workstation-shell-setup
      type: setup
      script: scripts/hooks/post-install/workstation-shell-setup.sh
      mandatory: false
    - id: first-login-assistant
      type: interactive
      script: scripts/hooks/post-install/first-login-assistant.sh
      mandatory: false
    - id: friction-audit-runtime
      type: validation
      script: scripts/hooks/post-install/friction-audit-runtime.sh
      mandatory: false

  decommission:
    - id: secure-wipe
      type: cleanup
      script: scripts/hooks/decommission/secure-wipe.sh
      mandatory: true

lifecycle:
  evolution_policy: replaceable
  supported_substrate:
    - "mkosi >= 23.0"
    - "live-build >= 20240101"
  supported_kernel:
    - "6.1.x"
    - "6.6.x"
    - "6.12.x"
  deprecation_target: null
  successor_profile: null

whitelabel:
  profile: default
  surfaces:
    - all
  legal_compliance: dfsg-only

observability:
  telemetry_sink: prometheus-local
  log_retention_days: 14
  audit_hooks:
    install: ~/.sovereign-os/log/install-${EPOCH}.log
    build: .sovereign-os-build/log/build-${EPOCH}.log
