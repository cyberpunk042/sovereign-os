# yaml-language-server: $schema=../schemas/profile.schema.yaml
#
# SAIN-01 — Sovereign AI Node default profile.
#
# Hardware target locked per the SAIN-01 milestone in
# cyberpunk042/devops-solutions-information-hub
# (wiki/backlog/milestones/sain-01-sovereign-node.md). Kernel /
# packages / hooks blocks are PLACEHOLDER — fill in at Stage 2+ once
# Gate 2 picks substrate (Q-001) and Q-006 (secure boot) + Q-008
# (installer) + Q-017 (inference backend) resolve.

schema_version: "1.0.0"

mixins:
  - role-workstation
  - whitelabel-default
  - observability-tier-1

identity:
  id: sain-01
  name: "SAIN-01 AI Workstation"
  version: "0.1.0"
  parent: null
  status: draft
  maintainer: cyberpunk042
  description: |
    Bare-metal AMD Zen 5 + dual-NVIDIA AI orchestration workstation
    with custom Zen-5-tuned kernel, ZFS-stratified storage, VFIO-
    isolated dual GPUs, kernel-level Tetragon perimeter, and the SRP
    Trinity runtime (Pulse / Weaver / Auditor). Default profile for
    sovereign-os; targets the operator's procured hardware per the
    SAIN-01 milestone in cyberpunk042/devops-solutions-information-hub.

hardware:
  cpu:
    architecture: x86_64
    family: amd-zen5
    march: znver5
    features:
      required:
        # avx512_fp16 removed 2026-06-10: verified absent on the physical
        # 9900X (/proc/cpuinfo) — AVX512-FP16 is Intel-only (Sapphire
        # Rapids+); Zen 5 ships BF16 but not FP16. Requiring it (and the
        # former -mavx512fp16 KCFLAG) would SIGILL on the target itself.
        # SDD-043: the tiered AVX-512 exploitation surface — every flag
        # verified PRESENT on the physical 9900X (/proc/cpuinfo 2026-07-02).
        # T1 foundation
        - avx512f          # VPTERNLOG{D,Q}, VPCOMPRESS{D,Q}
        - avx512cd         # VPCONFLICT / VPLZCNTD
        - avx512dq
        - avx512bw
        - avx512vl
        # T2 compute
        - avx512_vnni      # VPDPBUSD — INT8 fused MAC
        - avx512_bf16      # VDPBF16PS — BF16 dot
        - avx512_vpopcntdq # VPOPCNT{D,Q} — vector popcount (ternary accelerator)
        - avx512_vp2intersect # VP2INTERSECT{D,Q} — set-intersection masks
        - avx512ifma       # VPMADD52 — 52-bit integer FMA
        # T3 byte/permute
        - avx512vbmi       # VPERMB — 64-byte table permute (token permute)
        - avx512_vbmi2     # VPSHLDV / VPCOMPRESSB / VPEXPANDB
        - avx512_bitalg    # VPOPCNT{B,W} / VPSHUFBITQMB
      preferred:
        - gfni       # GF2P8AFFINEQB — Galois-field affine bit transforms
        - vaes       # vector AES
        - vpclmulqdq # vector carryless multiply
        - sha_ni
        - avx_vnni   # kernel /proc/cpuinfo flag name (was 'avxvnni')
        - movdiri
        - movdir64b
        - prefetchi
        - popcnt     # scalar population count — ternary/BitNet path (sovereign-bitops)
    cores:
      physical: 12
      threads: 24
      topology: dual-ccd
      partition:
        ccd0_mask: "0xfff"
        ccd1_mask: "0xff000"
        host_mask: "0xf00000"

  # GPU topology per SDD-993 (operator hardware change 2026-07-13) — three cards,
  # all installed in the build:
  #   PRIMARY (main)  = RTX PRO 6000 Blackwell 96GB — Oracle Core, internal x8.
  #   secondary       = RTX 5090 32GB (Blackwell GB202, 512-bit, power-limited
  #                     ~350W) — internal x8; the new card that took the 4090's
  #                     vacated internal slot.
  #   secondary/eGPU  = RTX 4090 24GB — OcuLink-to-M.2 on a CHIPSET M.2 slot
  #                     (PCIe 4.0 x4); host-resident by default, opt-in VFIO.
  # Two internal cards (PRO 6000 + 5090) => x8/x8 bifurcation; M.2_2 MUST stay
  # empty (it shares lanes with PCIEX16_2 where the 5090 sits) — the OcuLink 4090
  # is on a different (chipset) M.2 slot, NOT M.2_2.
  gpu:
    - vendor: nvidia
      model: rtx-pro-6000-blackwell
      pci_id: "10de:2bb4"   # GB202GL RTX PRO 6000 Blackwell — verify via lspci -nn at the physical build
      audio_fn: "10de:22e8"
      vram_gb: 96
      role: primary   # MAIN card — Oracle Core (large-VRAM); installed, in the build
      driver: nvidia-570-open   # Blackwell needs >=570 (trixie's 550 predates it)
      tdp_watts: 300   # Max-Q edition (300W), NOT the 600W workstation card — the installed SAIN card is the RTX PRO 6000 Blackwell Max-Q
      link: pcie-5.0-x8   # internal, PCIEX16_1 — x8 in the two-internal-card bifurcation
    - vendor: nvidia
      model: rtx-5090
      sku: TUF-RTX5090-O32G-GAMING
      pci_id: "10de:2b85"   # GB202 GeForce RTX 5090 — spec ID; verify via lspci -nn at the physical build
      vram_gb: 32
      role: secondary   # new card; Blackwell 512-bit like the PRO 6000; internal x8
      driver: nvidia-570-open
      tdp_watts: 350   # power-limited from the 575W stock TGP via `nvidia-smi -pl 350` (~61% of stock, near the efficiency knee)
      link: pcie-5.0-x8   # internal, PCIEX16_2 — x8; shares lanes with M.2_2 (which MUST stay empty)
    - vendor: nvidia
      model: rtx-4090
      pci_id: "10de:2684"
      vram_gb: 24
      # DEFAULT: host-resident (bare-metal) — the operator works locally on the
      # workstation, so the 4090 is directly available to the host inference stack
      # (Logic Engine / speculative-decoding draft). SDD-993 + operator directive
      # 2026-07-13: "I want to be able to work locally on my workstation most of
      # the time, not in a VM by default."
      #
      # OPT-IN VFIO SANDBOX: set `role: vfio` to hand this GPU to the isolated
      # sandbox (§17 dual-GPU SRP perimeter) — vfio-bind-4090.sh then binds it to
      # vfio-pci at boot using vfio_companion. With role=egpu the bind hook is a
      # clean no-op. The isolation machinery is preserved either way.
      role: egpu
      vfio_companion: "10de:22ba"   # audio fn — used only when role=vfio (opt-in sandbox)
      connection: oculink-m2   # OcuLink-to-M.2 (SFF-8612 -> SFF-8611) adapter in a CHIPSET M.2 slot (the "remaining nvme slot") — NOT M.2_2
      tdp_watts: 350
      link: pcie-4.0-x4   # 64 Gbps; adequate for inference (weights VRAM-resident), not for training/cross-link tensor-parallel

  memory:
    minimum_gb: 128
    target_gb: 256
    type: ddr5
    ecc: false

  storage:
    layout: zfs-tiered
    devices:
      - role: rootfs
        type: nvme-pcie-5
        count: 2
        topology: raid0
    datasets:
      - name: tank/models
        recordsize: 1M
        compression: lz4
        redundant_metadata: most
        purpose: "100GB+ weight files; sequential reads; low-FS-metadata overhead"
      - name: tank/context
        recordsize: 16k
        compression: zstd-9
        copies: 2
        sync: always
        encryption: aes-256-gcm
        purpose: "state-fabric race-free atomic transitions (Weaver writes; Pulse + Auditor read)"
      - name: tank/agents
        recordsize: 128k
        compression: zstd-3
        encryption: aes-256-gcm
        purpose: "runtime cache + sub-agent scratch"

  network:
    # Master spec § 8 — asymmetric Zero-Trust segregation.
    # VLAN 100 (Management/Telemetry) on Intel 2.5GbE; VLAN 200 (Model
    # Ingestion/Storage) on Marvell 10GbE; Marvell MUST NOT carry the
    # default route (no outbound WAN access per master spec § 8 ASCII
    # topology diagram).
    - role: mgmt
      vendor: intel
      model: i226-v
      speed_gbps: 2.5
      vlan: 100
      default_gateway: true
      address: "10.0.100.50/24"   # master spec § 8.1 verbatim
      gateway: "10.0.100.1"
      dns_nameservers: ["10.0.100.1"]
      iface_hint: enp6s0           # master spec § 8.1 verbatim
    - role: data
      vendor: marvell
      model: aqc113c
      speed_gbps: 10
      vlan: 200
      mtu: 9000
      default_gateway: false
      address: "10.0.200.50/24"   # master spec § 8.1 verbatim
      iface_hint: enp5s0           # master spec § 8.1 verbatim

  motherboard:
    vendor: asus
    model: proart-x870e-creator
    bios_pinned: false
    pcie_constraints:
      # SDD-993: TWO internal cards — RTX PRO 6000 (PCIEX16_1) + RTX 5090
      # (PCIEX16_2) — run x8/x8. M.2_2 physically shares lanes with PCIEX16_2, so
      # populating M.2_2 would drop the 5090 to x4. M.2_2 MUST stay empty. The
      # 4090 OcuLink-to-M.2 adapter goes on a CHIPSET M.2 slot (the "remaining
      # nvme slot"), NOT M.2_2.
      - description: "M.2_2 MUST remain empty — it shares lanes with PCIEX16_2 (the RTX 5090 secondary); populating it drops the 5090 to x4. The OcuLink 4090 eGPU is on a separate chipset M.2 slot, not M.2_2."
        check: m2_2_empty
        severity: blocker
      - description: "RTX PRO 6000 + RTX 5090 (both internal, x8/x8) + RTX 4090 (OcuLink eGPU) must be in distinct IOMMU groups for clean VFIO binding; the eGPU sits on its own downstream PCIe path (naturally distinct group)"
        check: iommu_groups_distinct
        severity: blocker

kernel:
  source: kernel.org-stable
  version_minimum: "6.12"
  packaging: bindeb-pkg
  compile_flags:
    # NO VECTOR ISA IN KERNEL CODEGEN — root cause of the first boot
    # failure (2026-06-10, #UD in the first microseconds, firmware fell
    # back to the old OS): kernel code must never use FPU/vector regs
    # outside kernel_fpu_begin(), and at early boot XCR0 isn't configured
    # so the first compiler-emitted EVEX instruction traps. KCFLAGS lands
    # AFTER the kernel's protective -mno-sse/-mno-avx flags, and even bare
    # -march=znver5 re-implies AVX-512 — so the vector families are
    # explicitly re-disabled here. Zen 5 scheduling + scalar ISA (ABM,
    # ADX, BMI) stay. AVX-512 belongs to USERSPACE (Pulse/BitNet/vLLM)
    # and the kernel's own hand-written FPU-managed crypto paths.
    KCFLAGS: "-march=znver5 -mno-mmx -mno-sse -mno-sse2 -mno-avx -mno-avx2 -mno-avx512f -O3 -pipe -mabm -madx"
    KCPPFLAGS: "-march=znver5"
    KBUILD_BUILD_USER: "sovereign-os"
    KBUILD_BUILD_HOST: "sovereign-os"
  config:
    # Reconciled against a real 6.12 olddefconfig (first build, 2026-06-10):
    #   ATLANTIC → AQTION (driver dir is 'atlantic', Kconfig symbol is AQTION)
    #   ZFS removed — out-of-tree, built by zfs-dkms from packages (no CONFIG_ZFS upstream)
    #   AMD_IOMMU_V2 removed — folded into core AMD_IOMMU in kernel 6.7
    #   SECURITY_BPF_LSM removed — not a Kconfig symbol; BPF_LSM is the real one
    enable:
      - AQTION
      - VFIO_PCI
      - VFIO_IOMMU_TYPE1
      - INTEL_IOMMU
      - AMD_IOMMU
      - BPF_LSM
      - KVM_AMD
      - KVM_INTEL
    disable: []
    require_microcode: amd
  cmdline:
    base:
      - quiet
      - splash
      - "loglevel=3"
      # serial console: systemd auto-spawns serial-getty@ttyS0, whose
      # /etc/issue banner gives the QEMU smoke test (step 09) a real
      # userspace marker instead of a warn-skip — and gives ops a serial
      # console on hardware. First green button build, 2026-06-12.
      - "console=ttyS0"
    vfio:
      - "vfio-pci.ids=10de:2684,10de:22ba"
      - "amd_iommu=on"
      - "iommu=pt"
      - "pcie_aspm=off"
    secure_boot: signed
  modules:
    blacklist:
      - nouveau
    # Force-load ONLY modules that always succeed regardless of hardware.
    # nvidia was REMOVED (2026-07-08): force-loading it at boot makes
    # systemd-modules-load HARD-FAIL on any GPU-less boot (every QEMU/emulator
    # run — "could not insert 'nvidia_current_open': No such device") which
    # leaves the whole system `degraded` on every boot. On real hardware nvidia
    # autoloads by PCI modalias (alias pci:v000010DE… nvidia) the moment the GPU
    # is present, so force-loading is redundant there and fatal in a VM. Early
    # KMS is handled instead by the GPU-gated sovereign-nvidia-kms.service
    # (emitted by mkosi-emit), which loads nvidia-drm modeset=1 ONLY when a
    # 10de GPU exists — so the emulator boots clean AND the workstation gets KMS.
    load_at_boot:
      - zfs
      - vfio_pci

packages:
  base:
    - openssh-server
    - sudo
    - tmux
    - curl
    - git
    - python3-minimal
    - python3-pip
    - python3-yaml         # PyYAML — ~32 operator/dashboard daemons + provision.sh import yaml at runtime
    - python3-jsonschema   # catalog/profile schema conformance + perimeter overlap check
    - prometheus-node-exporter  # scrapes the Layer-B textfile collector (/var/lib/node_exporter/textfile_collector)
    - htop
    - jq
    - ca-certificates
  profile:
    # Reconciled against the real trixie snapshot archive (verified by
    # grepping the pinned snapshot's Packages indices, 2026-06-10):
    #   nvidia-open-kernel-dkms — correct name, lives in non-free (the
    #     original failure was the missing archive component, not the name)
    #   nvidia-container-toolkit removed — not in the Debian archive;
    #     installs at first boot from NVIDIA's libnvidia-container repo
    #     (operator-deps / first-boot layer)
    #   tetragon removed — not in the Debian archive; installs at first
    #     boot from Cilium's release tarball (tetragon-install hook —
    #     pinned version, checksum-verified — runs before
    #     tetragon-policy-load in the first-boot chain)
    # KNOWN LIMITATION: trixie ships nvidia 550.163, which predates the
    # Blackwell GB202 (PRO 6000 Max-Q). The image builds + boots; the
    # primary GPU needs a ≥570 driver at first boot (backports or NVIDIA
    # repo — same first-boot layer as nvidia-container-toolkit).
    - linux-image-${KERNEL_VERSION}-znver5
    - linux-headers-${KERNEL_VERSION}-znver5
    - nvidia-open-kernel-dkms
    - nvidia-driver
    - nvidia-smi
    - zfsutils-linux
    - zfs-dkms
    - podman
    - mokutil
    - sbsigntool
    # APC Smart-UPS (SMT2200C, SmartConnect) monitoring via NUT + the apc_modbus
    # driver (Modbus over TCP :502 on the embedded SmartConnect Ethernet port,
    # OR Modbus RTU / serial over the DSD TECH SH-RJ50A USB→RJ50 cable — the
    # USB-serial driver ftdi/ch341/cp210x/pl2303 is already in the znver5 kernel).
    # Native USB-HID (051d) is covered by usbhid-ups, also shipped by NUT. Feeds
    # power-status + the graceful soft-shutdown guard (runtime < 30 min).
    - nut-server                   # upsd + core drivers (usbhid-ups, apcsmart)
    - nut-client                   # upsc / upsmon / upsdrvctl
    - nut-modbus                   # apc_modbus driver (Modbus TCP/serial) — SMT2200C SmartConnect
                                   #   (Debian ships it split out; depends on libmodbus5)
  deny:
    - popularity-contest
    - apport
    - whoopsie
    - motd-news-config
    - snapd
    - ubuntu-advantage-tools

# ── prepacking: what gets BAKED into the image at build time so a flashed
#    SAIN-01 boots to a ready, self-hosting workstation (operator directive
#    2026-07-08: "prepack it well — I don't want to do everything manually
#    after boot"). Read by scripts/build/adapters/mkosi-emit.sh, which stages
#    the trees into mkosi.extra and runs scripts/build/provision-bake.sh inside
#    the image at postinst. Posture 'installed-off' = software present but the
#    security daemons (selfdef / ghostproxy) are NOT started — the operator
#    flips them on (SDD gates preserved).
provisioning:
  operator:
    username: operator
    # same bootstrap password as root (SOVEREIGN_OS_ROOT_PASSWORD) so the
    # operator can log in at the console immediately; root login stays enabled.
    password_from_root: true
    shell: /bin/bash
    groups: [sudo, podman, render, video, adm]
    home_repo: sovereign-os        # checkout/symlink of /opt/sovereign-os in ~operator
  bake:
    repo: true                     # stage the sovereign-os tree (+ .git + origin) → /opt/sovereign-os
    dev_tools: true                # node + @anthropic-ai/claude-code (global)
    selfdef: true                  # stage ~/selfdef → /opt/selfdef, build, install units
    root_modules: true             # stage ~/root-modules → /opt/root-modules, install (endpoint); legacy key root_ghostproxy still honored
    openclaw: true                 # SDD-705: stage the OpenClaw Node gateway daemon (installed-off; first-boot npm install + preconfig → local endpoint)
    open_computer: true            # SDD-706: stage the open-computer QEMU AI-sandbox (installed-off; first-boot QEMU/KVM + clone/build + base image + preconfig → local endpoint)
    dashboards: true               # deploy panels + enable the dashboard hub + all read-only panel APIs
    gui: true                      # install a desktop (GNOME) on the mkosi IMAGE so it boots to the dashboards.
                                   # NOTE: adds ~1GB+ (gnome-core + gdm3 + firefox). The root-reflash install
                                   # (install-sovereign-root.sh) always installs the GUI regardless; set this
                                   # false to keep the flash/emulate appliance image headless. Non-fatal on failure.
    livereload: true               # SDD-203: keep developing on the live /opt/sovereign-os checkout after flashing —
                                   # a broker offers open panels a refresh + each panel API self-re-execs in place
                                   # (no kill) on an edit to its own .py. Set false for a locked, non-dev image.
  firstboot: true                  # install + enable sovereign-firstboot.target + hardware hooks
  posture: installed-off           # selfdef + ghostproxy installed but NOT started on boot
  # Tetragon kernel-fence tuning (tetragon-policy-load.sh, Stage-2 depth).
  # Both keys are OPTIONAL and default to the shipped host-wide policy;
  # shown here as the documented tuning surface (commented = shipped default).
  # tetragon:
  #   scope: host                  # host (default) | container (enforce only in non-host mount namespaces)
  #   extra_allowed_binaries:      # ABSOLUTE paths appended to the base 4-binary allowlist
  #     - /usr/local/bin/ollama
  # Swappable boot frontend (SDD-704). The box boots to GNOME by default (today's
  # behaviour, least surprise); the dashboards-kiosk stack is ALSO staged so the
  # operator can flip to a fullscreen :8100 kiosk at any time with
  # `sovereign-osctl frontend set dashboards-kiosk` — no reflash. open-computer-kiosk
  # lands with its sandbox service (SDD-706); until then, selecting it hints to install it.
  frontend:
    default: gnome                 # gnome | dashboards-kiosk | open-computer-kiosk | none
    install: [gnome, dashboards-kiosk]   # stage both stacks so the live switch can pick either
  # Oracle-tier inference model (SDD-702). The vLLM Oracle Core (Blackwell,
  # sovereign-oracle-core.service) serves this from /mnt/vault/models;
  # inference-model-provision.sh downloads it there at first boot and points
  # ORACLE_MODEL at it. Operator-chosen upgrade from the repo's default
  # Nemotron-30B-A3B (which left ~66GB of the 96GB card idle) to the researched
  # best single-96GB fit. vLLM comes from operator-deps [pip]; serving stays
  # operator-launched per posture. (Pulse tier = BitNet ternary, Logic = Qwen3-Coder
  # keep their own defaults.)
  model:
    # E110: Nemotron-3-Nano-Omni-30B-Reasoning-BF16 — NVIDIA public HF repo,
    # ungated, verified-real. 60GB at BF16 fits the 96GB card with 36GB KV-
    # cache headroom; multimodal (vision+audio+text) any-to-any. Operator can
    # upgrade live to Llama-4-Scout (gated, needs HF token) via
    # sovereign-osctl models pull after setting SOVEREIGN_OS_HF_TOKEN.
    repo: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16
    local_dir: /mnt/vault/models/nemotron-3-nano-omni-30b-reasoning-bf16
    quantization: bf16
    min_free_gb: 80
  # OpenClaw preconfig (SDD-705). Points the Node gateway daemon at the LOCAL vLLM
  # Oracle endpoint so agents run on-box against the sovereign model — no external
  # provider, no baked channel credentials. Installed-off: `sovereign-osctl openclaw on`.
  openclaw:
    backend: local                             # SDD-707: default backend; swap live with `sovereign-osctl openclaw backend {local|anthropic}`
    endpoint: http://127.0.0.1:8787            # LOCAL Anthropic-Messages endpoint = the on-box safety-spine gateway (sovereign-gatewayd --http)
    model_id: local-oracle                     # local model id (served by the gateway over the direct stack)
    anthropic_endpoint: https://api.anthropic.com   # hosted Claude — used when backend=anthropic (real ANTHROPIC_API_KEY, operator-supplied, never baked)
    anthropic_model: claude-sonnet-4-6         # Claude model on the anthropic backend (operator can set any current Claude model)
    gateway_port: 18789                        # OpenClaw gateway bind (loopback)
    node_major: 24                             # NodeSource major (OpenClaw engines: >=24.15 <25 recommended, or >=22.22.3 <23); 24.x satisfies the recommended band
  # open-computer preconfig (SDD-706). The QEMU AI-sandbox runs on-box; its LLM backend
  # is our local vLLM endpoint (127.0.0.1 is auto-rewritten to the QEMU host gateway
  # 10.0.2.2 for the guest). Installed-off: `sovereign-osctl open-computer on`. Heavy
  # (~3GB base image + QEMU/KVM); provisioned at first boot, non-fatal + idempotent.
  open_computer:
    backend: local                             # SDD-707: default backend; swap live with `sovereign-osctl open-computer backend {local|anthropic}`
    endpoint: http://127.0.0.1:8787/v1         # LOCAL OpenAI-compat endpoint = the gateway shim (host side; 127.0.0.1 auto-rewritten to 10.0.2.2 in-guest)
    model_id: local-oracle                     # OPENAI_MODEL advertised to open-computer (local)
    anthropic_endpoint: https://api.anthropic.com/v1/   # hosted Claude OpenAI-compat endpoint — used when backend=anthropic (real key, operator-supplied, never baked)
    anthropic_model: claude-sonnet-4-6         # Claude model on the anthropic backend (operator can set any current Claude model)
    web_port: 9800                             # open-computer agent UI/control base port (kiosk target)
    repo: https://github.com/Mintplex-Labs/anything-llm   # sparse-cloned for the open-computer/ subdir
    base_image_url: https://cdn.anythingllm.com/support/open-computer/base-images/06_08_2026/x64-base-image.tar
    node_major: 22                             # open-computer declares no engines pin; Node 22 LTS is the safe target
  # NVIDIA ≥570 driver (SDD-701). trixie ships 550.163, which predates the
  # Blackwell GB202 (PRO 6000 Max-Q + 5090) — the baked nvidia-open-kernel-dkms
  # (550) is SUPERSEDED at first boot by the pinned open-kernel .run that
  # nvidia-driver-install.sh installs (operator choice: CUDA-repo-pinned runfile,
  # not distro backports). Under secure_boot=signed the .run signs the built
  # modules with the enrolled MOK (/var/lib/sovereign-os/mok) so nvidia loads.
  nvidia:
    driver_runfile_version: "570.172.08"   # pinned ≥570 open-kernel runfile — VERIFY the latest ≥570 patch exists at build (the hook fails loudly if the pinned URL 404s)
    runfile_url_base: "https://us.download.nvidia.com/XFree86/Linux-x86_64"
    kernel_module_type: open               # Blackwell REQUIRES the open kernel modules (proprietary modules do not support GB202)
  # APC Smart-UPS (SMT2200C, SmartConnect) power management. provision-bake arms
  # the graceful soft-shutdown guard (power.toml) + lays down the NUT base config
  # (skips the daemons on VMs); the ups-apc-setup first-boot hook auto-detects the
  # transport on real hardware — Modbus TCP (:502) → serial (/dev/ttyUSB) → USB-HID.
  power:
    enabled: true                  # master toggle — UNCHECK to build WITHOUT UPS + graceful
    #                              #   shutdown (mkosi-emit/provision-bake/provision.sh honor it)
    ups: apc-modbus                # NUT apc_modbus: Modbus TCP or serial, auto-detected
    ups_host: 192.168.1.69         # confirmed 2026-07-08: SMT2200C SmartConnect, MAC 28:29:86
    #                              #   (Schneider/APC), Modbus TCP :502 unit 1 verified live.
    #                              #   Tried first; if the DHCP lease moves the hook re-scans
    #                              #   the LAN for an APC on :502. Best: give it a DHCP reservation.
    slave_id: 1                    # Modbus unit id (LCD ▸ TCP Settings ▸ Slave ID)
    shutdown_minutes: 30           # soft shutdown when battery runtime < 30 min
    warn_lead_minutes: 15          # warn 15 min BEFORE that (→ heads-up at 45 min runtime)
    graceful_shutdown: true        # arm the guard (power.toml enabled = true)

hooks:
  pre_install:
    - id: friction-audit-spec
      type: validation
      script: scripts/hooks/pre-install/friction-audit-spec.sh
      mandatory: true

  during_install:
    - id: zfs-pool-create
      type: setup
      script: scripts/hooks/during-install/zfs-pool-create.sh
      mandatory: true
    - id: zfs-datasets-create
      type: setup
      script: scripts/hooks/during-install/zfs-datasets-create.sh
      mandatory: true
    - id: mok-enroll
      type: secure-boot
      script: scripts/hooks/during-install/mok-enroll.sh
      mandatory: false

  post_install_first_boot:
    - id: friction-audit-runtime
      type: validation
      script: scripts/hooks/post-install/friction-audit-runtime.sh
      mandatory: true
    - id: vfio-bind-4090
      type: setup
      script: scripts/hooks/post-install/vfio-bind-4090.sh
      mandatory: true
    # APC Smart-UPS (SMT2200C, SmartConnect): NUT apc_modbus auto-detect —
    # Modbus TCP (:502, SmartConnect Ethernet) → serial (/dev/ttyUSB, DSD TECH
    # cable) → native USB-HID (051d), verifying comms via upsc. Feeds the
    # graceful soft-shutdown at runtime < 30 min.
    - id: ups-apc-setup
      type: setup
      script: scripts/hooks/post-install/ups-apc-setup.sh
      mandatory: false
    - id: network-vlan-config
      type: network
      script: scripts/hooks/post-install/network-vlan-config.sh
      mandatory: true
    # Tetragon is not in the Debian archive — the daemon installs here
    # from Cilium's release tarball (pinned version, checksum-verified)
    # BEFORE tetragon-policy-load enables the kernel fence.
    - id: tetragon-install
      type: security
      script: scripts/hooks/post-install/tetragon-install.sh
      mandatory: true
    - id: tetragon-policy-load
      type: security
      script: scripts/hooks/post-install/tetragon-policy-load.sh
      mandatory: true
    - id: arc-clamp-128gb
      type: setup
      script: scripts/hooks/post-install/zfs-arc-clamp.sh
      mandatory: true
    - id: apply-workstation-hardening
      type: setup
      script: scripts/hooks/post-install/apply-workstation-hardening.sh
      mandatory: true
    - id: first-login-assistant
      type: interactive
      script: scripts/hooks/post-install/first-login-assistant.sh
      mandatory: false
    # SDD-046 — root-modules endpoint AI-agent safety envelope
    # (proxy mode DISABLED per operator directive 2026-07-03; mode
    # pinned endpoint inside the hook — auto-detect would promote this
    # dual-NIC host to bridge). Triple-gated: report-only until
    # SOVEREIGN_OS_CONFIRM_GHOSTPROXY_INSTALL=YES. mandatory: false
    # per Q-046-001 (checkout may not exist at first boot).
    - id: root-modules-endpoint-install
      type: security
      script: scripts/hooks/post-install/root-modules-endpoint-install.sh
      mandatory: false
    # E109: DFlash speculative-decoding library (optional; installed-off
    # if the operator hasn't requested it explicitly).
    - id: dflash-install
      type: setup
      script: scripts/hooks/post-install/dflash-install.sh
      mandatory: false

  post_install_recurrent:
    - id: zfs-scrub
      type: maintenance
      schedule: weekly
      script: scripts/hooks/recurrent/zfs-scrub.sh
    - id: tetragon-policy-verify
      type: security
      schedule: daily
      script: scripts/hooks/recurrent/tetragon-policy-verify.sh
    - id: model-catalog-sync
      type: maintenance
      schedule: daily
      script: scripts/hooks/recurrent/model-catalog-sync.sh
    - id: selfdef-sync
      type: maintenance
      schedule: weekly
      script: scripts/hooks/recurrent/selfdef-sync.sh
    - id: root-modules-verify
      type: security
      schedule: weekly
      script: scripts/hooks/recurrent/root-modules-verify.sh
    # R253 (SDD-026) — every minute, check the UPS advisory (NUT upsc → power-
    # status) and fire a GRACEFUL soft shutdown when battery runtime < 30 min.
    # Armed via /etc/sovereign-os/power.toml [graceful_shutdown] (provisioning
    # sets enabled=true, shutdown_minutes=30). No-op when no UPS is present.
    - id: power-shutdown-guard
      type: safety
      schedule: minutely
      script: scripts/hooks/recurrent/power-shutdown-guard.sh

  decommission:
    - id: secure-wipe-context
      type: cleanup
      script: scripts/hooks/decommission/secure-wipe-context.sh
      mandatory: true
    - id: zfs-pool-destroy
      type: cleanup
      script: scripts/hooks/decommission/zfs-pool-destroy.sh
      mandatory: true

lifecycle:
  evolution_policy: replaceable
  supported_substrate:
    - "mkosi >= 23.0"
    - "live-build >= 20240101"
  supported_kernel:
    - "6.12.x"
    - "6.13.x"
  deprecation_target: null
  successor_profile: null

whitelabel:
  profile: default
  surfaces:
    - all
  legal_compliance: dfsg-only

observability:
  telemetry_sink: prometheus-local
  log_retention_days: 30
  audit_hooks:
    tetragon: tank/context/security_audit.log
    install: ~/.sovereign-os/log/install-${EPOCH}.log
    build: .sovereign-os-build/log/build-${EPOCH}.log
  metrics_endpoint: "127.0.0.1:9090"
