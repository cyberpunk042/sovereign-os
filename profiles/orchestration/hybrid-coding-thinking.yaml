# yaml-language-server: $schema=../../schemas/orchestration-profile.schema.yaml
#
# Orchestration-intent profile (D-21). Workload intent: hybrid coding+thinking.
schema_version: "1.0.0"
orchestration_profile:
  id: hybrid-coding-thinking
  name: "Hybrid Coding and Thinking"
  description: |
    Runs coding (Logic / GPU 0) and reasoning (Oracle / GPU 1) concurrently,
    with Conductor (CPU) orchestrating between them. Use when a task interleaves
    writing code and reasoning about it — the two GPUs work in parallel.
  intent: hybrid
  hardware_profile_compat: [sain-01]
  allocations:
    - {agent_id: conductor_01, tier: pulse,  role: conductor, target_hardware: cpu,     core_mask: "0-7", engine: bitnet.cpp, model: BitNet-b1.58-3B,                    active: true}
    - {agent_id: logic_coder,  tier: logic,  role: logic,     target_hardware: "cuda:0",                   engine: vllm,       model: Qwen3-Coder-32B-Instruct,           active: true}
    - {agent_id: oracle_reason,tier: oracle, role: oracle,    target_hardware: "cuda:1",                   engine: vllm,       model: DeepSeek-R1-Distill-Llama-70B-FP16, active: true}
  observability:
    primary_metric: sovereign_os_inference_route_total
