# JSON Schema (Draft 2020-12) for sovereign-os model catalog.
#
# Master spec § 17 (The Genesis Trinity) names the 3 tiers — Pulse,
# Logic (Weaver), Oracle — and the master spec § 18 runtime profiles
# pin specific models to each tier. This catalog is the operator-facing
# canonical declaration of which models the system intends to host,
# their HuggingFace identifiers (where real), their tier mapping, and
# their status (verified-real / aspirational / operator-must-confirm).
#
# R212 extends the schema (1.0.0 → 1.1.0) with the model-class
# taxonomy operator named:
#   - class       — LLM / SLM / RLM / LoRA / TernaryLM / Embed / Vision …
#   - quantization — fp16 / bf16 / fp8 / int8 / int4 / int2 / ternary-1.58bit …
#   - size_class  — xs / s / m / l / xl / xxl
#   - purpose     — chat / reasoning / code / multimodal / embedding / agent …
#   - vram_gib_min — quantization-aware minimum VRAM for live inference
#   - base_model  — required when class=lora-adapter; the base model id
#                   the adapter attaches to
#
# Companion docs:
#   - models/catalog.yaml — instance document
#   - scripts/models/pull.sh — operator-runnable downloader
#   - scripts/models/verify.sh — verification against this declared catalog
#   - scripts/models/render-catalog-md.py — auto-renders operator doc
#   - profiles/runtime/*.yaml — runtime-profile-to-model bindings

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/cyberpunk042/sovereign-os/schemas/model-catalog.schema.yaml"
title: "sovereign-os model catalog"
type: object
required: [schema_version, catalog]
additionalProperties: false

properties:
  schema_version:
    type: string
    enum: ["1.0.0", "1.1.0"]   # 1.0.0 still valid for pre-R212 fixtures

  catalog:
    type: object
    required: [version, models]
    additionalProperties: false
    properties:
      version:
        type: string
        description: "Catalog revision identifier"
      description:
        type: string
        minLength: 30
      models:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/model"

$defs:
  model:
    type: object
    required: [id, tier, engine, status, license]
    additionalProperties: false
    properties:
      id:
        description: |
          Canonical model id as referenced in profiles/runtime/*.yaml
          (e.g. BitNet-b1.58-3B, Qwen-32B-Ternary-Quant). MAY be an
          aspirational name when the master spec calls one out but no
          real HF repo exists yet.
        type: string
        pattern: "^[A-Za-z0-9._-]+$"

      tier:
        description: |
          Master spec § 17 tier mapping. router=internal selector layer.
        type: string
        enum: [pulse, logic, oracle, router]

      engine:
        type: string
        enum: [bitnet.cpp, vllm, vllm-vulkan, llama.cpp, transformers, custom]

      status:
        type: string
        enum:
          - verified-real        # hf_repo_id confirmed live on HF Hub
          - aspirational         # master spec names this; no real repo (yet)
          - operator-must-confirm # candidate; operator hasn't decided

      license:
        description: |
          SPDX-ish license identifier or 'other' (matches HF metadata).
        type: string

      hf_repo_id:
        description: "HuggingFace repo id (author/name); required when status=verified-real"
        type: string
        pattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"

      hf_revision:
        description: "HF revision pin (commit sha or tag). Strongly recommended for verified-real."
        type: string

      closest_real_alternative:
        description: "When status=aspirational, the closest real HF repo the operator may substitute."
        type: string

      parameters_millions:
        description: "Approximate parameter count in millions. Operator-facing reality check vs profile vram_limit_bytes."
        type: number
        exclusiveMinimum: 0

      master_spec_section:
        description: "Master spec § anchor that introduces or pins this model."
        type: string

      runtime_profile_bindings:
        description: |
          The runtime-profile ids (master spec § 18) where this model
          appears. Cross-checked at L1 against profiles/runtime/*.yaml.
        type: array
        items:
          type: string
          enum:
            - ultra-sovereign-efficiency
            - high-concurrency-burst
            - deep-context-synthesis
            - dual-turing-serving   # SDD-714 — operator-additive § 18 profile

      operator_note:
        description: "Free-text operator-facing note (provenance, caveat, swap rationale)."
        type: string

      # ------------- R212 model-class taxonomy --------------

      class:
        description: |
          Model class — operator-facing taxonomy added in R212.
          Lets operators filter the catalog by what KIND of model
          this is, independent of the Trinity tier mapping.
        type: string
        enum:
          - llm              # general large language model (>7B params)
          - slm              # small language model (<7B params)
          - rlm              # reasoning language model (chain-of-thought tuned)
          - ternary-lm       # 1-bit/1.58-bit BitNet-style weights
          - lora-adapter     # low-rank adapter; requires `base_model`
          - embed            # embedding model
          - vision           # vision-only (image classifier, OCR)
          - multimodal       # any-to-any / vision+language / audio+language
          - code             # code-specialised LM
          - mixture          # mixture-of-experts router-gated
          - speculative      # draft model for speculative decoding
          - reranker         # cross-encoder / reranker

      quantization:
        description: |
          Weight quantization the catalog declares this model lands as.
          fp16/bf16/fp8 are native formats; int4/int8/int2 are integer
          quantizations; ternary-1.58bit is the BitNet form; gguf-*
          are llama.cpp's per-block schemes; awq/gptq are post-training
          schemes; nvfp4 is NVIDIA's Blackwell-native 4-bit FP format
          (operator §1g addition 2026-05-18 — Nemotron 3 Nano Omni
          NVFP4 checkpoint surface).
        type: string
        enum:
          - fp32
          - fp16
          - bf16
          - fp8
          - nvfp4       # Blackwell-native FP4 (operator §1g — Nemotron 3)
          - int8
          - int4
          - int2
          - ternary-1.58bit
          - awq
          - gptq
          - gguf-q4_k_m
          - gguf-q5_k_m
          - gguf-q6_k
          - gguf-q8_0

      size_class:
        description: |
          Operator-facing size bucket. xs = <1B, s = 1-7B, m = 7-30B,
          l = 30-70B, xl = 70-200B, xxl = >200B.
        type: string
        enum: [xs, s, m, l, xl, xxl]

      purpose:
        description: |
          Operator-readable purpose tags. Multiple allowed (a model
          can be useful for chat AND reasoning AND function-calling).
          'audio' added 2026-05-18 (operator §1g — Nemotron 3 Nano
          Omni includes ASR + long-audio understanding via
          Parakeet-TDT-0.6B-v2 audio encoder).
        type: array
        minItems: 1
        items:
          type: string
          enum:
            - chat
            - reasoning
            - code
            - multimodal
            - embedding
            - vision
            - audio           # operator §1g (Nemotron 3 Nano Omni — ASR + audio)
            - agent
            - function-calling
            - rag
            - speculation
            - reranking
            - distillation-base

      vram_gib_min:
        description: |
          Minimum VRAM (GiB) for live inference at this quantization +
          a small context (≤4k tokens, batch=1). Operator-facing
          reality check against gpu_vram_gib_min in module manifests.
        type: number
        exclusiveMinimum: 0

      base_model:
        description: |
          For class=lora-adapter: the catalog id of the base model
          this adapter attaches to. Required when class=lora-adapter.
        type: string
        pattern: "^[A-Za-z0-9._-]+$"

      context_window_tokens:
        description: |
          Maximum context window in tokens (e.g. 8192, 32768, 131072,
          1000000). Operator-facing reality check for long-context
          workloads.
        type: integer
        exclusiveMinimum: 0

    # status-specific required field rules
    allOf:
      - if:
          properties:
            status:
              const: verified-real
        then:
          required: [hf_repo_id]
      # R212: LoRA adapters MUST carry base_model.
      - if:
          properties:
            class:
              const: lora-adapter
        then:
          required: [base_model]
