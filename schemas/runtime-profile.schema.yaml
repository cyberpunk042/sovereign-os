$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/cyberpunk042/sovereign-os/schemas/runtime-profile.schema.yaml"
title: sovereign-os runtime-profile schema
description: |
  Schema for a runtime profile YAML at `profiles/runtime/<id>.yaml`.
  Runtime profiles materialize master spec § 18 — 3 explicit modes the
  operator can pick after install. Selection drives core pinning,
  inference backend deployment, GPU power states, and observability.

type: object
required:
  - schema_version
  - runtime_profile

properties:
  schema_version:
    type: string
    pattern: '^\d+\.\d+\.\d+$'

  runtime_profile:
    type: object
    required:
      - id
      - name
      - description
      - hardware_profile_compat
      - allocations
    properties:
      id:
        type: string
        pattern: '^[a-z][a-z0-9-]*$'
      name:
        type: string
      description:
        type: string
        minLength: 30
      hardware_profile_compat:
        type: array
        items:
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
        minItems: 1

      allocations:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - agent_id
            - target_hardware
            - engine
          # SDD-043 Phase 2 (Q-2 answered): an allocation binds its model
          # EITHER by a hardcoded `model` id OR by a `tier_intent` block the
          # VRAM-aware selector resolves against the catalog — exactly one.
          oneOf:
            - required: [model]
            - required: [tier_intent]
          properties:
            agent_id:
              type: string
              pattern: '^[a-z][a-z0-9_-]*$'
            tier:
              description: Maps allocation → inference router tier (start scripts look it up)
              type: string
              enum: [pulse, logic, oracle, router]
            target_hardware:
              # cpu | cuda:N | cuda:0,cuda:1 etc.
              type: string
              pattern: '^(cpu|cuda:[0-9](,cuda:[0-9])*)$'
            core_mask:
              # taskset-compatible (0-7 or 0,1,2,3 etc.)
              type: string
            vram_limit_bytes:
              type: integer
              minimum: 0
            tensor_parallel_size:
              type: integer
              minimum: 1
            pipeline_parallel_size:
              type: integer
              minimum: 1
            gpu_memory_utilization:
              type: number
              minimum: 0
              maximum: 1
            kv_cache_dtype:
              type: string
              enum: [fp8, fp16, bf16, int8]
            engine:
              type: string
              enum: [bitnet.cpp, vllm, vllm-vulkan, llama.cpp]
            model:
              type: string
            tier_intent:
              $ref: "#/$defs/tier-intent"
            runtime_invocation:
              type: string

      gpu_state:
        type: object
        properties:
          primary:
            $ref: "#/$defs/gpu-state"
          secondary:
            $ref: "#/$defs/gpu-state"

      expected_power_draw_watts:
        type: object
        additionalProperties:
          oneOf:
            - {type: number, minimum: 0}
            - {type: string}

      observability:
        type: object
        additionalProperties: true

      thinking_policy:
        $ref: "#/$defs/thinking-policy"

$defs:
  thinking-policy:
    description: |
      SDD-043 Phase 4 — per-profile orchestration policy for the thinking
      router (scripts/inference/thinking-plan.py). Declares WHEN a request
      escalates into a thinking flow and WHICH primitives compose it —
      chain-of-thought, a Validator pass/tier, self-consistency, MoE.
      Sparse: any omitted field falls back to the shipped DEFAULT_POLICY,
      so a profile overrides only what it wants. Nothing is cemented.
    type: object
    additionalProperties: false
    properties:
      escalate:
        type: object
        additionalProperties: false
        properties:
          task_types: {type: array, items: {type: string}}
          tiers: {type: array, items: {type: string}}
          explicit_flag: {type: string}
      think:
        type: object
        additionalProperties: false
        properties:
          enabled: {type: boolean}
          model_class:
            type: array
            items:
              type: string
              enum: [llm, slm, rlm, ternary-lm, lora-adapter, embed, vision,
                     multimodal, code, mixture, speculative, reranker]
      validate:
        type: object
        additionalProperties: false
        properties:
          mode: {type: string, enum: [pass, tier, "off"]}   # quote off — YAML would read it as false
          model_class:
            type: array
            items: {type: string}
      self_consistency:
        type: object
        additionalProperties: false
        properties:
          samples: {type: integer, minimum: 1}
      moe:
        type: object
        additionalProperties: false
        properties:
          enabled: {type: boolean}
          top_k: {type: integer, minimum: 1}

  tier-intent:
    description: |
      SDD-043 Phase 2 — declare a tier's model by INTENT instead of a
      hardcoded id. scripts/models/select-by-intent.py resolves this
      against models/catalog.yaml to the best concrete model +
      quantization that fits the VRAM budget, so 20+ OS×GPU1×GPU2 combos
      need not hand-pin every model per profile.
    type: object
    required: [class, vram_budget_gib]
    additionalProperties: false
    properties:
      class:
        description: Acceptable model classes, in preference order.
        type: array
        minItems: 1
        items:
          type: string
          enum: [llm, slm, rlm, ternary-lm, lora-adapter, embed, vision,
                 multimodal, code, mixture, speculative, reranker]
      vram_budget_gib:
        description: Max VRAM (GiB) the selector may spend on this tier.
        type: number
        exclusiveMinimum: 0
      purpose:
        description: Optional purpose tags the model must satisfy (any-of).
        type: array
        items: {type: string}
      min_context_tokens:
        type: integer
        minimum: 1
      prefer:
        description: verified-real (default) selects live HF models first.
        type: string
        enum: [verified-real, any]

  gpu-state:
    type: object
    required: [mode, command]
    properties:
      mode:
        type: string
        enum: [full-power, persistence-throttled, off]
      command:
        type: string
