# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/cyberpunk042/sovereign-os/schemas/profile.schema.yaml"
title: sovereign-os profile schema
description: |
  Declarative schema for a sovereign-os OS profile. Every
  profile in `profiles/<id>.yaml` MUST validate against this
  schema. See `docs/sdd/004-profile-schema.md` for the design
  rationale and inheritance semantics.

type: object
required: [schema_version, identity, hardware, kernel, packages, hooks, lifecycle]
additionalProperties: false

properties:

  schema_version:
    description: Version of this schema the profile targets (semver).
    type: string
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'

  mixins:
    description: Cross-cutting fragments composed into this profile (resolved before parent).
    type: array
    items:
      type: string
      pattern: '^[a-z0-9-]+$'

  identity:
    type: object
    required: [id, name, version, parent, status, maintainer, description]
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]*$'
        description: Unique profile slug; matches filename profiles/<id>.yaml
      name:
        type: string
        minLength: 1
      version:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
        description: Semver of the profile body
      parent:
        oneOf:
          - { type: string, pattern: '^[a-z0-9][a-z0-9-]*$' }
          - { type: 'null' }
        description: Single-parent inheritance; null = root profile
      status:
        type: string
        enum: [draft, active, deprecated, abandoned]
      maintainer:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 30

  hardware:
    type: object
    required: [cpu, memory, storage, network]
    additionalProperties: false
    properties:
      cpu:
        type: object
        required: [architecture, family, march, features, cores]
        additionalProperties: false
        properties:
          architecture: { type: string, enum: [x86_64, aarch64, riscv64] }
          family: { type: string }
          march: { type: string, description: "GCC -march= value" }
          features:
            type: object
            additionalProperties: false
            properties:
              required: { type: array, items: { type: string } }
              preferred: { type: array, items: { type: string } }
          cores:
            type: object
            required: [physical, threads]
            additionalProperties: false
            properties:
              physical: { type: integer, minimum: 1 }
              threads: { type: integer, minimum: 1 }
              topology:
                type: string
                enum: [single-ccd, dual-ccd, multi-ccd, tile-based, monolithic]
              partition:
                type: object
                additionalProperties: { type: string }
                description: Per-CCD/tile responsibility map; keys are operator-defined
      gpu:
        type: array
        items:
          type: object
          required: [vendor, model, role]
          additionalProperties: false
          properties:
            vendor: { type: string, enum: [nvidia, amd, intel] }
            model: { type: string }
            sku: { type: string, description: "Vendor board SKU, e.g. TUF-RTX5090-O32G-GAMING" }
            pci_id:
              type: string
              pattern: '^[0-9a-fA-F]{4}:[0-9a-fA-F?]{4}$'
            vram_gb: { type: integer, minimum: 1 }
            role:
              type: string
              # SDD-993: `egpu` = installed but attached via an external link
              # (OcuLink, see `connection`); `future` = a documented-but-not-yet-
              # installed upgrade path.
              enum: [primary, vfio, headless, secondary, egpu, future]
            driver: { type: string }
            vfio_companion:
              type: string
              pattern: '^[0-9a-fA-F]{4}:[0-9a-fA-F?]{4}$'
            audio_fn:
              type: string
              pattern: '^[0-9a-fA-F]{4}:[0-9a-fA-F?]{4}$'
              description: PCI id of the GPU's HDMI/DP audio function (same-IOMMU-group companion)
            tdp_watts:
              type: integer
              minimum: 1
              description: Board power limit in watts (distinguishes e.g. Max-Q 300W from the 600W workstation edition)
            connection:
              type: string
              description: "SDD-993: external attachment, e.g. oculink-m2 (OcuLink-to-M.2 eGPU). Absent = internal PCIe slot."
            link:
              type: string
              description: "Negotiated PCIe link, e.g. pcie-5.0-x16 or pcie-4.0-x4 (an OcuLink-M.2 eGPU runs x4)."
      memory:
        type: object
        required: [minimum_gb, type]
        additionalProperties: false
        properties:
          minimum_gb: { type: integer, minimum: 1 }
          target_gb: { type: integer, minimum: 1 }
          type:
            type: string
            enum: [ddr3, ddr4, ddr5, lpddr5, hbm2, hbm3]
          ecc: { type: boolean }
      storage:
        type: object
        required: [layout, devices]
        additionalProperties: false
        properties:
          layout:
            type: string
            enum: [zfs-tiered, btrfs, ext4, xfs, ostree]
          devices:
            type: array
            items:
              type: object
              required: [role, type]
              additionalProperties: false
              properties:
                role: { type: string, enum: [rootfs, data, swap, scratch] }
                type:
                  type: string
                  enum: [nvme-pcie-4, nvme-pcie-5, sata-ssd, sata-hdd, sas-hdd, optane, virtio-blk, virtio-scsi, nvme-of]
                count: { type: integer, minimum: 1 }
                topology:
                  type: string
                  enum: [single, raid0, raid1, raid10, raidz, raidz2, raidz3]
          datasets:
            type: array
            description: ZFS-specific; ignored for non-ZFS layouts
            items:
              type: object
              required: [name, purpose]
              additionalProperties: false
              properties:
                name: { type: string }
                recordsize: { type: string }
                compression:
                  type: string
                  enum: [off, lz4, zstd, "zstd-1", "zstd-3", "zstd-9", "zstd-19", gzip]
                copies: { type: integer, minimum: 1, maximum: 3 }
                sync:
                  type: string
                  enum: [standard, always, disabled]
                redundant_metadata:
                  type: string
                  enum: [all, most, some, none]
                encryption:
                  type: string
                  enum: [off, aes-256-gcm, aes-256-ccm]
                  description: "ZFS native encryption algorithm. Requires a key source (passphrase or file) at dataset creation time."
                purpose: { type: string }
      network:
        type: array
        items:
          type: object
          required: [role, speed_gbps]
          additionalProperties: false
          properties:
            role: { type: string, enum: [mgmt, data, wan, lan] }
            vendor: { type: string }
            model: { type: string }
            speed_gbps: { type: number }
            vlan: { type: integer, minimum: 0, maximum: 4094 }
            mtu: { type: integer, minimum: 576, maximum: 9216 }
            default_gateway: { type: boolean }
            # Master spec § 8.1 verbatim values (R158): when address +
            # gateway are present, the asymmetric-config renderer emits
            # the exact /etc/network/interfaces + systemd-networkd
            # blocks per § 8.1 rather than the generic DHCP fallback.
            address:
              type: string
              pattern: '^[0-9.]+/[0-9]{1,2}$'
              description: "CIDR address (e.g. 10.0.100.50/24)"
            gateway:
              type: string
              pattern: '^[0-9.]+$'
              description: "Gateway IP (mgmt role only; data role MUST omit)"
            dns_nameservers:
              type: array
              items: { type: string, pattern: '^[0-9.]+$' }
            iface_hint:
              type: string
              description: "Hint for kernel-discovered iface name (e.g. enp6s0)"
      motherboard:
        type: object
        additionalProperties: false
        properties:
          vendor: { type: string }
          model: { type: string }
          bios_pinned: { type: boolean }
          pcie_constraints:
            type: array
            items:
              type: object
              required: [description, check, severity]
              additionalProperties: false
              properties:
                description: { type: string }
                check: { type: string }
                severity:
                  type: string
                  enum: [blocker, warning, info]

  kernel:
    type: object
    required: [source, version_minimum]
    additionalProperties: false
    properties:
      source:
        type: string
        enum: [kernel.org-stable, xanmod, liquorix, substrate-default, custom]
      version_minimum: { type: string, pattern: '^[0-9]+\.[0-9]+$' }
      packaging:
        type: string
        enum: [bindeb-pkg, rpm, nix, substrate-default]
      compile_flags:
        type: object
        additionalProperties: { type: string }
      config:
        type: object
        additionalProperties: false
        properties:
          enable: { type: array, items: { type: string } }
          disable: { type: array, items: { type: string } }
          require_microcode:
            type: string
            enum: [amd, intel, none]
      cmdline:
        type: object
        additionalProperties: false
        properties:
          base: { type: array, items: { type: string } }
          vfio: { type: array, items: { type: string } }
          secure_boot:
            type: string
            enum: [signed, shim, disabled]
      modules:
        type: object
        additionalProperties: false
        properties:
          blacklist: { type: array, items: { type: string } }
          load_at_boot: { type: array, items: { type: string } }

  packages:
    type: object
    required: [base]
    additionalProperties: false
    properties:
      base: { type: array, items: { type: string } }
      role:
        type: object
        additionalProperties:
          type: array
          items: { type: string }
      profile: { type: array, items: { type: string } }
      deny: { type: array, items: { type: string } }

  hooks:
    type: object
    additionalProperties: false
    properties:
      pre_install: { $ref: "#/$defs/hookList" }
      during_install: { $ref: "#/$defs/hookList" }
      post_install_first_boot: { $ref: "#/$defs/hookList" }
      post_install_recurrent:
        type: array
        items:
          allOf:
            - { $ref: "#/$defs/hook" }
            - type: object
              required: [schedule]
      decommission: { $ref: "#/$defs/hookList" }

  lifecycle:
    type: object
    required: [evolution_policy]
    additionalProperties: false
    properties:
      evolution_policy:
        type: string
        enum: [frozen, append-only, replaceable]
      supported_substrate:
        type: array
        items: { type: string }
      supported_kernel:
        type: array
        items: { type: string }
      deprecation_target:
        oneOf:
          - { type: string, format: date }
          - { type: 'null' }
      successor_profile:
        oneOf:
          - { type: string }
          - { type: 'null' }

  whitelabel:
    type: object
    required: [profile, legal_compliance]
    additionalProperties: false
    properties:
      profile: { type: string }
      surfaces:
        type: array
        items: { type: string }
      legal_compliance:
        type: string
        enum: [dfsg-only, trademark-cleared, internal-only]

  observability:
    type: object
    additionalProperties: false
    properties:
      telemetry_sink:
        type: string
        enum: [prometheus-local, otel, none]
      log_retention_days: { type: integer, minimum: 0 }
      audit_hooks:
        type: object
        additionalProperties: { type: string }
      metrics_endpoint:
        type: string
        pattern: '^[0-9.]+:[0-9]+$'

  # Prepacking: what gets BAKED into the image at build time (read by
  # scripts/build/adapters/mkosi-emit.sh → scripts/build/provision-bake.sh).
  provisioning:
    type: object
    additionalProperties: false
    properties:
      operator:
        type: object
        additionalProperties: false
        properties:
          username: { type: string }
          password_from_root: { type: boolean }
          shell: { type: string }
          groups: { type: array, items: { type: string } }
          home_repo: { type: string }
      bake:
        type: object
        additionalProperties: false
        properties:
          repo: { type: boolean }
          dev_tools: { type: boolean }
          selfdef: { type: boolean }
          root_ghostproxy: { type: boolean }
          openclaw: { type: boolean }   # SDD-705: stage the OpenClaw Node gateway daemon (installed-off; first-boot npm install + preconfig)
          open_computer: { type: boolean }   # SDD-706: stage the open-computer QEMU AI-sandbox service (installed-off; first-boot clone+build+base-image+preconfig)
          dashboards: { type: boolean }
          gui: { type: boolean }   # install a desktop on the mkosi image (root-reflash always installs GUI)
          livereload: { type: boolean }   # SDD-203 live-reload on the installed box (default ON; false = locked build)
      firstboot: { type: boolean }
      posture:
        type: string
        description: installed-off = software present but security daemons not started on boot.
      # Tetragon kernel-fence tuning (Stage-2 policy depth). Both default
      # to the shipped host-wide L0 policy; tetragon-policy-load.sh reads them.
      tetragon:
        type: object
        additionalProperties: false
        properties:
          scope:
            type: string
            enum: [host, container]   # container = enforce only in non-host mount namespaces
          extra_allowed_binaries:
            type: array
            items: { type: string }   # ABSOLUTE binary paths appended to the base 4-binary allowlist
      # Swappable boot frontend (SDD-704). Selects what the box PRESENTS on the
      # display, independent of which AI runtimes are installed. `default` is baked
      # in; `install` lists the frontends whose stacks are staged so a later
      # `sovereign-osctl frontend set <value>` can switch live (no reflash).
      #   gnome               = the near-stock GNOME desktop + dashboards launcher (today's behaviour)
      #   dashboards-kiosk     = fullscreen kiosk to the :8100 dashboards hub
      #   open-computer-kiosk  = fullscreen kiosk to the open-computer sandbox UI (needs SDD-706 service)
      #   none                 = headless (multi-user.target)
      frontend:
        type: object
        additionalProperties: false
        properties:
          default:
            type: string
            enum: [gnome, dashboards-kiosk, open-computer-kiosk, none]
          install:
            type: array
            items:
              type: string
              enum: [gnome, dashboards-kiosk, open-computer-kiosk]
      # Pinned NVIDIA ≥570 open-kernel driver (SDD-701). trixie ships 550, which
      # predates Blackwell GB202 — nvidia-driver-install.sh installs the pinned .run at first boot.
      nvidia:
        type: object
        additionalProperties: false
        properties:
          driver_runfile_version: { type: string }   # pinned ≥570 open-kernel runfile version
          runfile_url_base: { type: string }          # NVIDIA download server base URL
          kernel_module_type: { type: string, enum: [open, proprietary] }  # Blackwell requires 'open'
      # Inference model provisioning (SDD-702). vLLM serves this on the 96GB card;
      # inference-model-provision.sh downloads it to tank/models at first boot.
      model:
        type: object
        additionalProperties: false
        properties:
          repo: { type: string }                 # HuggingFace repo id (gated repos need SOVEREIGN_OS_HF_TOKEN)
          local_dir: { type: string }            # where the weights land (under tank/models)
          quantization: { type: string }         # vLLM --quantization (e.g. fp8)
          min_free_gb: { type: number, minimum: 0 }  # refuse download below this free space
      # OpenClaw preconfiguration (SDD-705). When bake.openclaw is set, a first-boot
      # hook installs the Node gateway daemon and renders ~/.openclaw/openclaw.json
      # pointing at the LOCAL OpenAI-compatible endpoint below. Installed-off:
      # `sovereign-osctl openclaw on` starts it. No external channels are baked
      # (SDD-703 D5 — avoid baking credentials); the operator adds those later.
      openclaw:
        type: object
        additionalProperties: false
        properties:
          # SDD-707: two coexisting providers + a hotswap. `backend` picks which is
          # active at provision time; `sovereign-osctl openclaw backend {local|anthropic}`
          # flips it live (changes agents.defaults.model.primary). The cloud key is NEVER
          # baked — the operator supplies ANTHROPIC_API_KEY at runtime.
          backend: { type: string, enum: [local, anthropic] }   # active model backend (default local)
          endpoint: { type: string }             # LOCAL Anthropic-Messages base URL — the on-box safety-spine gateway (http://127.0.0.1:8787)
          model_id: { type: string }             # local model id advertised to OpenClaw (served by the gateway)
          anthropic_endpoint: { type: string }   # hosted Claude base URL (https://api.anthropic.com)
          anthropic_model: { type: string }      # Claude model id used on the anthropic backend
          gateway_port: { type: integer, minimum: 1, maximum: 65535 }   # OpenClaw gateway bind port (default 18789)
          node_major: { type: integer, minimum: 18 }   # NodeSource major to install if the baked node is too old for OpenClaw
      # open-computer preconfiguration (SDD-706). When bake.open_computer is set, a
      # first-boot hook installs QEMU/KVM + Node, clones + builds Mintplex open-computer
      # (a QEMU AI-VM sandbox), downloads its base.qcow2, and points its LLM backend at
      # the LOCAL endpoint below (the QEMU user-net rewrites 127.0.0.1 → 10.0.2.2 for the
      # guest). Installed-off: `sovereign-osctl open-computer on`. AGPL-3.0 — cloned at
      # first boot from upstream (not redistributed in our image).
      open_computer:
        type: object
        additionalProperties: false
        properties:
          # SDD-707: open-computer is OpenAI-format only, so the hotswap flips OPENAI_BASE_URL
          # between the LOCAL gateway shim and Anthropic's OpenAI-compat endpoint.
          # `sovereign-osctl open-computer backend {local|anthropic}` does it live. Cloud key never baked.
          backend: { type: string, enum: [local, anthropic] }   # active model backend (default local)
          endpoint: { type: string }             # LOCAL OpenAI-compat base URL — the gateway shim (http://127.0.0.1:8787/v1; 127.0.0.1 auto-rewritten to 10.0.2.2 in-guest)
          model_id: { type: string }             # OPENAI_MODEL advertised to open-computer (local)
          anthropic_endpoint: { type: string }   # hosted Claude OpenAI-compat base URL (https://api.anthropic.com/v1/)
          anthropic_model: { type: string }      # Claude model id used on the anthropic backend
          web_port: { type: integer, minimum: 1, maximum: 65535 }   # agent UI/control base port (open-computer default 9800)
          repo: { type: string }                 # upstream git repo to clone (sparse: the open-computer subdir)
          base_image_url: { type: string }        # base.qcow2 tar CDN url (updatable; sha256-verified)
          node_major: { type: integer, minimum: 18 }   # NodeSource major for the CLI + interface-service
      # APC Smart-UPS / graceful soft-shutdown (SDD-026). NUT apc_modbus:
      # Modbus over TCP (:502, SmartConnect) or serial, auto-detected.
      power:
        type: object
        additionalProperties: false
        properties:
          enabled: { type: boolean }               # master toggle for UPS + graceful shutdown (default true)
          ups: { type: string }                    # e.g. apc-modbus
          ups_host: { type: string }               # optional: pin the SmartConnect IP
          slave_id: { type: integer, minimum: 0, maximum: 247 }  # Modbus unit id
          shutdown_minutes: { type: number, minimum: 0 }
          warn_lead_minutes: { type: number, minimum: 0 }        # warn this long BEFORE shutdown
          graceful_shutdown: { type: boolean }

$defs:
  hook:
    type: object
    required: [id, type, script]
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]*$'
      type:
        type: string
        enum: [validation, setup, security, secure-boot, network, interactive, maintenance, cleanup, safety]
      script: { type: string }
      mandatory: { type: boolean }
      schedule:
        type: string
        description: Only meaningful for post_install_recurrent hooks; ignored elsewhere.
  hookList:
    type: array
    items: { $ref: "#/$defs/hook" }
