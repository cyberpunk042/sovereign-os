description = "Cockpit chord-capture recorder. arm() opens a recording session; record(modifiers, non_modifier_key) finalizes; cancel() drops. Rejects bare-modifier chords and the literal Escape key (reserved for cancel). last_captured() returns the most-recent capture; clear() drops it. Pure descriptor; the chrome supplies the raw event stream."

