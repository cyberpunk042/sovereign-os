description = "A sliding-window KV cache with attention sinks: retains the first N 'sink' tokens plus the most recent W tokens, evicting the middle, so attention memory stays bounded no matter how long generation runs. The bounded-memory attention policy for endless operation (distinct from the tiered VRAM/RAM/NVMe kv-cache, which is about placement). Feeds the attention kernel."

