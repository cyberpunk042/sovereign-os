description = "The M002 token-law bitset as a decode-time logit mask (SDD-500). Turns the M00117 token_law_combine allow-mask (sovereign-simd::cheats) into a per-token logit transform: a token whose allow-bit is 0 is set to -inf before sampling, so a running model CANNOT emit it. The FIRST real per-token call site of the M002 bit-machine — policy becomes bits, gating generation. A LogitProcessor for sovereign-logit-pipeline; wired into sovereign-decoder-stack's in-repo decode loop (not the external-proxy path, which exposes no logits)."

