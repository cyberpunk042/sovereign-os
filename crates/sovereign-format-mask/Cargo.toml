description = "Format-constrained decoding for byte-level models: a positional pattern of character classes (digits, letters, literals, custom sets) that yields the allowed next byte-tokens given how much has been generated, so output is forced to match a fixed structure (dates, ids, codes). Stateful grammar-lite decoding distinct from the static allow-list; pairs with the logit mask."

