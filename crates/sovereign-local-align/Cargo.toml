description = "Smith-Waterman local sequence alignment: finds the single highest-scoring matching subregion between two sequences (not the whole-length alignment of Needleman-Wunsch), returning its score, the span in each sequence, and the edit operations. For locating a quote or citation inside a document, fuzzy substring search, and grounding a generated span back to its source — generic over any comparable token, with a string convenience layer."

