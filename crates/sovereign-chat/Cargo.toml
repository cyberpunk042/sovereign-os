[package]
name = "sovereign-chat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "Multi-turn conversation management over the LLM runtime: tracks a role-tagged message history, renders it into a prompt, generates a reply, and appends it — with bounded history (keep the system message + the most recent turns) for endless dialogue. The chat layer above raw completion. Composes sovereign-llm."

