description = "Cuckoo filter: approximate set membership that, unlike a Bloom filter, supports deletion — stores small fingerprints in a cuckoo-hash table with two candidate buckets per item and relocates on collision. For sliding-window 'seen recently' sets where items must expire, with a tunable false-positive rate and no false negatives for present items."

