description = "The production decoder block: multi-head attention with grouped-query (GQA/MQA) KV sharing, per-head RoPE, precision-selectable projections (f32/ternary/NVFP4), and a SwiGLU FFN, in the pre-norm + residual structure. This is the block real models actually run — many query heads, fewer KV heads, low-bit weights. Composes sovereign-mha, sovereign-rope, sovereign-rmsnorm, sovereign-ffn, and sovereign-linear."

