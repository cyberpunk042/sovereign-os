description = "A token-bucket rate limiter for request throttling: refills at a steady rate up to a capacity (burst), and each request consumes tokens, allowing bursts while bounding the sustained rate. Time is injected (now_ms) so the limiter is fully deterministic and testable. Throttles request frequency, distinct from token-meter's token-budget counting."

