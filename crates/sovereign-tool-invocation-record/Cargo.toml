sovereign-tool-catalog = { path = "../sovereign-tool-catalog" }
sovereign-execution-mode-registry = { path = "../sovereign-execution-mode-registry" }
sovereign-profile-bundles = { path = "../sovereign-profile-bundles" }

[features]
default = []
