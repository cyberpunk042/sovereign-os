[package]
name = "sovereign-decoder-stack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "A complete decoder-only transformer model: token embedding -> N stacked pre-norm decoder blocks (each with its own KV cache) -> final RMSNorm -> output head -> logits -> sampler, with prompt ingestion and autoregressive generation. The end-to-end tiny LLM runtime that ties the whole decode-engine arc together. Composes sovereign-transformer-block, sovereign-rmsnorm, and sovereign-sampler."

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
sovereign-transformer-block = { path = "../sovereign-transformer-block" }
sovereign-rmsnorm = { path = "../sovereign-rmsnorm" }
sovereign-sampler = { path = "../sovereign-sampler" }
sovereign-logit-mask = { path = "../sovereign-logit-mask" }
sovereign-logit-pipeline = { path = "../sovereign-logit-pipeline" }
sovereign-gumbel = { path = "../sovereign-gumbel" }
sovereign-xtc-sampler = { path = "../sovereign-xtc-sampler" }
sovereign-dry-sampler = { path = "../sovereign-dry-sampler" }
sovereign-repetition-penalty = { path = "../sovereign-repetition-penalty" }
sovereign-typical-sampling = { path = "../sovereign-typical-sampling" }

[dev-dependencies]
sovereign-ffn = { path = "../sovereign-ffn" }
