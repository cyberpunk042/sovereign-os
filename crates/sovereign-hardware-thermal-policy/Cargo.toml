description = "Runtime per-target thermal policy — for each of the 5 hardware targets, declares warn / throttle / shutdown thresholds in °C, and emits a ThermalVerdict (Cool/Warm/Throttle/Shutdown) given a live temp_c reading. The SRP scheduler uses the verdict to gate dispatch; the cockpit dashboard tints the hardware tile."

