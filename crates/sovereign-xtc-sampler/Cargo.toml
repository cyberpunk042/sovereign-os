description = "XTC (Exclude Top Choices) sampler: with a set probability, removes the most-probable tokens whenever several already clear a probability threshold, keeping only the least-probable confident option plus the long tail. Boosts diversity and creativity without the incoherence of high temperature — it only fires when there is a safe alternative, so a single forced token is never excluded. Operates as a logit mask with a seeded activation roll."

