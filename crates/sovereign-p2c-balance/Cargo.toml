description = "Power-of-two-choices (P2C) load balancing: pick two backends at random and send the request to the less-loaded one, which provably keeps the maximum load far lower than random placement while using only O(1) state and no global coordination. Weight-aware (compares in-flight per unit capacity) for routing across heterogeneous compute backends — distinct from weighted round-robin and consistent hashing."

