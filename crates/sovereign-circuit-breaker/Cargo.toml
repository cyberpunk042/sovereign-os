description = "A circuit breaker for failing downstreams: after N consecutive failures it opens (rejecting calls fast instead of hammering a dead service), after a cooldown it goes half-open to let one trial through, and a success closes it again. Time is injected for deterministic testing. Complements retry — retry rides out a blip, the breaker gives up on a persistent outage."

