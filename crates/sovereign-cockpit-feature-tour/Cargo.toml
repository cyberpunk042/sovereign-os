description = "Cockpit guided feature-tour state machine. Ordered Step{id, anchor_id, title, body, dismissable}. start(tour_id); next/prev cursor; dismiss(reason) skips remainder; complete() marks tour finished. completed_tours() reports which tours the operator has fully completed. Distinct from onboarding-flow (one-time first-run) — this is the on-demand 'show me this feature' lane."

