description = "Subword embeddings via character n-gram feature hashing: maps text to a fixed-dimension dense vector by hashing its char n-grams (with word boundaries) into signed buckets and L2-normalizing, so morphologically related words land close in cosine space — semantic-ish retrieval that the exact-term lexical retriever misses. Includes an EmbedStore for cosine top-k retrieval."

