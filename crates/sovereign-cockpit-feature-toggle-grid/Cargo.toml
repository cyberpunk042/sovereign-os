description = "Cockpit settings-grid of feature toggles. Each entry is (id, label, hint, group, on, disabled_reason). toggle(id) flips when not disabled; disable(id, reason) locks off with a hint visible to the operator; visible_by_group() partitions entries into groups for the settings UI. Distinct from sovereign-dashboard-toggle (dashboard-visibility) — this is the feature-flag UI lane."

