[package]
name = "sovereign-gatewayd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "The first persistent runnable service: promotes the one-shot sovereign-cortex engine into a long-lived daemon behind the M048 Module 4 sovereign-gateway contract. Newline-delimited JSON over TCP/stdio; one process-wide learning Cortex (memory persists + learns across requests, M016); a live cost/route ledger (gateway surface 6); the never-cloud-spill safety invariant tracked as a process tripwire. Doctrine: 'client → Sovereign Gateway → local/cloud/model router'. Provides the `sovereign-gatewayd` binary."

[lints]
workspace = true

[[bin]]
name = "sovereign-gatewayd"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
sovereign-cortex = { path = "../sovereign-cortex" }
# The durable-memory store type, for corruption-safe load + a capacity bound.
sovereign-memory-os = { path = "../sovereign-memory-os" }
sovereign-coat = { path = "../sovereign-coat" }
sovereign-gateway = { path = "../sovereign-gateway" }
sovereign-router-7axis = { path = "../sovereign-router-7axis" }
sovereign-srp-scheduler = { path = "../sovereign-srp-scheduler" }
sovereign-value-plane = { path = "../sovereign-value-plane" }
# Optional local generation: when SOVEREIGN_GATEWAY_MODEL names a model dir, the
# gateway loads real weights + a real tokenizer and serves the OpenAI chat shim
# (/v1/chat/completions) itself — the sovereign brain generates, not just routes.
sovereign-safetensors-loader = { path = "../sovereign-safetensors-loader" }
sovereign-quant-model = { path = "../sovereign-quant-model" }
sovereign-hf-tokenizer = { path = "../sovereign-hf-tokenizer" }
sovereign-logit-mask = { path = "../sovereign-logit-mask" }
sovereign-stream-decode = { path = "../sovereign-stream-decode" }
# Safety spine: the gateway is the ecosystem's declared privacy + redaction
# chokepoint (see sovereign-gateway GatewayResponsibility). These crates make
# that real on the running daemon — input prompts are screened for injection,
# and generated output is redacted for secrets + PII before it leaves the box.
sovereign-injection-detect = { path = "../sovereign-injection-detect" }
sovereign-secret-scan = { path = "../sovereign-secret-scan" }
sovereign-pii-redact = { path = "../sovereign-pii-redact" }
sovereign-toxicity = { path = "../sovereign-toxicity" }
