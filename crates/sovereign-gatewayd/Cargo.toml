[package]
name = "sovereign-gatewayd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "The first persistent runnable service: promotes the one-shot sovereign-cortex engine into a long-lived daemon behind the M048 Module 4 sovereign-gateway contract. Newline-delimited JSON over TCP/stdio; one process-wide learning Cortex (memory persists + learns across requests, M016); a live cost/route ledger (gateway surface 6); the never-cloud-spill safety invariant tracked as a process tripwire. Doctrine: 'client → Sovereign Gateway → local/cloud/model router'. Provides the `sovereign-gatewayd` binary."

[lints]
workspace = true

[[bin]]
name = "sovereign-gatewayd"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
sovereign-cortex = { path = "../sovereign-cortex" }
sovereign-retrieval = { path = "../sovereign-retrieval" }
sovereign-chunker = { path = "../sovereign-chunker" }
sovereign-rerank = { path = "../sovereign-rerank" }
sovereign-control-word-service = { path = "../sovereign-control-word-service" }
sovereign-control-word = { path = "../sovereign-control-word" }
sovereign-branch-scheduler = { path = "../sovereign-branch-scheduler" }
sovereign-bit-cheats = { path = "../sovereign-bit-cheats" }
sovereign-simd = { path = "../sovereign-simd" }
# SDD-507 (M00155 F00792/F00797): the checkpoint-free token-law fusion primitive
# — compose the named laws (grammar/regex/denylist/…) into a vocab allow-mask for
# the `/v1/data-plane/token-law/fuse` route. A LIGHT dep — the constraint sources
# only, no transformer — so /metrics + the data plane can fuse without a model.
sovereign-token-law-fuse = { path = "../sovereign-token-law-fuse" }
# SDD-512 (M00155 CONNECT): the `Schema` grammar type carried on a /v1/messages
# `token_law` constraint — so the serving decode loop can confine live generation
# by the SAME laws the fuse route inspects. Deserialize-only here.
sovereign-json-schema-grammar = { path = "../sovereign-json-schema-grammar" }
# The durable-memory store type, for corruption-safe load + a capacity bound.
sovereign-memory-os = { path = "../sovereign-memory-os" }
sovereign-coat = { path = "../sovereign-coat" }
sovereign-gateway = { path = "../sovereign-gateway" }
sovereign-router-7axis = { path = "../sovereign-router-7axis" }
sovereign-srp-scheduler = { path = "../sovereign-srp-scheduler" }
sovereign-value-plane = { path = "../sovereign-value-plane" }
# Optional local generation: when SOVEREIGN_GATEWAY_MODEL names a model dir, the
# gateway loads real weights + a real tokenizer and serves the OpenAI chat shim
# (/v1/chat/completions) itself — the sovereign brain generates, not just routes.
sovereign-safetensors-loader = { path = "../sovereign-safetensors-loader" }
sovereign-quant-model = { path = "../sovereign-quant-model" }
# SDD-711 (F-2026-088): OpenAI/Anthropic tool_use ⇄ [[tool:…]] schema bridge, so
# /v1/chat/completions can accept request `tools` and return `tool_calls`.
sovereign-tool-bridge = { path = "../sovereign-tool-bridge" }
# SDD-712 (F-2026-088): server-side agentic tool use — the daemon runs the ReAct
# loop itself over a built-in tool registry (gated, opt-in). Model-sharing is
# Option A: a Responder over the daemon's existing shared Generator (no clone).
sovereign-agent-loop = { path = "../sovereign-agent-loop" }
sovereign-tool-dispatch = { path = "../sovereign-tool-dispatch" }
# SDD-713: the daemon's built-in agent tools — `calc` reuses the pure
# dependency-free arithmetic evaluator (wires a previously demo-only island).
sovereign-calc = { path = "../sovereign-calc" }
sovereign-hf-tokenizer = { path = "../sovereign-hf-tokenizer" }
sovereign-chat-template = { path = "../sovereign-chat-template" }
sovereign-logit-mask = { path = "../sovereign-logit-mask" }
sovereign-stream-decode = { path = "../sovereign-stream-decode" }
# Honor OpenAI `stop` sequences on the chat shim (streaming + buffered).
sovereign-stop-sequence = { path = "../sovereign-stop-sequence" }
# Opt-in completion cache: a repeated deterministic (greedy) request is a $0 hit.
sovereign-completion-cache = { path = "../sovereign-completion-cache" }
# Safety spine: the gateway is the ecosystem's declared privacy + redaction
# chokepoint (see sovereign-gateway GatewayResponsibility). These crates make
# that real on the running daemon — input prompts are screened for injection,
# and generated output is redacted for secrets + PII before it leaves the box.
sovereign-injection-detect = { path = "../sovereign-injection-detect" }
sovereign-secret-scan = { path = "../sovereign-secret-scan" }
sovereign-pii-redact = { path = "../sovereign-pii-redact" }
sovereign-toxicity = { path = "../sovereign-toxicity" }
# Network Zero-Trust topology validation: at startup the daemon checks whether the
# station's NIC layout matches the master-spec §8.1 asymmetric trust model (one mgmt
# NIC with default route, one data NIC without). A breach is surfaced as a health
# metric, not a fatal error, so the daemon stays up for forensics.
sovereign-network-zerotrust = { path = "../sovereign-network-zerotrust" }
# Admission control: bound how fast expensive generation requests are admitted, so a
# runaway/buggy client can't peg the box's CPU/GPU (a token bucket in front of generate).
sovereign-rate-limit = { path = "../sovereign-rate-limit" }
# Structured runtime observability: the gateway records an ObservabilitySpan (the
# 13-field taxonomy) per local model call, exposed on GET /v1/events. Trace-context
# supplies the TraceId/BranchId coordinates.
sovereign-observability-events = { path = "../sovereign-observability-events" }
sovereign-trace-context = { path = "../sovereign-trace-context" }
