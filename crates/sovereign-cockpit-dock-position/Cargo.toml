description = "Cockpit dock position descriptor. Tracks one of (Left, Right, Top, Bottom, Floating{x, y}). move_to(edge) snaps the dock to that edge; float_to(x, y) clamps to viewport. Pure layout descriptor; distinct from side-panel-state (visible/collapsed) and window-position (free-window dragging)."

