[package]
name = "sovereign-quant-model"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "A complete mixed-precision decoder-only model: token embedding -> a heterogeneous LayerStack (f32 / ternary / NVFP4, single- or multi-head per layer) -> final RMSNorm -> output head -> sampler, with prompt ingestion, autoregressive and constrained generation. The quantized counterpart to the f32 decoder-stack, realizing per-layer mixed precision end to end. Composes sovereign-decoder-layer, sovereign-rmsnorm, sovereign-sampler, and sovereign-logit-mask."

