description = "The ROUTE token-law source (SDD-517, M00155 DEEPEN): bind a 7-axis routing decision to a token-law PROFILE so the router's placement of a task drives which constraint planes the engine forces on. An SrpRole is a COMPUTE TIER (Conductor/Logic/Oracle/Cloud), not a vocabulary subset — so there is no honest role->allow-bitset table; the meaningful levers are the router's privacy/safety axes plus whether data leaves the device. The built-in doctrine: when a task is routed to Cloud OR its privacy is Public (data egress is possible), FORCE the intrinsic egress guards on — the PII-completion plane (SDD-516) and the entropy plane (SDD-513) — regardless of what the request asked for; when safety is Risky, keep the safety denylist selected. RouteProfileMap lets an operator override the profile per role. RouteProfile carries only FLAGS (force_pii / force_entropy / force_safety_denylist), so this crate stays dependency-light (sovereign-router-7axis + serde only); the serving boundary (sovereign-gatewayd) applies the flags using the constraint types it already holds. It COMPLEMENTS, never replaces, an explicit per-request token_law: a request may still add planes; the route only ever forces the egress guards ON, never off."

