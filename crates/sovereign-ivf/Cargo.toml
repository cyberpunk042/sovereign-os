description = "Inverted-file (IVF) approximate nearest-neighbour index: a k-means coarse quantizer partitions the vector space into Voronoi cells, each vector lands in a posting list, and a query scans only the few cells nearest its centroid (n_probe). The cluster-based counterpart to graph-based HNSW and the front half of IVF-PQ — sub-linear semantic search that trades a tunable slice of recall for large speedups over brute force."

