[package]
name = "sovereign-chromofold"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "The safe Rust surface for the ChromoFold searchable compressed-domain engine (SDD-400). Forbids `unsafe`; ships a CPU-native FM-index (provenance-B: `count`/`ranges`/`locate`/`predict` over a token stream, no GPU, no native library, verified against a naive substring oracle), plus the capability descriptor + availability for the GPU engine (provenance-A, whose FFI is quarantined in `sovereign-chromofold-sys`). Opt-in, off by default; honest-degrade."

[lints]
workspace = true

[features]
# OFF by default (opt-in, per the operator mandate). Forwards to the FFI crate's
# `linked` feature so a box with a resident `libchromofold` can link the engine;
# the default, engine-absent build honest-degrades.
default = []
linked = ["sovereign-chromofold-sys/linked"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
sovereign-chromofold-sys = { path = "../sovereign-chromofold-sys" }
