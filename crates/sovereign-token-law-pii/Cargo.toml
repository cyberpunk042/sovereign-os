description = "The PII-completion token-law plane (SDD-516, M00155 DEEPEN): a text->token safety projection that bans a running model from EMITTING THE TOKEN THAT COMPLETES a personally-identifiable value. Unlike the entropy plane (a statistical Shannon-entropy threshold, explicitly heuristic), a PII value has a WELL-DEFINED COMPLETION: at any prefix, appending a candidate token either creates a sovereign-pii-redact detection that ends within the candidate or it does not — deterministic per step, the exact-shape v2 the entropy plane's own scope note promised. It reuses sovereign-pii-redact::detect WHOLESALE (email / US SSN / IPv4 / Luhn-valid credit card) over a bounded trailing window, so the plane and the post-hoc redactor can never disagree on what PII is; recall is bounded by detect's four kinds, so like entropy it is opt-in per request and the post-hoc StreamGuard redactor stays the backstop. safe_token_ids returns the allow-list (all tokens minus the ones that would complete a PII value), the same Vec<usize> shape sovereign-token-law-mask's TokenLawPlanes consumes, so it composes with grammar/regex/denylist/entropy/policy planes through the M00117 token_law_combine. Composes sovereign-pii-redact."

