description = "A semantic completion cache: stores completions keyed by their prompt's embedding and returns a cached one for any new prompt whose embedding is within a cosine-similarity threshold — so near-duplicate requests (paraphrases, typos) hit the cache, not just exact repeats. The fuzzy counterpart to the exact-match completion cache. Composes sovereign-embed."

