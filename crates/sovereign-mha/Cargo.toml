description = "Multi-head attention with grouped-query (GQA) and multi-query (MQA) support: splits the query into heads, maps each query head onto a shared key/value head group, runs the per-head scaled-dot-product attention, and concatenates. GQA is the KV-cache-saving attention real decoders use; this generalizes the single-head kernel to the head layout a production model runs. Composes sovereign-attention."

