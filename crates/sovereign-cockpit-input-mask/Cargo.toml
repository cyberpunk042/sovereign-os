description = "Cockpit formatted-input mask. Given a mask string (e.g. \"###-###-####\", \"##/##/####\", \"####-####-####-####\") and raw user input, returns the masked render + the captured digits-only value. Mask chars: '#' = ASCII digit, 'A' = letter, '*' = either; any other char is a literal placeholder. Pure presentation crate."

