description = "Schema bridge between the two tool-call dialects: converts OpenAI/Anthropic tool_use JSON (sovereign-tool-call-parse) and the [[tool:NAME|ARGS]] convention (sovereign-tool-dispatch) in both directions, and renders a dispatched ToolOutcome back into OpenAI tool_calls or Anthropic tool_use response blocks. The wire-format adapter an OpenAI/Anthropic-compatible daemon needs to run the ReAct loop with tools."

