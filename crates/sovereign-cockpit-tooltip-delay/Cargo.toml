description = "Cockpit tooltip appearance/disappearance delay tracker with group-cooling. enter(now)/leave(now)/anchor_hidden() event transitions; visible(now) returns true once dwell exceeds open_delay_ms. After a tooltip closes, the group enters a brief cool window (cool_ms) during which subsequent tooltips open with open_delay_ms=0 (sticky-show). Pure timing primitive."

