description = "Compiles a JSON-Schema subset into a context-free grammar so a generator can be constrained to emit only schema-conforming JSON. Objects with fixed ordered keys, arrays, strings, numbers/integers, booleans, null, and string enums become an Earley-checkable grammar — the structured-output / function-calling use of grammar-constrained decoding, built on sovereign-cfg-grammar."

