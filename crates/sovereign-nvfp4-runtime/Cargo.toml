description = "M077 NVFP4 (E2M1 4-bit + E4M3 scale) pretraining + inference runtime per arXiv 2509.25149 + arXiv 2505.19115. 1x16 block allocator + RHT + 2D quantization + stochastic rounding + selective HP. Five recipe variants (NVFP4-S/M/L/XL/XXL). Targets Blackwell sm_120."

