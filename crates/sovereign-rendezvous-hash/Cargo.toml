description = "Rendezvous (highest-random-weight) hashing: assign each key to the node scoring highest for it, so adding or removing a node only reassigns that node's share of keys and nothing else moves. Weight-aware for heterogeneous capacity, and select_k gives a stable ordered fallback list for replication — distinct from consistent-hash rings (no virtual nodes needed) and load-based balancing."

