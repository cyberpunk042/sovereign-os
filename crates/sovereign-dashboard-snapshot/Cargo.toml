[package]
name = "sovereign-dashboard-snapshot"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "Runtime dashboard snapshot — point-in-time serializable capture of cockpit composite state: BannerState + ContextPanel + ToastTray + live mode/bundle. Operators export it for incident reports; replay loads it as a starting state."

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
