description = "DRY (Don't Repeat Yourself) repetition sampler: penalizes the next token in proportion to the length of the repeated sequence it would extend, with an exponentially growing penalty above an allowed match length, and configurable sequence-breaker tokens that reset matching. Unlike a flat repetition penalty or a hard n-gram ban, it targets exactly the token that continues a loop — suppressing degenerate repetition while leaving legitimate reuse untouched."

