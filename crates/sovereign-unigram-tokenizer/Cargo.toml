description = "Unigram-LM subword tokenization (the SentencePiece scheme): given a vocabulary of pieces with log-probabilities, segment text into the maximum-likelihood sequence of pieces with a Viterbi-style dynamic program over the piece lattice. A third tokenizer distinct from byte-pair encoding and WordPiece, with single-character fallback so every input is segmentable."

