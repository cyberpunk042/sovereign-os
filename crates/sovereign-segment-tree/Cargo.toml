description = "Segment tree with lazy propagation: apply an add to a whole range and query the sum, minimum, or maximum of any range, both in O(log n). Lazy tags defer pending updates down the tree so range-update stays logarithmic instead of linear — strictly more powerful than a Fenwick/BIT (which does point-update, prefix-query). For windowed aggregates, interval accounting, and range allocation."

