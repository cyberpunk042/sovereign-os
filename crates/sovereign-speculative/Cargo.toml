description = "Speculative decoding over real models: a cheap draft model proposes K tokens, the target model verifies them, and the longest matching prefix (plus one free corrected/bonus token) is committed each round. Greedy verification is lossless — the output is identical to decoding the target alone, just faster. Composes sovereign-decoder-stack (Clone-able models let the draft propose without committing)."

