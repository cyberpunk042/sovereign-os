[package]
name = "sovereign-safetensors-loader"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "Loads a Llama-family model from HuggingFace safetensors (+ config.json) into the runtime's existing multi-head QuantModel — dense f32, dequantizing bf16/f16 on load and permuting HF rotate-half q/k into the runtime's interleaved-RoPE layout. Turns the from-scratch inference stack from 'random weights → gibberish' into 'give it a real model'. GGUF-Q dequant + a real tokenizer bridge are named follow-ups."

