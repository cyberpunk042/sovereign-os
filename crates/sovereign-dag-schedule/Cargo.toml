description = "Dependency-graph scheduling for tasks and tool calls: Kahn topological ordering with cycle detection, parallel-wave levelling (which tasks may run concurrently), and weighted critical-path / makespan analysis. Turns a DAG of 'X must finish before Y' constraints into a runnable plan — the ordering layer for agent task graphs and tool pipelines. Distinct from ranking or shortest-path graph algorithms."

