description = "A trained statistical n-gram language model with add-k (Lidstone) smoothing and backoff to shorter contexts: counts token n-grams, gives a proper next-token probability distribution, and scores sequence perplexity. A cheap, deterministic LM for draft proposals, perplexity baselines, and detecting out-of-distribution text — distinct from neural-logit scoring."

