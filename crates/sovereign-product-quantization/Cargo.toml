description = "Product quantization for compact vector storage and fast approximate distance: split each vector into m subspaces, learn a k-means codebook per subspace, and encode every vector as m small codes. Approximate squared distance to a query is then a sum of precomputed per-subspace lookups. Composes sovereign-kmeans; for memory-frugal embedding indexes."

