description = "Space-Saving (Stream-Summary) frequent-items algorithm: keeps exactly k counters and, on an untracked item, evicts the current minimum and inherits its count plus a recorded over-estimate, guaranteeing every item more frequent than N/k is found with a bounded error. Deterministic and hash-free — distinct from a probabilistic Count-Min sketch — for exact-ish top-k over an unbounded stream in fixed memory."

