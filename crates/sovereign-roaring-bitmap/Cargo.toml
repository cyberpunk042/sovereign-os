description = "Compressed bitmap of 32-bit integers, roaring-style: values are split into 16-bit chunks, each stored as a sorted array when sparse and a dense bitset when full, so a set of document ids costs far less than a plain bitset yet still does union, intersection, and difference in near-linear time. For combining posting lists, doc-id sets, and feature flags in retrieval and filtering."

