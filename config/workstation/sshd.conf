# sovereign-os SSH server hardening (role-workstation profiles: sain-01, old-workstation)
#
# Drops into /etc/ssh/sshd_config.d/50sovereign-os.conf.
#
# Differs from config/server/sshd.conf in deliberate ways:
#
#   • PasswordAuthentication YES — workstation operator works at the
#     console; ssh access from another sovereign-os machine via password
#     fallback is the difference between "ssh in to fix a typo in
#     authorized_keys" and "drive to the office to log in directly".
#     Console operator's local-password discipline (pwquality.conf
#     minlen 14 + 4 classes) is the load-bearing protection here.
#   • AuthenticationMethods publickey,password (either works alone)
#   • AllowAgentForwarding yes — workstation users routinely hop to dev
#     machines; agent forwarding is the standard workstation flow.
#   • X11Forwarding still NO — workstation X11 is local; ssh X11 has
#     well-known security issues. Operator overrides per-host if needed.
#
# Everything else (no root login, no SHA-1, no -cbc, modern algorithms,
# session timeouts) MIRRORS the server posture — those are universal
# hardening, not server-specific.

# ---------- authentication ----------
PermitRootLogin                no
PasswordAuthentication         yes
PermitEmptyPasswords           no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication   no
PubkeyAuthentication           yes
# Either pubkey OR password works — operator picks. Both methods
# individually authoritative (no two-factor required by default;
# operators add via PAM if desired).
AuthenticationMethods          publickey password
HostbasedAuthentication        no
GSSAPIAuthentication           no
MaxAuthTries                   3

# ---------- forwarding & tunneling ----------
# Workstation-specific deviation from server posture:
X11Forwarding                  no
AllowAgentForwarding           yes
AllowTcpForwarding             yes
PermitTunnel                   no
GatewayPorts                   no

# ---------- session policy ----------
ClientAliveInterval            300
ClientAliveCountMax            2
MaxSessions                    8
LoginGraceTime                 30s
TCPKeepAlive                   no
PrintLastLog                   yes
PrintMotd                      yes
# Banner: /etc/issue.net (network-visible; minimal). See server/sshd.conf
# comment for the operator override path.
Banner                         /etc/issue.net

# ---------- cryptographic algorithms ----------
# IDENTICAL to server posture — these are universal hardening.
KexAlgorithms                  curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
HostKeyAlgorithms              ssh-ed25519,rsa-sha2-512,rsa-sha2-256
Ciphers                        chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr
MACs                           hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
PubkeyAcceptedAlgorithms       ssh-ed25519,rsa-sha2-512,rsa-sha2-256

# ---------- privilege separation ----------
UsePAM                         yes
StrictModes                    yes
