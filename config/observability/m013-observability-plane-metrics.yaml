# config/observability/m013-observability-plane-metrics.yaml
# ============================================================================
# M013 "Observability as control input" — the observability-plane METRIC
# CONTRACT. Materializes the metric sets specified in
# `backlog/milestones/M013-observability-as-control-input.md` into a structured,
# consumable registry — the canonical metric-name contract the future exporters
# emit and the dashboards / alerts / feedback-loop scheduler (M00207-M00211)
# consume.
#
# FIDELITY: metric NAMES are taken VERBATIM from the milestone's FEATURE rows
# (F01028-F01062), which are the authoritative metric spec — including their
# `sovereign_*` namespace, unit suffixes, and `{label}` dimensions (a single
# labeled metric, NOT several). No invention: every metric traces to an F-row +
# dump line. M00201 is the observability-plane SUBJECT list (E0108) — the plane's
# domains, which the tier-specific sets M00202-M00206 instantiate; it carries no
# fabricated metric names (the dump gives subjects there, not metric names).
#
# STATUS: spec-materialization (SDD+TDD — the contract precedes the runtime that
# emits it; wiring is implementation work gated on the inference runtime + GPU).
# Locked to the M013 feature-spec by tests/lint/test_m013_observability_plane_metrics.py.
# Per operator §1g (sacrosanct): "We do not minimize anything."
# ============================================================================
schema_version: "2.0.0"
milestone: M013
source_dump_lines: "3076-3154"

# ── M00201 — Observability Plane subjects (E0108, dump 3076-3087) ──
# The plane's metric DOMAINS (verbatim subjects, not metric names — the dump
# lists subjects here; concrete metrics live in the tier sets below).
plane_subjects:
  module: M00201
  dump_lines: "3076-3087"
  subjects:
    - GPU telemetry
    - CPU counters
    - AVX-512 engine timing
    - KV cache hit/miss
    - branch acceptance
    - speculative success
    - tool failure
    - memory retrieval quality
    - ZFS+IO latency
    - replay log throughput

metric_sets:
  # ── M00202 — Blackwell oracle (tier: oracle / GPU1) — F01028-F01035 ──
  - module: M00202
    plane: inference
    tier: oracle
    dump_lines: "3095-3104"
    metrics:
      - {name: sovereign_oracle_utilization, type: gauge, unit: ratio, feature: F01028}
      - {name: sovereign_oracle_vram_used_bytes, type: gauge, unit: bytes, feature: F01029}
      - {name: sovereign_oracle_memory_bandwidth_gbps, type: gauge, unit: gigabytes_per_second, feature: F01030}
      - {name: sovereign_oracle_batch_tokens, type: gauge, unit: tokens, feature: F01031}
      - {name: sovereign_oracle_prefill_time_ms, type: histogram, unit: milliseconds, feature: F01032}
      - {name: sovereign_oracle_decode_time_ms, type: histogram, unit: milliseconds, feature: F01033}
      - {name: sovereign_oracle_idle_ms, type: gauge, unit: milliseconds, feature: F01034}
      - {name: sovereign_oracle_verification_accept_rate, type: gauge, unit: ratio, feature: F01035}

  # ── M00203 — 4090 scout (tier: scout / GPU0) — F01036-F01041 ──
  - module: M00203
    plane: inference
    tier: scout
    dump_lines: "3108-3115"
    metrics:
      - {name: sovereign_scout_utilization, type: gauge, unit: ratio, feature: F01036}
      - {name: sovereign_scout_draft_tokens_per_sec, type: gauge, unit: tokens_per_second, feature: F01037}
      - {name: sovereign_scout_draft_acceptance_rate, type: gauge, unit: ratio, feature: F01038}
      - {name: sovereign_scout_draft_rejection_reason_total, type: counter, unit: events, labels: [reason], feature: F01039}
      - {name: sovereign_scout_rerank_latency_ms, type: histogram, unit: milliseconds, feature: F01040}
      - {name: sovereign_scout_embedding_batch_size, type: gauge, unit: items, feature: F01041}

  # ── M00204 — CPU deterministic-layer (tier: conductor / CPU) — F01042-F01048 ──
  - module: M00204
    plane: control
    tier: conductor
    dump_lines: "3119-3130"
    metrics:
      - {name: sovereign_cpu_branches_active, type: gauge, unit: branches, feature: F01042}
      - {name: sovereign_cpu_branches_killed_total, type: counter, unit: branches, labels: [reason], feature: F01043}
      - {name: sovereign_cpu_branches_sent_total, type: counter, unit: branches, labels: [organ], feature: F01044}
      - {name: sovereign_cpu_avx_scheduler_tick_us, type: histogram, unit: microseconds, feature: F01045}
      - {name: sovereign_cpu_mask_compute_us, type: histogram, unit: microseconds, feature: F01046}
      - {name: sovereign_cpu_json_validate_us, type: histogram, unit: microseconds, feature: F01047}
      - {name: sovereign_cpu_policy_scan_us, type: histogram, unit: microseconds, feature: F01048}

  # ── M00205 — KV / memory — F01049-F01057 ──
  - module: M00205
    plane: memory
    dump_lines: "3134-3144"
    metrics:
      - {name: sovereign_kv_hit_rate, type: gauge, unit: ratio, feature: F01049}
      - {name: sovereign_kv_prefix_hit_rate, type: gauge, unit: ratio, feature: F01050}
      - {name: sovereign_kv_nonprefix_hit_rate, type: gauge, unit: ratio, feature: F01051}
      - {name: sovereign_kv_evictions_total, type: counter, unit: entries, feature: F01052}
      - {name: sovereign_kv_offload_bytes_total, type: counter, unit: bytes, labels: [from, to], feature: F01053}
      - {name: sovereign_context_prefill_saved_ms, type: gauge, unit: milliseconds, feature: F01054}
      - {name: sovereign_memory_candidates_before_filter, type: gauge, unit: candidates, feature: F01055}
      - {name: sovereign_memory_candidates_after_bitset, type: gauge, unit: candidates, feature: F01056}
      - {name: sovereign_memory_candidates_after_rerank, type: gauge, unit: candidates, feature: F01057}

  # ── M00206 — Tool (E0114 "no unobserved side effects") — F01058-F01062 ──
  - module: M00206
    plane: tool
    dump_lines: "3148-3154"
    metrics:
      - {name: sovereign_tool_intents_generated_total, type: counter, unit: intents, feature: F01058}
      - {name: sovereign_tool_intents_rejected_total, type: counter, unit: intents, feature: F01059}
      - {name: sovereign_tool_intents_user_confirmed_total, type: counter, unit: intents, feature: F01060}
      - {name: sovereign_tool_failures_total, type: counter, unit: failures, labels: [tool], feature: F01061}
      - {name: sovereign_tool_side_effects_committed_total, type: counter, unit: side_effects, feature: F01062}
