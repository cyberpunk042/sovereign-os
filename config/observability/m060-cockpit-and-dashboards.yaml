  - {id: "D-17", feature: F05074, name: "quarantine", scope: "selfdef-mirror-readonly"}
  - {id: "D-18", feature: F05075, name: "trust-scores", scope: "selfdef-mirror-readonly"}
  - {id: "D-19", feature: F05076, name: "super-model-manifest", scope: sovereign-os}
  - {id: "D-20", feature: F05077, name: "peace-machine-health", scope: sovereign-os}

# ── E0580 — Phase 10 cockpit must-show, 7 views (dump 15645-15660) — VERBATIM ──
cockpit_must_show:
  views: ["running", "cost", "can-touch", "changed", "approval-waiting",
          "resumable", "rollback-points"]

# ── E0581 — Phase 10 UI surfaces, 11 (dump 16450-16466) — VERBATIM ──
ui_surfaces:
  surfaces: ["active sessions", "profile choices", "model health", "costs", "traces",
             "pending approvals", "memory changes", "rollback points",
             "hardware pressure", "eval history", "adapter status"]

# ── E0582 — local dashboard secondary panels, 6-item (dump 15625-15630) — VERBATIM ──
local_dashboard_panels:
  panels: [profiles, costs, traces, "model health", memory, approvals]

# ── E0583 — CLI surface, 5 verbs (dump 15634-15640) — VERBATIM ──
cli_surface:
  verbs:
    - {verb: "sovereign run <task>", does: "invokes a task"}
    - {verb: "sovereign resume <session-id>", does: "resumes a hibernated session"}
    - {verb: "sovereign inspect <trace-id>", does: "opens trace detail"}
    - {verb: "sovereign rollback <commit-id>", does: "rolls back a commit"}
    - {verb: "sovereign profile <name>", does: "switches active profile"}

# ── E0584 — API surface (dump 9979-10000) — VERBATIM ──
api_surface:
  anthropic_first_primary: ["POST /v1/messages", "GET /v1/models",
                            "POST /v1/messages/count_tokens", "SSE streaming events",
                            "tool_use / tool_result blocks"]
  openai_compatible_secondary: ["POST /v1/chat/completions", "POST /v1/responses",
                               "POST /v1/embeddings", "GET /v1/models"]

# ── E0585 — IDE/agent client surface (dump 15648-15665) — VERBATIM ──
ide_clients:
  clients: ["Claude Code", "Cline", "OpenCode"]
  mechanism: "point at local gateway via base_url override"

# ── E0586 — 3-level configuration surfaces (dump 14760-14780) — VERBATIM ──
configuration_surfaces:
  levels:
    - {level: User, exposes: "simple profiles + prompts"}
    - {level: "Power user", exposes: "toggles + budgets + allowed providers + sandbox levels"}
    - {level: System, exposes: "policy + hardware profile + routing weights + eval thresholds"}

# ── E0587 — UX coherence (operator standing direction 2026-05-19 + dump 6789) — VERBATIM ──
ux_coherence:
  standards: ["keyboard shortcuts", "dark mode", "accessibility", "responsive layout",
              "personalization"]
  operator_direction: "you cannot re-invent what UX mean"

# ── dashboard toggle contract (R10129-R10132) — VERBATIM ──
dashboard_toggle:
  everything_on_off: "every dashboard can be turned on/off"
  state_path: "/etc/sovereign-os/dashboards.toml"
  signed_via: "selfdef MS003"
  emits: "M049 trace + OCSF Configuration Change class 5001"
