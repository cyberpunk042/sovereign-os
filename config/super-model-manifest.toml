# config/super-model-manifest.toml — D-19 super-model manifest editorial layer
# (M060 R10124-R10125).
#
# The super-model manifest's LIVE data (milestone ids, titles, R-row counts,
# git version, milestone/mirror/dashboard counts) is computed from the repo at
# render time by scripts/manifest/super-model-manifest.py — never hardcoded.
# THIS file holds only the operator-curated EDITORIAL overlay: the M053 11
# build-phase status + per-milestone family/status/tag classification. Lifted
# from the operator-authored webapp/d-19-super-model-manifest seed (committed
# repo data), materialized here as a maintainable config (not JS-embedded).
#
# Milestones present in the live catalog but absent here default to
# family="runtime", status="catalogued", tag="" — so the table stays complete
# as the catalog grows without this file going stale.

