cli_only:
  - {verb: assistant, rationale: "first-login interactive guide (modal onboarding flow), not a persistent dashboard surface"}
  - {verb: bashrc, rationale: "shell integration installer (aliases + completion) — a dotfile action, no dashboard"}
  - {verb: repl, rationale: "interactive read-eval-print shell — a terminal, not a dashboard"}
  - {verb: workflow, rationale: "multi-agent workflow script runner — an execution engine, not a viewable surface"}
  - {verb: version, rationale: "prints the CLI version string; nothing to render"}
  - {verb: operator-rules, rationale: "the rules-retention tool itself (versioned memory apply/capture) — an install-time CLI, no live panel"}
  - {verb: help, rationale: "the CLI help command itself"}
  - {verb: permission, rationale: "the Plan Mode / User Approval Auto-mode safety classifier — a CLI + library gate enforced in control-exec-api (the mode toggle + plan-render live inside the chat/control surfaces, not a standalone panel)"}
  - {verb: frontend, rationale: "SDD-704 boot-frontend selector (gnome | dashboards-kiosk | open-computer-kiosk | none) — toggles gdm vs the kiosk unit + the boot target via systemctl; a boot-presentation CLI action, not itself a viewable panel (it CHOOSES what is shown, incl. the dashboards hub in kiosk mode)"}
  - {verb: openclaw, rationale: "SDD-705 OpenClaw Node gateway daemon lifecycle (status/on/off/install/logs/doctor) — an installed-off component manager over systemd units (selfdef shape); OpenClaw ships its own Control UI on :18789 when running, so a sovereign panel would duplicate it. CLI is the sovereign management surface, no dashboard home."}
