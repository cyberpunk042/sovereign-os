  d-09-hardware-pressure:
    [apc-profile, battery-ladder, bios-directives, bios-info, board-advisor,
     ccd-pinning, cpu-hotswap, fan-advisor, fs, gpu-card-advisor, gpu-possibility,
     gpu-remediate, gpu-watch, gpu-wattage, hardware-pressure, heat-oc-throttle,
     memory-pressure, memory-pressure-damper, memory-profile, oc-headroom,
     pcie-lane-detect, pcie-policy, power-shutdown, power-status, psu-oc,
     psu-oc-mode, raid, ram-advisor, storage-health, thermal-oc-budget, thermals,
     virt-info, wattage-heat-trend, xmp-oc-room, diagnose]
  runtime-modes:
