# config/feature-coverage.yaml — SDD-045 §7 — the completeness ledger.
#
# The operator asked "WHERE IS EVERYTHING… 1000+ features". This file is the
# mechanical proof that every top-level `sovereign-osctl` verb family reaches
# a dashboard (or is an explicit, rationalised CLI-only waiver) — so nothing
# is CLI-only-and-invisible. tests/lint/test_feature_coverage.py enumerates
# the dispatch verbs from scripts/sovereign-osctl and fails if ANY verb is not
# accounted for here (no silent caps).
#
#   coverage:  dashboard-slug -> [verb families it surfaces/governs]
#   cli_only:  verbs that legitimately have no dashboard home, each with why
schema_version: "1.0.0"

