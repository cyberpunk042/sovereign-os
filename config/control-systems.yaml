# config/control-systems.yaml — SDD-045 §4 — the control-systems registry.
#
# The operator directive: "everything can be turned on and off and there are
# also a tons of modes and profiles." This file is the single source of truth
# for those controls — the 11 real on/off + mode + profile systems that
# already exist as CLI/state in sovereign-os, mapped to the dashboards they
# govern. The shared control-surface component renders the Profiles/Modes
# selector + Features rail from this registry, so every dashboard becomes a
# CONTROL surface, not a read-only view.
#
# The web surface NEVER mutates privileged state (§1g / hardening lint): every
# control copies the exact `change_cli` for the operator to run. Two systems
# are `scope: global` — they appear on EVERY panel header.
#
# kind:
#   profile    — pick one named profile (OS archetype)
#   mode       — pick one of a small fixed set of modes
#   toggle     — on/off (per-item for dashboard-toggle / inference tiers)
#   lifecycle  — start/stop/reload a running subsystem
# scope:
#   global     — renders on every panel header
#   scoped     — renders only on the dashboards in `applies_to`
# A lint (tests/lint/test_control_systems_registry.py) locks completeness +
# that every applies_to slug exists in config/dashboard-catalog.yaml.
schema_version: "1.0.0"

systems:
  # ── 1. OS profiles — the hardware archetype (global header selector) ──
  - id: os-profile
    kind: profile
    scope: global
    label: "OS Profile"
    description: >-
      The active hardware/role archetype (sain-01 dual-GPU AI workstation,
      developer, minimal VM, headless server, old-workstation). Selects
      kernel, packages, mixins, and the runtime envelope. Switching flags
      items that need a rebuild.
    options: [sain-01, developer, minimal, headless, old-workstation]
    options_cli: "sovereign-osctl profiles list"
    state_cli: "sovereign-osctl profiles active"
    change_cli: "sovereign-osctl profiles switch {sain-01|developer|minimal|headless|old-workstation}"
    state_path: "/etc/sovereign-os/active-profile"
    privileged: true
    # SDD-509 step-up MFA tier (opt-in; engages once a factor is enrolled):
    # a high-privilege OS-profile switch requires a verified step-up factor.
    auth: step-up
    applies_to: [d-02-profile-choices, build-configurator, personalization]
    refs: [schemas/profile.schema.yaml]

  # ── 2. Runtime profiles / modes (master-spec §18) ────────────────────
  - id: runtime-mode
    kind: mode
    scope: scoped
    label: "Runtime Mode"
    description: >-
      The master-spec §18 runtime profile — how the 3 Trinity tiers are
      allocated across CPU/GPU: ultra-sovereign-efficiency (CPU-only
      background), high-concurrency-burst (multi-agent, all tiers), or
      deep-context-synthesis (whole-system, 1M+ tokens on Oracle). Drives
      core pinning, GPU power, and tier_intent model selection.
    options: [ultra-sovereign-efficiency, high-concurrency-burst, deep-context-synthesis]
    options_cli: "sovereign-osctl trinity profile list"
    state_cli: "sovereign-osctl trinity profile active"
    change_cli: "sovereign-osctl trinity profile switch {ultra-sovereign-efficiency|high-concurrency-burst|deep-context-synthesis}"
    state_path: "/run/sovereign-os/active-runtime-mode"
    privileged: true
    # SDD-509 step-up MFA tier (opt-in; engages once a factor is enrolled).
    auth: step-up
    applies_to: [runtime-modes, trinity, d-01-active-sessions, d-03-model-health, router, orchestration, d-21-lm-orchestration, d-22-lm-status-operability]
    refs: [schemas/runtime-profile.schema.yaml, SDD-043]

  # ── 3. Flex-profiles — per-allocation runtime deltas ─────────────────
  - id: flex-profile
    kind: mode
    scope: scoped
    label: "Flex Deltas"
    description: >-
      Reversible per-allocation overrides on top of the runtime mode —
      GPU utilization, KV-cache dtype (fp8/fp16/bf16/int8), tensor-parallel
      size. An append-only, fully auditable delta log; reset returns to the
      YAML baseline.
    options: ["gpu.utilization", "kv_cache_dtype", "tensor_parallel_size"]
    options_cli: "sovereign-osctl profiles flex show"
    state_cli: "sovereign-osctl profiles flex show"
    change_cli: "sovereign-osctl profiles flex set <key> <value>"
    state_path: "/var/lib/sovereign-os/flex-profile.json"
    privileged: false
    applies_to: [runtime-modes, d-02-profile-choices, d-03-model-health, trinity]
    refs: [scripts/hardware/profile-flex.py]

  # ── 4. CPU modes — scaling governor ──────────────────────────────────
  - id: cpu-mode
    kind: mode
    scope: scoped
    label: "CPU Mode"
    description: >-
      Per-CPU frequency governor + energy-perf bias — ultra-low-power (idle
      daemons), balanced (default desktop), sustained-burst (multi-hour
      pegged inference), peak-inference (min-latency low-batch). `auto`
      recommends from live GPU wattage + inference load.
    options: [ultra-low-power, balanced, sustained-burst, peak-inference]
    options_cli: "sovereign-osctl cpu-mode list"
    state_cli: "sovereign-osctl cpu-mode show"
    change_cli: "sovereign-osctl cpu-mode set {ultra-low-power|balanced|sustained-burst|peak-inference}"
    state_path: "/sys/devices/system/cpu/cpu*/cpufreq/scaling_governor"
    privileged: true
    applies_to: [runtime-modes, d-09-hardware-pressure, cpu-features]
    refs: [scripts/hardware/cpu-mode.py]

  # ── 5. GPU modes — power policy ──────────────────────────────────────
  - id: gpu-mode
    kind: mode
    scope: scoped
    label: "GPU Mode"
    description: >-
      Per-GPU power mode derived from the operator's safe_limit_watts —
      conservative / balanced / sustained / peak. `auto` recommends from
      live draw. Pairs with the R219 watt-deviance watcher.
    options: [conservative, balanced, sustained, peak]
    options_cli: "sovereign-osctl gpu-mode list"
    state_cli: "sovereign-osctl gpu-mode show"
    change_cli: "sovereign-osctl gpu-mode set {conservative|balanced|sustained|peak}"
    state_path: "/etc/sovereign-os/gpu-policy.toml"
    privileged: true
    applies_to: [runtime-modes, d-09-hardware-pressure]
    refs: [config/gpu-policy.toml.example]

  # ── 5b. DSpark speculative decoding — opt-in, ON BY DEFAULT for now ──
  - id: dspark-speculative-decoding
    kind: toggle
    scope: scoped
    label: "DSpark Speculative Decoding"
    description: >-
      DeepSeek's DSpark lossless speculative decoding — the DFlash (M083)
      successor. The DFlash parallel draft backbone + a lightweight Markov
      head verify a 5-token block (DSpark-5) in one target forward pass by
      rejection sampling: 60-85% faster per-user generation while preserving
      the target model's output distribution EXACTLY. Opt-in like everything,
      but ON by default for now (operator, 2026-07-13). Draft runs on the
      Oracle Core (Blackwell); it can retarget the 5090 Logic tier after the
      2026-07 GPU swap. Wired via scripts/inference/dspark-wrap.sh with the
      DSPARK_ENABLE_OVERRIDE / DSPARK_DISABLE_OVERRIDE knobs (DISABLE wins).
    options: ["on", "off"]
    options_cli: "sovereign-osctl dspark status"
    state_cli: "sovereign-osctl dspark status"
    change_cli: "sovereign-osctl dspark {enable|disable}"
    state_path: "/etc/sovereign-os/dspark.toml"
    privileged: true
    applies_to: [d-21-lm-orchestration, d-22-lm-status-operability, orchestration, runtime-modes]
    refs: [config/inference/m083-dflash-speculative-decoding.yaml, scripts/inference/dspark-wrap.sh]

  # ── 6b. DFlash — the M083 predecessor draft strategy (per-invocation) ──
  - id: dflash-speculative-decoding
    kind: toggle
    scope: scoped
    label: "DFlash Speculative Decoding"
    description: >-
      The M083 DFlash task-type-gated draft fast-path (arXiv:2602.06036) —
      the PREDECESSOR DSpark builds on. Unlike DSpark there is no persistent
      state store: the gate is decided PER INVOCATION by the argv-prefix
      wrapper (scripts/inference/dflash-wrap.sh) from --task-type (code+math
      get the 3x speedup; creative is gated OFF to preserve sampling
      quality), overridable with DFLASH_ENABLE_OVERRIDE /
      DFLASH_DISABLE_OVERRIDE (DISABLE wins). Registered here so the compat
      module can express the one-draft-strategy-per-invocation relation
      against DSpark (C007); runs unprivileged as the operator user.
    options: ["on", "off"]
    options_cli: "SOVEREIGN_OS_DRY_RUN=1 scripts/inference/dflash-wrap.sh --task-type code --backend vllm -- true"
    state_cli: "SOVEREIGN_OS_DRY_RUN=1 scripts/inference/dflash-wrap.sh --task-type code --backend vllm -- true"
    change_cli: "scripts/inference/dflash-wrap.sh --task-type {code|math|conversational|creative} --backend {vllm|llama_cpp|transformers} -- <argv>"
    privileged: false
    applies_to: [d-21-lm-orchestration, d-22-lm-status-operability, orchestration, runtime-modes]
    refs: [config/inference/m083-dflash-speculative-decoding.yaml, scripts/inference/dflash-wrap.sh, scripts/inference/bench-dflash.sh]

  # ── 6. Dashboard toggles — every dashboard on/off (global) ───────────
  - id: dashboard-toggle
    kind: toggle
    scope: global
    label: "Dashboard On/Off"
    description: >-
      Turn any dashboard on or off. Absent slug ships enabled (opt-out
      model). State is MS003-signed and emits an OCSF 5001 Configuration
      Change span. This is the literal "everything can be turned on and off"
      control — per-dashboard, from the master index.
    options: [on, off]
    options_cli: "sovereign-osctl dashboards list"
    state_cli: "sovereign-osctl dashboards status <slug>"
    change_cli: "sovereign-osctl dashboards {enable|disable} <slug>"
    state_path: "/etc/sovereign-os/dashboards.toml"
    privileged: true
    applies_to: [master-dashboard]
    refs: [scripts/manifest/dashboard-toggles.py]

  # ── 7. Auth tiers — per-surface auth ladder (global badge) ───────────
  - id: auth-tier
    kind: mode
    scope: global
    label: "Auth Tier"
    description: >-
      The 6-tier auth ladder per surface — no-auth (loopback) → basic →
      advanced (token) → social (OAuth) → enterprise (SSO) → network-level
      (IP-allowlist + VPN). Shown as a per-panel badge; changing a tier is
      triple-gated.
    options: [no-auth, basic, advanced, social, enterprise, network-level]
    options_cli: "sovereign-osctl auth-tier list-tiers"
    state_cli: "sovereign-osctl auth-tier show <dashboard>"
    change_cli: "sovereign-osctl auth-tier set <dashboard> {no-auth|basic|advanced|social|enterprise|network-level} --apply --confirm-tier-set"
    state_path: "/etc/sovereign-os/auth-tier.toml"
    privileged: true
    applies_to: [auth-tier]
    refs: [scripts/operator/auth-tier.py]

  # ── 8. selfdef IPS — on/off + lifecycle ──────────────────────────────
  - id: selfdef
    kind: lifecycle
    scope: scoped
    label: "selfdef (IPS)"
    description: >-
      The intrusion-prevention system — turn the whole IPS on or off, or
      drive its lifecycle (start/stop/restart/sync/doctor) without changing
      enablement. Backs the 6 mirror dashboards D-13..D-18.
    options: [on, off, start, stop, restart, sync, doctor]
    options_cli: "sovereign-osctl selfdef status"
    state_cli: "sovereign-osctl selfdef status"
    change_cli: "sovereign-osctl selfdef {on|off}"
    state_path: "systemd (selfdef units) + /run marker"
    privileged: true
    applies_to: [selfdef-management, auditor, d-13-filesystem-grants, d-14-capability-tokens, d-15-sandboxes, d-16-audit, d-17-quarantine, d-18-trust-scores]
    refs: [SDD-001]

  # ── 9. Perimeter — Tetragon eBPF ─────────────────────────────────────
  - id: perimeter
    kind: lifecycle
    scope: scoped
    label: "Perimeter (Tetragon)"
    description: >-
      The kernel-level syscall-tracing perimeter (Tetragon eBPF). Verify,
      reload tracing policies, or check for policy overlap. The last line
      that cannot be bypassed.
    options: [status, verify, reload, check-overlap]
    options_cli: "sovereign-osctl perimeter status"
    state_cli: "sovereign-osctl perimeter status"
    change_cli: "sovereign-osctl perimeter reload"
    state_path: "systemd (tetragon) + /etc/tetragon/tracing-policies/"
    privileged: true
    applies_to: [auditor, d-16-audit, selfdef-management]
    refs: [SDD-015]

  # ── 10. Inference tiers — per-tier start/stop ────────────────────────
  - id: inference-tier
    kind: toggle
    scope: scoped
    label: "Inference Tiers"
    description: >-
      Start/stop/restart each Trinity inference tier independently — Pulse
      (CPU/AVX-512 bitnet.cpp), Logic (vLLM GPU0), Oracle (vLLM Blackwell),
      Router (OpenAI-compatible front-end). Health-probes /healthz per tier.
    options: [pulse, logic, oracle, router]
    options_cli: "sovereign-osctl inference status"
    state_cli: "sovereign-osctl inference health"
    change_cli: "sovereign-osctl inference {start|stop|restart} <tier>"
    state_path: "systemd (sovereign-{pulse,logic-engine,oracle-core,router} units)"
    privileged: true
    applies_to: [trinity, router, d-03-model-health, d-21-lm-orchestration, d-22-lm-status-operability]
    refs: [SDD-011]

  # ── 10b. Oracle hybrid bench serve — RAM+VRAM big-MoE trial endpoint ──
  - id: oracle-hybrid
    kind: lifecycle
    scope: scoped
    label: "Oracle Hybrid (bench)"
    description: >-
      The llama.cpp RAM+VRAM hybrid serve for big-MoE catalog candidates
      (GLM-4.7, MiniMax-M3): dense layers + KV on the internal Blackwell
      pair (tensor-split 3,1 across the RTX PRO 6000 + RTX 5090), routed
      experts in 256 GB DDR5 via --n-cpu-moe. Port 8086 is a BENCH/TRIAL
      endpoint, not a router tier — the throughput promotion gate
      (models eval run --benchmark throughput --min-tok-s N) drives it.
      Because it claims BOTH internal GPUs it contends with the pure-VRAM
      Oracle/Logic tiers — the compat module encodes that (C006). Runs
      unprivileged as the operator user (foreground llama.cpp server).
    options: [start]
    options_cli: "SOVEREIGN_OS_DRY_RUN=1 scripts/inference/start-oracle-hybrid.sh"
    state_cli: "curl -s http://127.0.0.1:8086/health"
    change_cli: "scripts/inference/start-oracle-hybrid.sh"
    privileged: false
    applies_to: [trinity, d-03-model-health, d-21-lm-orchestration]
    refs: [scripts/inference/start-oracle-hybrid.sh, docs/evaluations/oracle-alternatives-glm47-m3-gptoss-2026-07-19.md]

  # ── 11. Workload knobs — inference-latency primitives ────────────────
  - id: workload-knobs
    kind: toggle
    scope: scoped
    label: "Workload Knobs"
    description: >-
      The atomic bundle of inference-latency primitives — NVIDIA MPS, 2MiB/
      1GiB HugePages, Transparent HugePages, IRQ affinity, CPU isolation,
      driver persistence. Toggle individually or apply the coordinated set.
    options: [mps, hugepages, thp, irq-affinity, cpu-isolation, nvidia-persistence]
    options_cli: "sovereign-osctl workload-knobs show"
    state_cli: "sovereign-osctl workload-knobs show"
    change_cli: "sovereign-osctl workload-knobs set {mps|hugepages|thp|irq-affinity|cpu-isolation|nvidia-persistence} <value>"
    state_path: "kernel + systemd fragments"
    privileged: true
    applies_to: [runtime-modes, d-09-hardware-pressure]
    refs: [scripts/intelligence/workload-knobs.py]

  # ── 12. Maintenance — on-demand host maintenance actions ─────────────
  - id: maintenance
    kind: lifecycle
    scope: scoped
    label: "Maintenance"
    description: >-
      On-demand host maintenance actions dispatched by `sovereign-osctl
      maintenance` — trigger a ZFS scrub of the tank pool now, rotate logs,
      take a snapshot, run the security-update check, sync the model catalog,
      cross-check the selfdef perimeter mirror, or evaluate alert rules. Each
      is the real recurrent-hook run, on demand instead of on its timer.
    options: [scrub, arc-status, log-rotate, snapshot, security-check, models-sync, perimeter-check, alerts-check]
    options_cli: "sovereign-osctl maintenance list"
    state_cli: "sovereign-osctl maintenance list"
    change_cli: "sovereign-osctl maintenance {scrub|arc-status|log-rotate|snapshot|security-check|models-sync|perimeter-check|alerts-check}"
    state_path: "systemd (recurrent hooks) + tank pool"
    privileged: true
    applies_to: [d-09-hardware-pressure]
    refs: [scripts/hooks/recurrent/zfs-scrub.sh]

  # ── 13. Model eval — run a benchmark against a model (R232) ──────────
  - id: eval-run
    kind: lifecycle
    scope: scoped
    label: "Model Eval"
    description: >-
      Run a benchmark evaluation (R232) against a model — pick a model slug and a
      benchmark (mmlu / humaneval / gsm8k) and dispatch the lm-eval harness via
      `sovereign-osctl models eval run`. DRY-RUN by default (emits the exact
      harness command it would run); a real run consumes GPU and appends JSONL
      eval history.
    options: [mmlu, humaneval, gsm8k]
    options_cli: "sovereign-osctl models eval list-benchmarks"
    state_cli: "sovereign-osctl models eval history --limit 5"
    change_cli: "sovereign-osctl models eval run <slug> --benchmark {mmlu|humaneval|gsm8k}"
    state_path: "eval history JSONL (R232 · scripts/observability/eval-tracker.py)"
    privileged: true
    applies_to: [d-10-eval-history, d-22-lm-status-operability]
    refs: [scripts/models/eval.py]

  # ── 14. Costs export — read-only spend-history export (D-04) ──────────
  - id: costs-export
    kind: lifecycle
    scope: scoped
    label: "Costs Export"
    description: >-
      Export the 30-day cloud-spend history (D-04) — pick csv (date,spend rows)
      or json (the full aggregation model) and dispatch `sovereign-osctl costs
      export`. Read-only; writes the export to stdout and mutates nothing (not
      privileged, no sudo).
    options: [csv, json]
    options_cli: "sovereign-osctl costs summary"
    state_cli: "sovereign-osctl costs today"
    change_cli: "sovereign-osctl costs export {csv|json}"
    state_path: "M049 span log (read-only aggregation)"
    privileged: false
    applies_to: [d-04-costs]
    refs: [scripts/observability/cost-tracker.py]

  # ── 15. Cost policy — halt / resume cloud spend (D-04 write) ─────────
  - id: cost-policy
    kind: toggle
    scope: scoped
    label: "Cloud Spend"
    description: >-
      Halt or resume ALL cloud spend by flipping cloud_enabled in
      /etc/sovereign-os/cost-policy.toml (the D-04 write surface). halt-cloud
      stops every cloud backend immediately; resume-cloud re-enables it. DRY-RUN
      by default; the real write is operator-key + type-to-confirm gated and
      needs SOVEREIGN_OS_ACTION_EXEC_LIVE.
    options: [halt-cloud, resume-cloud]
    options_cli: "sovereign-osctl cost-policy show"
    state_cli: "sovereign-osctl costs policy"
    change_cli: "sovereign-osctl cost-policy {halt-cloud|resume-cloud} --confirm"
    state_path: "/etc/sovereign-os/cost-policy.toml"
    privileged: true
    applies_to: [d-04-costs]
    refs: [scripts/observability/cost-policy.py]

  # ── 16. Trace replay-verify — MS009 integrity check (D-05) ───────────
  - id: trace-replay
    kind: lifecycle
    scope: scoped
    label: "Trace Replay-Verify"
    description: >-
      Replay-verify a trace (MS009) — re-read its spans and check integrity: all
      13 M049 keys present, every span signed, chronological ordering, and parent
      linkage resolvable within the trace. Read-only; `latest` verifies the most
      recent trace. Emits a per-check verdict and mutates nothing (not
      privileged, no sudo).
    options: [latest]
    options_cli: "sovereign-osctl traces summary"
    state_cli: "sovereign-osctl traces summary"
    change_cli: "sovereign-osctl traces replay-verify <trace-id>"
    state_path: "M049 span log (read-only replay)"
    privileged: false
    applies_to: [d-05-traces]
    refs: [scripts/observability/trace-store.py]

  # ── 17. Rollback apply — ZFS rollback to the latest snapshot (D-08) ──
  - id: rollback-apply
    kind: lifecycle
    scope: scoped
    label: "Rollback (latest)"
    description: >-
      Apply a ZFS rollback to the LATEST snapshot (R10100) — the destructive
      `zfs rollback -r` that discards everything newer than that snapshot. The
      common one-click undo. DRY-RUN by default; the real rollback is --confirm
      + operator-key + type-to-confirm gated and needs
      SOVEREIGN_OS_ACTION_EXEC_LIVE. Arbitrary-snapshot rollback stays a manual
      CLI op (the safe fallback — snapshot paths carry '/' the exec allowlist
      forbids).
    options: [latest]
    options_cli: "sovereign-osctl rollback snapshot"
    state_cli: "sovereign-osctl rollback snapshot"
    change_cli: "sovereign-osctl rollback apply --to latest --confirm"
    state_path: "ZFS snapshots (rpool/tank) + git commit history"
    privileged: true
    applies_to: [d-08-rollback-points]
    refs: [scripts/lifecycle/rollback-points.py]

  # ── 18. Approval decision — approve/deny/defer a queued approval (D-06) ──
  - id: approvals-decide
    kind: lifecycle
    scope: scoped
    label: "Approval Decision"
    description: >-
      Decide a pending operator approval (SDD-048) — approve (sign the M065 SGn
      gate), deny (record rejected, gate stays pending), or defer (re-queue with a
      defer-until). Pick the verb and an approval id (or `latest` = most urgent).
      DRY-RUN by default; the real decision is operator-key + type-to-confirm
      gated. Recorded to a durable ledger + an OCSF-5001 audit span (D-05/D-16).
      MS003 signing is delegated to selfdef (signature unsigned-pending-MS003).
    options: [approve, deny, defer, latest]
    options_cli: "sovereign-osctl approvals pending"
    state_cli: "sovereign-osctl approvals pending"
    change_cli: "sovereign-osctl approvals {approve|deny|defer} <id> --confirm"
    state_path: "/run/sovereign-os/approvals.json + approval-decisions.jsonl (M065 SG1-SG5)"
    privileged: true
    applies_to: [d-06-pending-approvals]
    refs: [scripts/lifecycle/approval-decide.py]

  # ── 19. Model load — put a catalog model on its tier (D-03, SDD-049) ──
  - id: model-load
    kind: lifecycle
    scope: scoped
    label: "Load Model"
    description: >-
      Load a catalog model onto its Trinity tier (SDD-049) — resolves the id to
      its tier + on-disk path, VRAM-fit-checks the role's GPU (refuse unless
      --force), writes the tier env drop-in, and restarts the tier unit (no
      hot-swap exists; loading = binding the tier to the model). DRY-RUN by
      default; the real load is operator-key + type-to-confirm gated. Publishes
      /run/sovereign-os/model-state.json for the D-03 overlay.
    options: [latest]
    options_cli: "sovereign-osctl models list"
    state_cli: "sovereign-osctl models registered"
    change_cli: "sovereign-osctl models load <id> --confirm"
    state_path: "/run/sovereign-os/model-state.json + /etc/sovereign-os/inference-<tier>.env + systemd tier units"
    privileged: true
    applies_to: [d-03-model-health, d-21-lm-orchestration]
    refs: [scripts/models/load.py]

  # ── 20. Model unload — stop a role's tier (D-03, SDD-049) ────────────
  - id: model-unload
    kind: lifecycle
    scope: scoped
    label: "Unload Model"
    description: >-
      Unload the model on a GPU tier (SDD-049) — stop the role's Trinity tier
      unit (logic or oracle) and clear its model-state.json entry, freeing the
      GPU. DRY-RUN by default; the real unload is operator-key + type-to-confirm
      gated. Idle-auto-unload is a later follow-up.
    options: [logic, oracle]
    options_cli: "sovereign-osctl inference status"
    state_cli: "sovereign-osctl inference status"
    change_cli: "sovereign-osctl models unload {logic|oracle} --confirm"
    state_path: "/run/sovereign-os/model-state.json + systemd tier units"
    privileged: true
    applies_to: [d-03-model-health]
    refs: [scripts/models/unload.py]

  # ── 21. KV warm — prime a running tier's model (D-03, SDD-049) ───────
  - id: model-warm
    kind: lifecycle
    scope: scoped
    label: "Warm KV Cache"
    description: >-
      Warm a running GPU tier (SDD-049) — send a 1-token /v1/completions prime
      request to the tier's vLLM server (logic :8082 / oracle :8083) to load
      weights and prime the KV cache. Non-privileged (loopback HTTP, no host
      mutation); graceful when the tier is down. Profile/dtype aware: reports the
      loaded precision + active runtime mode and flags a drift when the tier
      serves a different model than model-state records loaded.
    options: [logic, oracle]
    options_cli: "sovereign-osctl inference health"
    state_cli: "sovereign-osctl inference health"
    change_cli: "sovereign-osctl models warm {logic|oracle}"
    state_path: "vLLM OpenAI servers (loopback :8082/:8083) — read-only prime"
    privileged: false
    applies_to: [d-03-model-health]
    refs: [scripts/models/warm.py]

  - id: profile-compose
    kind: lifecycle
    scope: scoped
    label: "Compose Profile"
    description: >-
      Compose a NEW orchestration-intent profile from per-device model picks
      (the D-21 composer) and save it — as a draft (the operator's user dir) or
      into the repo (profiles/orchestration/<id>.yaml). Catalog-grounded: every
      model must be a real catalog id of the matching tier. DRY-RUN by default;
      the real write is operator-key + type-to-confirm gated. Grows the
      orchestration family (the lint floor keeps the 5 named + schema-validates
      the new one).
    options: [draft, repo]
    options_cli: "sovereign-osctl models list"
    state_cli: "sovereign-osctl trinity profile list"
    change_cli: "sovereign-osctl profiles create-orchestration <id> --intent <intent> --conductor <conductor> --logic <logic> --oracle <oracle> --target <target> --confirm"
    state_path: "profiles/orchestration/<id>.yaml (repo) or ~/.sovereign-os/profiles/orchestration/<id>.yaml (draft)"
    privileged: true
    applies_to: [d-21-lm-orchestration]
    refs: [scripts/operator/create-orchestration-profile.py]

  # ── 22. Snapshot create — take a manual ZFS snapshot (D-08, SDD-050) ──
  - id: snapshot-create
    kind: lifecycle
    scope: scoped
    label: "Create Snapshot"
    description: >-
      Create a manual ZFS snapshot of a sovereign dataset (SDD-050) — `zfs
      snapshot <dataset>@<tag>`. The dataset is an enum of short keys
      (os / context / models / agents) resolved to the real '/'-bearing path
      INSIDE the engine, never a '/'-arg through the exec allowlist. The tag is
      validated (no '/', '@', spaces). DRY-RUN by default; the real create is
      operator-key + type-to-confirm gated.
    options: [os, context, models, agents]
    options_cli: "sovereign-osctl rollback snapshot"
    state_cli: "sovereign-osctl rollback snapshot"
    change_cli: "sovereign-osctl rollback create --dataset {os|context|models|agents} --tag <tag> --confirm"
    state_path: "ZFS snapshots on rpool/sovereign-os + tank/{context,models,agents} via zfs snapshot"
    privileged: true
    applies_to: [d-08-rollback-points]
    refs: [scripts/lifecycle/rollback-points.py]

  # ── 23. Snapshot prune — destroy aged ZFS snapshots (D-08, SDD-050) ──
  - id: snapshot-prune
    kind: lifecycle
    scope: scoped
    label: "Prune Snapshots"
    description: >-
      Prune ZFS snapshots older than the retention window (SDD-050) — `zfs
      destroy` per dataset, EXCEPT a hard floor: never the very latest, and
      never the newest 3 per dataset unless --force (a logged, CLI-only
      escalation). Old-but-floor-protected snapshots are withheld and reported
      (refuse-by-default), not destroyed. DRY-RUN by default; the real prune is
      operator-key + type-to-confirm gated.
    options: [14, 7, 30, 90]
    options_cli: "sovereign-osctl rollback snapshot"
    state_cli: "sovereign-osctl rollback snapshot"
    change_cli: "sovereign-osctl rollback prune --retain-days {14|7|30|90} --confirm"
    state_path: "ZFS snapshots on rpool/sovereign-os + tank/{context,models,agents} via zfs destroy"
    privileged: true
    applies_to: [d-08-rollback-points]
    refs: [scripts/lifecycle/rollback-points.py]

  # ── 24. Rollback (recent) — roll back to a recent snapshot (D-08, SDD-050) ──
  - id: rollback-recent
    kind: lifecycle
    scope: scoped
    label: "Rollback (recent snapshot)"
    description: >-
      Roll back to one of the recent ZFS snapshots (SDD-050) — the destructive
      `zfs rollback -r` targeting a bounded positional token (recent-1 = newest,
      … recent-5). The token is resolved to the live '@'-name INSIDE the engine,
      so the '/'+'@' snapshot id never crosses the exec allowlist; the dry-run
      plan shows the resolved target before confirm. Complements the one-click
      Rollback (latest). DRY-RUN by default; the real rollback is operator-key +
      type-to-confirm gated.
    options: [recent-1, recent-2, recent-3, recent-4, recent-5]
    options_cli: "sovereign-osctl rollback snapshot"
    state_cli: "sovereign-osctl rollback snapshot"
    change_cli: "sovereign-osctl rollback apply --to {recent-1|recent-2|recent-3|recent-4|recent-5} --confirm"
    state_path: "ZFS snapshots (rpool/tank) + git commit history"
    privileged: true
    applies_to: [d-08-rollback-points]
    refs: [scripts/lifecycle/rollback-points.py]

  # ── 25. Adapter decision — promote/demote/rollback a LoRA adapter (D-11, SDD-051) ──
  - id: adapter-decide
    kind: lifecycle
    scope: scoped
    label: "Adapter Decision"
    description: >-
      Decide a LoRA adapter's promotion state (SDD-051) — promote (pending →
      active, REQUIRES the MS041 triple-gate: snapshot + test/eval +
      oracle-or-human all passed), demote (active → pending), or rollback (→
      rolled-back). Pick the verb and an adapter id. Promote refuses unless the
      high-risk gate is met (no panel override — a forced promotion is a manual
      registry edit). DRY-RUN by default; the real decision is operator-key +
      type-to-confirm gated. Recorded to a durable ledger + an OCSF-5001 audit
      span (D-05/D-16). MS003 signing is delegated to selfdef
      (signature unsigned-pending-MS003).
    options: [promote, demote, rollback]
    options_cli: "sovereign-osctl adapters inventory"
    state_cli: "sovereign-osctl adapters inventory"
    change_cli: "sovereign-osctl adapters {promote|demote|rollback} <id> --confirm"
    state_path: "adapter promotion registry /var/lib/sovereign-os/adapters/registry.json"
    privileged: true
    applies_to: [d-11-adapter-status, d-10-eval-history]
    refs: [scripts/inference/adapter-decide.py]

  # ── 26. Memory-change decision — approve/reject a pending change (D-07, SDD-052) ──
  - id: memory-decide
    kind: lifecycle
    scope: scoped
    label: "Memory-Change Decision"
    description: >-
      Sign off a pending M028 Memory-OS change (SDD-052) — approve (apply the
      change's op: promote or pin; a pending forget is refused — Stage 3,
      refuse-by-default with a logged CLI --force override) or reject (discard the
      pending change). Pick the verb and a change id (mc-<hex>). DRY-RUN by
      default; the real decision is operator-key + type-to-confirm gated. Recorded
      to a durable ledger + an OCSF-5001 audit span (D-05/D-16). MS003 signing is
      delegated to selfdef (signature unsigned-pending-MS003).
    options: [approve, reject]
    options_cli: "sovereign-osctl memory-changes snapshot"
    state_cli: "sovereign-osctl memory-changes snapshot"
    change_cli: "sovereign-osctl memory-changes {approve|reject} <id> --confirm"
    state_path: "Memory OS state /run/sovereign-os/memory.json (pending queue)"
    privileged: true
    applies_to: [d-07-memory-changes, brain]
    refs: [scripts/intelligence/memory-decide.py]

  # ── 27. Session lifecycle decision — hibernate/resume/kill a session (D-01, SDD-053) ──
  - id: session-decide
    kind: lifecycle
    scope: scoped
    label: "Session Lifecycle"
    description: >-
      Transition an M057 task session (SDD-053) — hibernate (active → hibernated),
      resume (hibernated → active), or kill (non-terminal → archived; refused if
      already terminal). Pick the verb and a session id. The registry-state
      transition is recorded here; the real M047 CRIU + ZFS checkpoint/restore is
      the M057 engine (Stage 3). DRY-RUN by default; the real decision is
      operator-key + type-to-confirm gated. Recorded to a durable ledger + an
      OCSF-5001 audit span (D-05/D-16). MS003 signing delegated to selfdef
      (signature unsigned-pending-MS003).
    options: [hibernate, resume, kill]
    options_cli: "sovereign-osctl sessions active"
    state_cli: "sovereign-osctl sessions active"
    change_cli: "sovereign-osctl sessions {hibernate|resume|kill} <id> --confirm"
    state_path: "session registry /run/sovereign-os/sessions.json"
    privileged: true
    applies_to: [d-01-active-sessions]
    refs: [scripts/lifecycle/session-decide.py]

  # ── 28. Hibernate all — bulk-hibernate every active session (D-01, SDD-053) ──
  - id: session-hibernate-all
    kind: lifecycle
    scope: scoped
    label: "Hibernate All Sessions"
    description: >-
      Bulk-hibernate every active M057 task session in one gated action (SDD-053) —
      transitions each active session → hibernated. The registry-state transition
      is recorded here; the real M047 CRIU + ZFS checkpoint is the M057 engine
      (Stage 3). DRY-RUN by default; the real action is operator-key +
      type-to-confirm gated. Recorded to a durable ledger + OCSF-5001 audit spans.
      MS003 signing delegated to selfdef (signature unsigned-pending-MS003).
    options: [all]
    options_cli: "sovereign-osctl sessions active"
    state_cli: "sovereign-osctl sessions summary"
    change_cli: "sovereign-osctl sessions hibernate-all --confirm"
    state_path: "session registry /run/sovereign-os/sessions.json"
    privileged: true
    applies_to: [d-01-active-sessions]
    refs: [scripts/lifecycle/session-decide.py]

  # ── 29. Memory forget — soft-delete a memory entry (D-07, SDD-059) ──
  - id: memory-forget
    kind: lifecycle
    scope: scoped
    label: "Forget Memory"
    description: >-
      Soft-delete an M028 memory entry (SDD-059, R10184) — tombstone it
      (state → forgotten) + ledger the prior state so it can be restored. This is
      REFUSE-BY-DEFAULT from the panel: forget is destructive, so the override
      `--force` is a logged CLI-only escalation
      (`sovereign-osctl memory-changes forget <id> --confirm --force`); the panel
      button surfaces the refusal + the CLI remediation. undo (memory-undo)
      restores a forgotten memory. DRY-RUN by default; operator-key +
      type-to-confirm gated. MS003 signing delegated to selfdef
      (signature unsigned-pending-MS003).
    options: [forget]
    options_cli: "sovereign-osctl memory-changes list"
    state_cli: "sovereign-osctl memory-changes list"
    change_cli: "sovereign-osctl memory-changes forget <id> --confirm"
    state_path: "M028 memory-entry store /var/lib/sovereign-os/memory/store.json"
    privileged: true
    applies_to: [d-07-memory-changes, brain]
    refs: [scripts/intelligence/memory-store.py]

  # ── 30. Memory undo — reverse a memory change (D-07, SDD-059) ──
  - id: memory-undo
    kind: lifecycle
    scope: scoped
    label: "Undo Memory Change"
    description: >-
      Reverse an M028 memory change (SDD-059, R10185) — restore a forgotten memory
      to active by un-doing its ledger change. Non-destructive. Pick the change id
      (chg-<hex>). DRY-RUN by default; operator-key + type-to-confirm gated.
      Recorded to an OCSF-5001 audit span. MS003 signing delegated to selfdef
      (signature unsigned-pending-MS003).
    options: [undo]
    options_cli: "sovereign-osctl memory-changes list"
    state_cli: "sovereign-osctl memory-changes list"
    change_cli: "sovereign-osctl memory-changes undo <id> --confirm"
    state_path: "M028 memory change-ledger /var/lib/sovereign-os/memory/changes.json"
    privileged: true
    applies_to: [d-07-memory-changes, brain]
    refs: [scripts/intelligence/memory-store.py]

  # ── 31. Adapter human gate — operator sign-off of the MS041 human gate (D-11, SDD-061) ──
  - id: adapter-gate-human
    kind: lifecycle
    scope: scoped
    label: "Sign Off Human Gate"
    description: >-
      Sign off the MS041 human gate for a LoRA adapter (SDD-061) — the operator
      attests they reviewed the adapter, advancing gates.human to passed (the
      oracle-OR-human third gate, so a real promote becomes reachable via snapshot
      + test/eval + human). Pick an adapter id (mem the pending list). Real
      evidence only — the attestation is the operator's own. DRY-RUN by default;
      operator-key + type-to-confirm gated. Recorded to a durable ledger + an
      OCSF-5001 audit span. The snapshot/eval/oracle gate-producers are CLI-only
      (heavy / host-gated); only the human sign-off is a panel control. MS003
      signing delegated to selfdef (signature unsigned-pending-MS003).
    options: [human]
    options_cli: "sovereign-osctl adapters inventory"
    state_cli: "sovereign-osctl adapters inventory"
    change_cli: "sovereign-osctl adapters gate human <id> --confirm"
    state_path: "adapter promotion registry /var/lib/sovereign-os/adapters/registry.json"
    privileged: true
    applies_to: [d-11-adapter-status]
    refs: [scripts/inference/adapter-gate.py]

  # ── 32. Approvals request — enqueue a pending approval intent (D-06, SDD-104) ──
  - id: approvals-request
    kind: lifecycle
    scope: scoped
    label: "Request Approval"
    description: >-
      Enqueue a NEW pending approval intent (SDD-104) so the operator no longer has
      to hand-author `approvals request` in a terminal — mints an APR-<8hex> pending
      item that the privileged approve/deny decision (approvals-decide) then signs.
      Pick the M065 gate (SG1..SG5 — the signable STAGE_GATES) + severity + a
      title slug. This is a low-stakes intent-enqueue, NOT the signed decision, so it
      is UNprivileged; it still routes through the sanctioned exec-rail (dry-run by
      default, allowlisted, OCSF-5001 audited). Rich human-readable titles/summaries
      stay a CLI op (the safe fallback — the exec allowlist forbids free text).
    options: [SG1, SG2, SG3, SG4, SG5, operator-request, cloud-spend, model-swap, policy-change, capability-grant, resource-scale]
    options_cli: "sovereign-osctl approvals gates"
    state_cli: "sovereign-osctl approvals pending"
    change_cli: "sovereign-osctl approvals request --gate <gate> --severity {low|medium|high|critical} --title <title>"
    state_path: "/run/sovereign-os/approvals.json (M065 SG1-SG5 pending queue)"
    privileged: false
    applies_to: [d-06-pending-approvals]
    refs: [scripts/lifecycle/approval-decide.py]

  # ── 33. Memory-change request — enqueue a pending memory change (D-07, SDD-104) ──
  - id: memory-request
    kind: lifecycle
    scope: scoped
    label: "Request Memory Change"
    description: >-
      Enqueue a NEW pending M028 memory change (SDD-104) so the operator no longer
      has to hand-author `memory-changes request` in a terminal — mints an mc-<8hex>
      pending change that the privileged sign-off (memory-decide) then applies. Pick
      the op (promote/pin/forget) + the memory type. This is a low-stakes intent-
      enqueue, NOT the signed decision, so it is UNprivileged; it still routes through
      the sanctioned exec-rail (dry-run by default, allowlisted, OCSF-5001 audited).
      A free-text scope stays a CLI op (the exec allowlist forbids free text).
    options: [working, episodic, semantic, procedural, temporal, value, kv, reward]
    options_cli: "sovereign-osctl memory-changes types"
    state_cli: "sovereign-osctl memory-changes list"
    change_cli: "sovereign-osctl memory-changes request {promote|pin|forget} --mtype <mtype>"
    state_path: "M028 memory pending queue /var/lib/sovereign-os/memory/state.json"
    privileged: false
    applies_to: [d-07-memory-changes, brain]
    refs: [scripts/intelligence/memory-decide.py]

  # SDD-132 (Phase 3 operability) — the 2 genuine wireable gaps the R10212-honest
  # audit (SDD-131) surfaced. Both sovereign-os-owned + read-only + non-privileged
  # (no sudoers grant); they execute via the exec-rail (dry-run + confirm), so the
  # panels stop being copy-only without any change to the R10212 write boundary.
  - id: profiles-generate-runtime
    kind: lifecycle
    scope: scoped
    label: "Generate Runtime Profile"
    description: >-
      Generate a whole runtime profile from an OS/hardware profile x a strategy
      (SDD-043 Phase 3) — sizes tier_intent allocations to the declared GPUs/CPU
      and catalog-resolves them before printing. Pick the hardware profile (<hw>,
      e.g. sain-01) and the strategy. Read-only: prints the generated profile to
      stdout (add --out to write); non-privileged, no host mutation.
    options: [efficiency, high-concurrency, deep-context]
    options_cli: "sovereign-osctl profiles list"
    state_cli: "sovereign-osctl profiles generate-runtime --help"
    change_cli: "sovereign-osctl profiles generate-runtime <hw> {efficiency|high-concurrency|deep-context}"
    state_path: "profiles/runtime/*.yaml (generated; stdout by default)"
    privileged: false
    applies_to: [profile-generation]
    refs: [scripts/operator/generate-runtime-profile.py]

  - id: peace-check
    kind: lifecycle
    scope: scoped
    label: "Peace-Check (re-run)"
    description: >-
      Re-run the sovereign-os peace-machine validator (R09980-R09982) that computes
      the 5 closing-manifesto properties + the exit-0-iff-all-pass verdict D-20
      reads. Runs the one-shot --json check via the sovereign-osctl wrapper.
      Read-only (the validator computes + publishes; nothing here mutates host
      state); --watch and the journal stay copy-only CLI fallbacks.
    options: [json]
    options_cli: "sovereign-osctl peace-machine snapshot --json"
    state_cli: "sovereign-osctl peace-machine snapshot --json"
    change_cli: "sovereign-osctl peace-check --json"
    state_path: "/run/sovereign-os/peace-check.json (validator-published verdict)"
    privileged: false
    applies_to: [d-20-peace-machine-health]
    refs: [scripts/manifest/peace-machine.py]

  # ── Warp management — render / bench a warp-solar-system-shaders scene ──
  # SDD-300. The Warp panel surfaces the shaders engine (scenes + libs +
  # relations); these two lifecycle controls execute a chosen scene through the
  # exec-rail. The scene is a free <scene> placeholder validated by
  # _action_exec's _SAFE_VALUE token (all 217 catalog names pass) — `options`
  # seeds the datalist with a hero set; the panel offers the full catalog.
  # privileged: a render/bench is real GPU/CPU compute → operator-key + confirm.
  - id: warp-render
    kind: lifecycle
    scope: scoped
    label: "Warp Render"
    description: >-
      Render one scene of the warp-solar-system-shaders NVIDIA-Warp engine to an
      image (GPU on the RTX PRO 6000, CPU fallback otherwise). Dispatched by
      `sovereign-osctl warp render <scene>`; degrades to an honest no-op when the
      shaders checkout is not resident on the host.
    options: [neutron_star, black_hole, aurora, big_bang, cosmic_web, binary_bh, comet, atom, cornell_box, alien]
    options_cli: "sovereign-osctl warp list"
    state_cli: "sovereign-osctl warp status"
    change_cli: "sovereign-osctl warp render <scene>"
    state_path: "config/warp-catalog.yaml (scene registry) + WARP_SHADERS_ROOT checkout"
    privileged: true
    applies_to: [warp]
    refs: [SDD-300, config/warp-catalog.yaml]

  - id: warp-bench
    kind: lifecycle
    scope: scoped
    label: "Warp Bench"
    description: >-
      Benchmark one scene of the warp-solar-system-shaders engine (ms/frame,
      warm-up excluded), GPU or CPU. Dispatched by
      `sovereign-osctl warp bench <scene>`; degrades to an honest no-op when the
      shaders checkout is not resident on the host.
    options: [neutron_star, black_hole, aurora, big_bang, cosmic_web, binary_bh, comet, atom, cornell_box, alien]
    options_cli: "sovereign-osctl warp list"
    state_cli: "sovereign-osctl warp status"
    change_cli: "sovereign-osctl warp bench <scene>"
    state_path: "config/warp-catalog.yaml (scene registry) + WARP_SHADERS_ROOT checkout"
    privileged: true
    applies_to: [warp]
    refs: [SDD-300, config/warp-catalog.yaml]

  # ── Cockpit hotswaps (SDD-600) — surfaced in the top-right settings pane ──
  # The settings pane copies each control's change_cli (the shell never mutates
  # privileged state — R10212); these controls ALSO render live on their home
  # panel via the exec-rail like every other control.

  # Frontend / GUI hotswap (SDD-704 machinery, now a first-class control).
  - id: frontend
    kind: mode
    scope: global
    label: "Frontend / GUI"
    description: >-
      Boot frontend — GNOME desktop (with-GUI), the dashboards kiosk, the
      Open-Computer kiosk, or headless (non-GUI, multi-user.target). Restore the
      desktop after a console/tty login by copying `set gnome` (+ `systemctl
      isolate graphical.target` to bring it up in the current session).
    options: [gnome, dashboards-kiosk, open-computer-kiosk, none]
    options_cli: "sovereign-osctl frontend list"
    state_cli: "sovereign-osctl frontend status --json"
    change_cli: "sovereign-osctl frontend set {gnome|dashboards-kiosk|open-computer-kiosk|none}"
    state_path: "/etc/sovereign-os/frontend.active"
    privileged: true
    applies_to: [runtime-modes]
    refs: [SDD-600, SDD-704, scripts/operator/frontend.py]

  # Provider / origin hotswap (SDD-600 Part 2 + SDD-707) — per AI consumer, swap
  # between the on-box gateway (:8787) and the hosted cloud endpoint. The pane
  # opens a modal to edit one consumer individually. OpenClaw + Claude Code speak
  # Anthropic Messages; Open Computer speaks the OpenAI shim; VSCode = Cline/Claude
  # Dev (Anthropic). A true non-Anthropic OpenAI cloud provider is the Stage-N
  # follow-on (SDD-707 non-goal).
  - id: openclaw-backend
    kind: mode
    scope: scoped
    label: "OpenClaw provider"
    description: >-
      OpenClaw's model backend — the on-box safety-spine gateway (local,
      Anthropic Messages at :8787) or hosted Claude (anthropic). Flips the
      primary provider in ~/.openclaw/openclaw.json.
    options: [local, anthropic]
    options_cli: "sovereign-osctl openclaw backend show"
    state_cli: "sovereign-osctl openclaw backend show --json"
    change_cli: "sovereign-osctl openclaw backend {local|anthropic}"
    state_path: "/etc/sovereign-os/openclaw-backends.json"
    privileged: true
    applies_to: [orchestration]
    refs: [SDD-600, SDD-707, scripts/operator/agent-backend.py]
  - id: open-computer-backend
    kind: mode
    scope: scoped
    label: "Open Computer provider"
    description: >-
      Open Computer's LLM backend — the local gateway OpenAI shim (local,
      :8787/v1) or Anthropic's OpenAI-compat cloud endpoint (anthropic). Flips
      OPENAI_BASE_URL in /etc/sovereign-os/open-computer.env.
    options: [local, anthropic]
    options_cli: "sovereign-osctl open-computer backend show"
    state_cli: "sovereign-osctl open-computer backend show --json"
    change_cli: "sovereign-osctl open-computer backend {local|anthropic}"
    state_path: "/etc/sovereign-os/open-computer-backends.json"
    privileged: true
    applies_to: [orchestration]
    refs: [SDD-600, SDD-707, scripts/operator/agent-backend.py]
  - id: claude-code-backend
    kind: mode
    scope: scoped
    label: "Claude Code provider"
    description: >-
      Claude Code's endpoint — the on-box gateway (local, ANTHROPIC_BASE_URL
      :8787) or hosted Claude (anthropic, cloud default). Rewrites the managed
      /etc/sovereign-os/claude-code.env the CLI reads.
    options: [local, anthropic]
    options_cli: "sovereign-osctl claude-code backend show"
    state_cli: "sovereign-osctl claude-code backend show --json"
    change_cli: "sovereign-osctl claude-code backend {local|anthropic}"
    state_path: "/etc/sovereign-os/claude-code-backends.json"
    privileged: true
    applies_to: [orchestration]
    refs: [SDD-600, scripts/operator/agent-backend.py]
  - id: vscode-backend
    kind: mode
    scope: scoped
    label: "VSCode provider"
    description: >-
      VSCode's Cline / Claude Dev extension endpoint — the on-box gateway
      (local) or cloud (anthropic). Renders the settings fragment to apply in
      /etc/sovereign-os/vscode-cline-settings.json (honest-degrade: a live editor
      profile can't be written for you).
    options: [local, anthropic]
    options_cli: "sovereign-osctl vscode backend show"
    state_cli: "sovereign-osctl vscode backend show --json"
    change_cli: "sovereign-osctl vscode backend {local|anthropic}"
    state_path: "/etc/sovereign-os/vscode-backends.json"
    privileged: true
    applies_to: [orchestration]
    refs: [SDD-600, scripts/operator/agent-backend.py]

  # AVX execution-mode hotswap (SDD-600 Part 3) — which way the box uses AVX-512.
  # custom = the M002/M007/M008 bit-machine (policy becomes bits); builtin = stock
  # AVX-512 math (sovereign-simd/vnni + M085/M086 tiers); hybrid = both; off =
  # scalar. HONEST: custom/hybrid kernels are scaffold (control-word u64, branch-
  # tree scalar, M008 crate-less) — the switch is real, the ZMM kernels land
  # downstream. Not every runtime mode is compatible (M061 profiles = authority
  # gate), which is why this hotswap exists.
  - id: avx-mode
    kind: mode
    scope: global
    label: "AVX Mode"
    description: >-
      How the box uses AVX-512 — Custom (the M002/M007/M008 bit-machine: policy
      becomes bits, token-by-token routing), BuiltIn-Features (stock AVX-512 math:
      VNNI/BF16/tiers), Hybrid (both), or Off (scalar baseline). Custom/Hybrid
      kernels are scaffold today; the switch is recorded and gates them downstream.
    options: [custom, builtin, hybrid, "off"]  # quote 'off' — YAML 1.1 parses bare off as false
    options_cli: "sovereign-osctl avx-mode list"
    state_cli: "sovereign-osctl avx-mode show --json"
    change_cli: "sovereign-osctl avx-mode set {custom|builtin|hybrid|off}"
    state_path: "/etc/sovereign-os/avx-mode.active"
    privileged: true
    applies_to: [cpu-features, avx-modes]
    refs: [SDD-600, scripts/hardware/avx-mode.py, "backlog/milestones/M008-bit-level-cheats-avx512-features.md"]

  # Background-Tasks registry backend (F-2026-091 durability) — where the jobs
  # registry METADATA is stored. Switching migrates every job across + persists
  # the choice to /var/lib/sovereign-os/jobs/store.backend; job OUTPUT dirs are
  # unaffected. Runs through the signed /api/control/execute → sudo path.
  - id: jobs-store
    kind: mode
    scope: scoped
    label: "Jobs Registry Backend"
    description: >-
      Where the Background-Tasks registry is stored: JSON (one human-readable
      registry.json rewritten whole per change — the default, fine at pane scale)
      or SQLite (registry.db, stdlib sqlite3 + WAL — atomic per-row writes,
      concurrent-safe, scales). Switching migrates every job across and persists
      the choice; restart the jobs runtime to apply. Job output dirs are untouched.
    options: [json, sqlite]
    options_cli: "sovereign-osctl jobs store"
    state_cli: "sovereign-osctl jobs store"
    change_cli: "sovereign-osctl jobs store {json|sqlite}"
    state_path: "/var/lib/sovereign-os/jobs/store.backend"
    privileged: true
    applies_to: [code-console]
    refs: [scripts/operator/lib/jobs_store.py, scripts/operator/lib/jobs_cli.py]

  # ── Notification settings (2026-07-19 operator directive — the shared
  # overlay panel in the header settings pane). Three controls back the
  # overlay's exec rail; all write the JSON overrides overlay via
  # `sovereign-osctl notifykit` — the operator's base notifykit.toml is
  # never rewritten (SDD-030). Verbatim gating defaults live in
  # tools/notifykit/config.py (SMS high/high; no-SMS resend high/urgent).
  - id: notify-channel
    kind: toggle
    scope: global
    label: "Notifications — channel"
    description: >-
      Per-channel notification settings: enable/disable a channel (file /
      ntfy / resend email / twilio SMS) and its priority×urgency gate
      thresholds; the *_static key variants pin a value so a global default
      override leaves it as is (operator verbatim 2026-07-19).
    options: [file, ntfy, resend, twilio, "on", "off",
              min, low, normal, high, max, urgent]
    options_cli: "sovereign-osctl notifykit show"
    state_cli: "sovereign-osctl notifykit show --json"
    change_cli: "sovereign-osctl notifykit set <channel> {enabled|min_priority|min_urgency|min_priority_static|min_urgency_static} <value>"
    state_path: "/etc/sovereign-os/notifykit-overrides.json"
    privileged: true
    applies_to: [code-console]
    refs: [tools/notifykit, config/notifykit.toml.example]

  - id: notify-override
    kind: toggle
    scope: global
    label: "Notifications — global default override"
    description: >-
      The global default override across every notification channel gate:
      sweeps all non-static gate keys; channel keys pinned static remain as
      is (operator verbatim 2026-07-19: "only those set to static value
      modified remain as is"). `clear all` drops the override.
    options: [min, low, normal, high, max, urgent, all]
    options_cli: "sovereign-osctl notifykit show"
    state_cli: "sovereign-osctl notifykit show --json"
    change_cli: "sovereign-osctl notifykit global-override {min_priority|min_urgency|clear} <value>"
    state_path: "/etc/sovereign-os/notifykit-overrides.json"
    privileged: true
    applies_to: [code-console]
    refs: [tools/notifykit, config/notifykit.toml.example]

  - id: notify-trigger
    kind: toggle
    scope: global
    label: "Notifications — trigger properties"
    description: >-
      Markdown-frontmatter-style properties & metadata on a notification
      trigger (operator verbatim 2026-07-19: "important:true and such
      markdown properties & metadata as much has in the header") — e.g.
      important true maps events from that trigger to priority high;
      unknown props pass through as Event.props metadata.
    options: ["true", "false", important, urgent, priority, urgency, unset]
    options_cli: "sovereign-osctl notifykit show"
    state_cli: "sovereign-osctl notifykit show --json"
    change_cli: "sovereign-osctl notifykit trigger <name> <prop> <value>"
    state_path: "/etc/sovereign-os/notifykit-overrides.json"
    privileged: true
    applies_to: [code-console]
    refs: [tools/notifykit, config/notifykit.toml.example]
