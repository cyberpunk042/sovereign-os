# config/compatibility.yaml — the cross-system compatibility registry.
#
# Operator directive 2026-07-19 (verbatim, sacrosanct): "I think we need
# a compatibility module if not already present which talk about
# cross-modules or cross-features compatibility and suggest or even
# force something else off in order to enable one thing, or offer the
# possibility to chose one of many things. like the u64 bit control
# strategy for example. lets evaluate this together."
#
# Operator-confirmed design (2026-07-19 evaluation):
#   representation — YAML source of truth (this file), compiled by
#     scripts/operator/compat.py into bit indexes + u64 mask words (the
#     M002 bit-machine "policy becomes bits" strategy applied to
#     configuration: a candidate config is a word-array; requires is an
#     ANDN, conflicts an AND, one_of a popcount)
#   enforcement — per-rule severity (suggest | warn | force), per the
#     pcie_constraints severity precedent + strictness graduation
#   scope v1 — the control-systems registry
#     (config/control-systems.yaml systems + their options). Every
#     kind=mode/profile system is ALREADY an implicit pick-one group
#     (the compiler emits an exclusivity mask per such system); the
#     rules below add the CROSS-system relations the registry lacks.
#   scope v2 (2026-07-19 follow-on) — the PROVISIONING universe: the
#     image-build modules (profiles/*.yaml + profiles/mixins/) join the
#     bit universe as two virtual systems (provisioning-profile
#     pick-one + provisioning-mixin), with IMPLICIT per-profile
#     `requires` relations derived from each profile's own declared
#     mixins list. Rules may reference the virtual systems like any
#     registry system.
#   pre-change gate — scripts/operator/_action_exec.py overlays every
#     exec-rail control change on best-effort current state and
#     evaluates these rules BEFORE executing: force refuses (with
#     reason + remediation + an audited compat_override), warn/suggest
#     ride the result; the cockpit greys force-incompatible options via
#     GET /api/control/compat on the control-exec-api.
#
# Surfaces:
#   sovereign-osctl compat {list, compile, check, explain, why}
#   schema: schemas/compatibility.schema.yaml
#   lint:   tests/lint/test_compatibility_rules.py (schema conformance
#           + every referenced system/option exists in
#           config/control-systems.yaml + mask-compile roundtrip)
#
# Rules are DELIBERATELY few and grounded this round — each cites its
# grounding in refs. Growing the registry is per-rule operator review,
# not bulk generation.

schema_version: "1.1.0"

compatibility:
  description: >-
    Cross-system compatibility relations over the control-systems
    registry: requires / conflicts_with / forces_off / one_of, each
    with severity + reason + remediation. Compiled to u64 mask words
    by scripts/operator/compat.py (M002 bit-machine strategy).

  rules:

    # ── cloud-spend posture vs cloud backends ─────────────────────────
    # The operator's "force something else off in order to enable one
    # thing" case, grounded in the cost-policy control: halting cloud
    # spend is incoherent while agent backends still point at hosted
    # Anthropic endpoints.
    - id: C001-halt-cloud-forces-local-backends
      verb: forces_off
      when: {system: cost-policy, option: halt-cloud}
      targets:
        - {system: openclaw-backend, option: anthropic}
        - {system: open-computer-backend, option: anthropic}
        - {system: claude-code-backend, option: anthropic}
        - {system: vscode-backend, option: anthropic}
      severity: force
      reason: >-
        cost-policy halt-cloud declares zero cloud spend; any agent
        backend set to 'anthropic' keeps routing paid hosted-API
        traffic, defeating the halt.
      remediation: >-
        Switch the listed backends to 'local' (sovereign-osctl
        {openclaw|open-computer|claude-code|vscode} backend local) or
        lift the halt with cost-policy resume-cloud.
      refs:
        - config/control-systems.yaml (cost-policy, *-backend)
        - SDD-707 (backend swap local|anthropic)
      resolution:
        - {system: openclaw-backend, args: {verb: local}, label: "Switch OpenClaw to the on-box gateway (backend local)", effect: {set: {system: openclaw-backend, option: local}}}
        - {system: open-computer-backend, args: {verb: local}, label: "Switch Open Computer to the on-box gateway (backend local)", effect: {set: {system: open-computer-backend, option: local}}}
        - {system: claude-code-backend, args: {verb: local}, label: "Switch Claude Code to the on-box gateway (backend local)", effect: {set: {system: claude-code-backend, option: local}}}
        - {system: vscode-backend, args: {verb: local}, label: "Switch VSCode to the on-box gateway (backend local)", effect: {set: {system: vscode-backend, option: local}}}

    # ── speculative decoding needs an oracle to draft FOR ─────────────
    - id: C002-dspark-requires-oracle-tier
      verb: requires
      when: {system: dspark-speculative-decoding, option: "on"}
      target: {system: inference-tier, option: oracle}
      severity: warn
      reason: >-
        DSpark drafts tokens that the Oracle-tier model verifies
        (SDD-026/M083); with the oracle tier off there is nothing to
        verify the draft and the 4090 draft card idles.
      remediation: >-
        Start the oracle tier (sovereign-osctl trinity oracle / start
        the sovereign-oracle-core service) before enabling DSpark, or
        leave DSpark off.
      refs:
        - SDD-026 (DFlash/DSpark speculative decoding)
        - scripts/inference/dspark-wrap.sh
      resolution:
        - {system: inference-tier, args: {verb: start, tier: oracle}, label: "Start the Oracle tier (sovereign-oracle-core)", effect: {add: {system: inference-tier, option: oracle}}}

    # ── deep-context synthesis runs ON the oracle ─────────────────────
    - id: C003-deep-context-requires-oracle-tier
      verb: requires
      when: {system: runtime-mode, option: deep-context-synthesis}
      target: {system: inference-tier, option: oracle}
      severity: warn
      reason: >-
        The deep-context-synthesis runtime profile (master spec §18.3)
        binds its synthesizer to the Oracle tier; selecting the mode
        with the oracle tier down yields a router with no synthesis
        backend.
      remediation: >-
        Bring the oracle tier up before switching runtime-mode to
        deep-context-synthesis.
      refs:
        - master spec §18.3 (deep-context-synthesis synthesizer_01)
        - profiles/runtime/
      resolution:
        - {system: inference-tier, args: {verb: start, tier: oracle}, label: "Start the Oracle tier (sovereign-oracle-core)", effect: {add: {system: inference-tier, option: oracle}}}

    # ── the open-computer kiosk face needs its backend configured ─────
    - id: C004-oc-kiosk-requires-oc-backend
      verb: requires
      when: {system: frontend, option: open-computer-kiosk}
      target: {system: open-computer-backend}
      severity: warn
      reason: >-
        The open-computer-kiosk frontend (SDD-704) boots the box into
        the QEMU AI-sandbox UI; without the open-computer backend
        configured (SDD-706) the kiosk fronts a dead service.
      remediation: >-
        Configure and enable open-computer first (sovereign-osctl
        open-computer on; backend {local|anthropic}), or pick the
        gnome / dashboards-kiosk frontend.
      refs:
        - SDD-704 (swappable frontend)
        - SDD-706 (open-computer sandbox)

    # ── power-posture coherence (advisory only) ───────────────────────
    - id: C005-ultra-low-cpu-vs-peak-gpu
      verb: conflicts_with
      when: {system: cpu-mode, option: ultra-low-power}
      target: {system: gpu-mode, option: peak}
      severity: suggest
      reason: >-
        An ultra-low-power CPU posture starves a peak-mode GPU of
        prompt-processing and batch-feeding throughput — the pair
        wastes the GPU budget the operator paid for.
      remediation: >-
        Pair gpu-mode peak with cpu-mode sustained-burst or
        peak-inference; or drop gpu-mode to balanced alongside
        ultra-low-power.
      refs:
        - config/control-systems.yaml (cpu-mode, gpu-mode)
        - scripts/power/ (workload-mode coordinator R338/R345)
      resolution:
        - {system: gpu-mode, args: {verb: balanced}, label: "Drop the GPU posture to balanced", effect: {set: {system: gpu-mode, option: balanced}}}

    # ── oracle-hybrid bench serve vs the pure-VRAM tiers ──────────────
    # The 2026-07-19 hybrid trial endpoint claims BOTH internal GPUs
    # (dense layers + KV, tensor-split 3,1 across the RTX PRO 6000
    # 96 GB + RTX 5090 32 GB) — the same Blackwell pair the pure-VRAM
    # Oracle (vLLM, ~90 GB envelope on the PRO 6000) and Logic (vLLM on
    # the 5090) tiers occupy. Starting the hybrid while either tier
    # serves is VRAM contention on the same silicon.
    - id: C006-oracle-hybrid-conflicts-vram-tiers
      verb: conflicts_with
      when: {system: oracle-hybrid, option: start}
      targets:
        - {system: inference-tier, option: oracle}
        - {system: inference-tier, option: logic}
      severity: warn
      reason: >-
        The oracle-hybrid bench serve loads dense layers + KV cache
        across the internal Blackwell pair (tensor-split 3,1); the
        pure-VRAM Oracle and Logic tiers occupy the same two GPUs, so
        running the hybrid alongside a serving tier contends for the
        VRAM the tier's model is sized to fill.
      remediation: >-
        Stop the pure-VRAM tiers first (sovereign-osctl inference stop
        oracle / stop logic), run the hybrid bench, then restart the
        tiers — or skip the hybrid trial while the tiers must stay up.
      refs:
        - scripts/inference/start-oracle-hybrid.sh
        - docs/evaluations/oracle-alternatives-glm47-m3-gptoss-2026-07-19.md
      resolution:
        - {system: inference-tier, args: {verb: stop, tier: oracle}, label: "Stop the pure-VRAM Oracle tier for the bench window", effect: {unset: {system: inference-tier, option: oracle}}}
        - {system: inference-tier, args: {verb: stop, tier: logic}, label: "Stop the pure-VRAM Logic tier for the bench window", effect: {unset: {system: inference-tier, option: logic}}}

    # ── one draft strategy per invocation: DSpark xor DFlash ──────────
    # DSpark is the M083 successor built ON the DFlash backbone; both
    # ship as argv-prefix wrappers around the same backend invocation.
    # Stacking both wrappers on one invocation double-applies
    # speculative-decoding flags to the same backend argv.
    - id: C007-one-draft-strategy-dspark-xor-dflash
      verb: one_of
      when: {system: dspark-speculative-decoding}
      targets:
        - {system: dspark-speculative-decoding, option: "on"}
        - {system: dflash-speculative-decoding, option: "on"}
      severity: warn
      reason: >-
        DSpark and DFlash are both argv-prefix speculative-decoding
        wrappers over the same backend invocation (DSpark is the M083
        successor built on the DFlash draft backbone); enabling both at
        once stacks two draft strategies onto one backend argv, and the
        second wrapper's flags fight the first's.
      remediation: >-
        Pick one draft strategy — DSpark (lossless, default-on for all
        task types) is the shipped successor; use DFlash only for the
        task-type-gated 3x code/math trial (bench-dflash.sh), with
        DSpark disabled for that invocation.
      refs:
        - config/inference/m083-dflash-speculative-decoding.yaml
        - scripts/inference/dspark-wrap.sh
        - scripts/inference/dflash-wrap.sh
      resolution:
        - {system: dspark-speculative-decoding, args: {verb: disable}, label: "Disable DSpark for this invocation (one draft strategy)", effect: {unset: {system: dspark-speculative-decoding, option: "on"}}}

    # ── the AVX-mode (u64 bit-machine) relations ──────────────────────
    # Per operator 2026-07-20: "you need to identify what is
    # Not-compatible with other things. like the u64 custom bits
    # control". Before this round NO rule touched avx-mode — its
    # drill-in showed only the implicit pick-one. These encode the
    # grounded cross-system relations of the AVX-512 engine.

    # Pulse is the CPU/AVX-512 bitnet.cpp tier — scalar AVX-off starves it.
    - id: C008-pulse-tier-conflicts-avx-off
      verb: conflicts_with
      when: {system: inference-tier, option: pulse}
      target: {system: avx-mode, option: "off"}
      severity: warn
      reason: >-
        Pulse is the CPU/AVX-512 bitnet.cpp tier (SDD-011); avx-mode
        'off' declares the scalar baseline ("the bit-machine is not
        run" — SDD-600), starving the engine the Pulse tier is built
        on. Running Pulse with AVX off is the slowest possible shape
        of the CPU tier.
      remediation: >-
        Keep avx-mode at builtin (stock AVX-512 math), custom (the
        M002/M007/M008 bit-machine) or hybrid while the Pulse tier
        serves — or stop Pulse before dropping to 'off'
        (sovereign-osctl inference stop pulse).
      refs:
        - SDD-011 (Trinity tiers — Pulse = CPU/AVX-512 bitnet.cpp)
        - SDD-600 (AVX execution-mode hotswap)
        - docs/src/avx-mode-bit-machine.md
      resolution:
        - {system: avx-mode, args: {verb: builtin}, label: "Bring the AVX-512 engine back (avx-mode builtin)", effect: {set: {system: avx-mode, option: builtin}}}

    # high-concurrency-burst is "multi-agent, all tiers" by definition.
    - id: C009-high-concurrency-requires-all-tiers
      verb: requires
      when: {system: runtime-mode, option: high-concurrency-burst}
      targets:
        - {system: inference-tier, option: pulse}
        - {system: inference-tier, option: logic}
        - {system: inference-tier, option: oracle}
      severity: warn
      reason: >-
        The high-concurrency-burst runtime profile (master spec §18) is
        the "multi-agent, all tiers" allocation — selecting it with any
        Trinity tier down leaves the router promising concurrency the
        missing tier cannot serve.
      remediation: >-
        Bring every tier up first (sovereign-osctl inference start
        {pulse|logic|oracle}) or pick a runtime-mode matching the tiers
        actually serving.
      refs:
        - master spec §18 (runtime profiles)
        - config/control-systems.yaml (runtime-mode, inference-tier)
      resolution:
        - {system: inference-tier, args: {verb: start, tier: pulse}, label: "Start the Pulse tier (CPU/AVX-512 bitnet)", effect: {add: {system: inference-tier, option: pulse}}}
        - {system: inference-tier, args: {verb: start, tier: logic}, label: "Start the Logic tier (vLLM 5090)", effect: {add: {system: inference-tier, option: logic}}}
        - {system: inference-tier, args: {verb: start, tier: oracle}, label: "Start the Oracle tier (vLLM Blackwell)", effect: {add: {system: inference-tier, option: oracle}}}

    # ultra-sovereign-efficiency is CPU-only — a peak GPU posture is waste.
    - id: C010-ultra-sovereign-efficiency-vs-peak-gpu
      verb: conflicts_with
      when: {system: runtime-mode, option: ultra-sovereign-efficiency}
      target: {system: gpu-mode, option: peak}
      severity: suggest
      reason: >-
        ultra-sovereign-efficiency is the CPU-only background profile
        (master spec §18) — holding the GPUs at peak posture burns the
        power budget the profile exists to conserve, with the GPU tiers
        idle by design.
      remediation: >-
        Drop gpu-mode to conservative or balanced alongside
        ultra-sovereign-efficiency, or pick a runtime-mode that
        actually uses the GPUs.
      refs:
        - master spec §18 (runtime profiles)
        - config/control-systems.yaml (gpu-mode)
      resolution:
        - {system: gpu-mode, args: {verb: conservative}, label: "Drop the GPU posture to conservative (CPU-only profile)", effect: {set: {system: gpu-mode, option: conservative}}}

    # ...and CPU-only with the AVX engine off is the worst of both.
    - id: C011-ultra-sovereign-efficiency-vs-avx-off
      verb: conflicts_with
      when: {system: runtime-mode, option: ultra-sovereign-efficiency}
      target: {system: avx-mode, option: "off"}
      severity: suggest
      reason: >-
        The CPU-only profile leans entirely on the CPU's AVX-512 engine
        (Pulse bitnet.cpp + the custom bit-machine); avx-mode 'off'
        drops that engine to the scalar baseline, making the CPU-only
        posture the slowest possible configuration of the box.
      remediation: >-
        Keep avx-mode at builtin/custom/hybrid under
        ultra-sovereign-efficiency; 'off' is a debugging baseline, not
        an operating posture.
      refs:
        - SDD-600 (AVX execution-mode hotswap)
        - master spec §18 (runtime profiles)
        - docs/src/avx-mode-bit-machine.md
      resolution:
        - {system: avx-mode, args: {verb: builtin}, label: "Bring the AVX-512 engine back (avx-mode builtin)", effect: {set: {system: avx-mode, option: builtin}}}
