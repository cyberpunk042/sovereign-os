# sovereign-os password quality config (role-server profiles)
#
# Drops into /etc/security/pwquality.conf.d/50sovereign-os.conf
# (libpwquality 1.4.1+ sources pwquality.conf.d/*.conf in lexical
# order; Debian 13 ships this). Closes SDD-024 Q24-D.
#
# Why this matters even when sshd is pubkey-only:
#   • sudo / su still require passwords for privilege escalation
#   • passwd / chpasswd validate against pwquality at password-change
#   • a weak sudo password defeats every other hardening layer

# ---------- length ----------
# Minimum 14 characters (CIS Debian 12 Benchmark § 5.4.1; NIST 800-63B
# recommends ≥8 but doesn't penalize longer)
minlen = 14

# ---------- character classes ----------
# Each class missing from the password subtracts from minlen requirement
# (credit). Negative values REQUIRE at least N of that class. NOT
# negative-credit-stacking — sovereign-os requires ALL FOUR classes
# (1 lowercase, 1 uppercase, 1 digit, 1 special).
lcredit = -1
ucredit = -1
dcredit = -1
ocredit = -1

# Maximum monotonic-sequence run (catches "abcd1234", "1111", etc.)
maxsequence = 4
# Maximum same-character run (catches "aaaa", "1111")
maxrepeat = 3
# Maximum same-class run (catches "aaaaaa" + "111111")
maxclassrepeat = 4

# ---------- dictionary / user-info ----------
# Reject passwords that contain the username or its parts
usercheck = 1
# Reject palindromes (catches "deified", "racecar")
# (Enabled by default but explicit for auditability)

# ---------- enforce ----------
# Apply to root too — sovereign-os does not exempt root from policy
enforce_for_root
# Retry up to 3 times before failing (passwd / chpasswd)
retry = 3
