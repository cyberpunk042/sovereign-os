# config/server/m045-linux-intelligence-governor.yaml
# ============================================================================
# M045 "Linux as intelligence governor — cgroup v2 / systemd / PSI / eBPF" — the
# governor CONTRACT. Materializes the milestone spec (backlog/milestones/M045-...,
# dump 13546-13825): the 8 OS primitives (E0428), Linux Resource Intelligence
# (E0429), Pressure As Sensation (E0430), adaptive reactions (E0431), eBPF As
# Truth Sensor (E0432), Systemd As Agent Lifecycle Manager (E0433), Sovereign
# Profiles As OS Profiles (E0434), Hardware Meets OS (E0435), and the anti-war
# 8-virtue-to-primitive mapping (E0436). No invention — every entry traces to a
# module + dump line range.
#
# Operator directive 13825 (sacrosanct): "we will make this even better than the
# cloud provider... so much better... even before I train and retrain and adapt
# weights and add my LORAs". This is the enforcement layer for M042/M043's
# profiles + M044's 8 planes: cgroup v2 + systemd make "profiles become real OS
# behavior"; PSI + DCGM sense pressure; eBPF observes reality-over-claims. Ties:
# the 5 sovereign profiles enforce M042's choice bundles at the OS layer; the
# AgentRM lifecycle maps to M028 Memory OS + M029 Computer-Use sandbox scopes.
# STATUS: spec-materialization (SDD+TDD — the OS intelligence governor).
# Locked to spec by tests/lint/test_m045_linux_intelligence_governor.py.
# Per operator §1g (sacrosanct): "We do not minimize anything."
