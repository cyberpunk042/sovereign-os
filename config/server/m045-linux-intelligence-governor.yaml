    - {virtue: consent, meaning: "ask when boundaries matter", primitive: "human gates/profiles"}
    - {virtue: reversibility, meaning: "rollback when possible", primitive: "ZFS/snapshots"}
    - {virtue: proportionality, meaning: "spend just enough intelligence", primitive: "scheduler/profiles"}
    - {virtue: containment, meaning: "risky action stays sandboxed", primitive: "cgroups/AppArmor/VMs"}
    - {virtue: memory, meaning: "learn from harm and success", primitive: "memory OS/replay"}
    - {virtue: communication, meaning: "translate between humans systems models tools", primitive: "Anthropic-first gateway/MCP"}
    - {virtue: truth, meaning: "tests traces observations not vibes", primitive: "tests/eBPF/PSI/evals"}
