# sovereign-os SSH server hardening (role-server profiles)
#
# Drops into /etc/ssh/sshd_config.d/50sovereign-os.conf. Debian 13's
# default sshd_config sources sshd_config.d/*.conf, so this override
# composes additively — operator overrides land in
# /etc/ssh/sshd_config.d/99operator.conf (lexicographically later wins).
#
# Per SDD-023 sovereignty posture + operator IaC bar: ssh is the
# operator's primary remote-management surface; weak defaults here
# defeat every other hardening layer.

# ---------- authentication ----------
PermitRootLogin                no
PasswordAuthentication         no
PermitEmptyPasswords           no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication   no
PubkeyAuthentication           yes
AuthenticationMethods          publickey
# Disable host-based + GSSAPI — pubkey-only is the rule
HostbasedAuthentication        no
GSSAPIAuthentication           no
# 3 attempts before disconnect — fail2ban handles repeat IPs
MaxAuthTries                   3

# ---------- forwarding & tunneling ----------
# Default DENY. Operators needing X11/agent forwarding for a specific
# workflow override in /etc/ssh/sshd_config.d/99operator.conf.
X11Forwarding                  no
AllowAgentForwarding           no
AllowTcpForwarding             no
PermitTunnel                   no
GatewayPorts                   no

# ---------- session policy ----------
ClientAliveInterval            300
ClientAliveCountMax            2
MaxSessions                    4
LoginGraceTime                 30s
TCPKeepAlive                   no
# Don't print last login (reduces info leak to a compromised account)
PrintLastLog                   no
PrintMotd                      yes
# Banner: sovereign-os whitelabel motd (rendered at install per SDD-007)
Banner                         /etc/issue

# ---------- cryptographic algorithms ----------
# Limit to modern algorithms. NO sha1, NO cbc, NO group1/group14.
KexAlgorithms                  curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
HostKeyAlgorithms              ssh-ed25519,rsa-sha2-512,rsa-sha2-256
Ciphers                        chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr
MACs                           hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
PubkeyAcceptedAlgorithms       ssh-ed25519,rsa-sha2-512,rsa-sha2-256

# ---------- privilege separation ----------
UsePAM                         yes
# Strict mode: refuse if user's ~/.ssh has loose perms
StrictModes                    yes
# No empty passwords already set above; this enforces a per-user min via PAM
