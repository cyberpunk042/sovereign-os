// sovereign-os unattended-upgrades config (role-server profiles)
//
// Apply ONLY security-origin updates automatically. All other origins
// (Debian-Updates, third-party PPAs, etc.) require operator action.
// Per SDD-023 sovereignty posture: automatic security ≠ automatic
// surface change.
//
// Drops into /etc/apt/apt.conf.d/52sovereign-os-unattended.conf
// (numbered AFTER 50unattended-upgrades to override its defaults).

Unattended-Upgrade::Origins-Pattern {
    "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
    // Operator opt-in: uncomment to also apply main-channel updates.
    // "origin=Debian,codename=${distro_codename},label=Debian";
    // "origin=Debian,codename=${distro_codename}-updates";
};

// Email reports only to the local 'root' mailbox by default — operators
// reroute via aliases. No external mail relay is configured by sovereign-os.
Unattended-Upgrade::Mail "root";
Unattended-Upgrade::MailReport "on-change";

// Schedule + reboot policy: NEVER auto-reboot. Operator owns the
// reboot window. Sovereign-os will not surprise-restart a server.
Unattended-Upgrade::Automatic-Reboot "false";

// Cleanup: keep 14 days of unused dependencies before purging — gives
// operators a window to detect "wait that was load-bearing" before
// it disappears.
Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
Unattended-Upgrade::Remove-Unused-Dependencies "true";
Unattended-Upgrade::MinimalSteps "true";

// Verbose logs for audit trail (operators can query via journal /
// /var/log/unattended-upgrades/).
Unattended-Upgrade::Debug "false";

// Update + download even when the system is on battery / metered
// connection (server-class: assume always-on power + network).
Unattended-Upgrade::AutoFixInterruptedDpkg "true";
