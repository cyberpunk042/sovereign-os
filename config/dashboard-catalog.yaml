# config/dashboard-catalog.yaml — the described, categorized catalog of
# EVERY operator surface: the 38 webapp panels AND the feature domains that
# have no panel yet (Models, AVX-choice, orchestration, selfdef…). This is
# the single source of truth the master index renders — so the operator
# gets a global view with a real description + how-to-reach for each thing.
#
# status:  live      — backed by a running sovereign-*-api (data when the API is up)
#          snapshot  — ships a baked snapshot (no live API / localStorage only)
#          planned   — no dashboard yet; reachable TODAY via the CLI/API noted
#
# A lint (tests/lint/test_dashboard_catalog_complete.py) locks that every
# webapp/<panel>/ dir has an entry here, so descriptions never drift.
schema_version: "1.0.0"

categories:
  - id: learn
    label: "Learn"
    blurb: "The guided course — a tier-ordered journey through the whole cockpit, most-important pieces first, that survives navigation and walks you panel to panel."
  - id: trinity
    label: "Trinity & Orchestration"
    blurb: "The 3-tier AI runtime — how requests get routed, which model thinks, and how the sandbox + gatekeeper hold the line."
  - id: models
    label: "Models & Compute"
    blurb: "The model catalog, the CPU/AVX-512 exploitation choices, and the profile generation that binds models to hardware."
  - id: hardware
    label: "Hardware & Operations"
    blurb: "Thermals, power, storage, cost, rollbacks — the physical box and its day-to-day running."
  - id: security
    label: "Security & selfdef"
    blurb: "The IPS (selfdef) on/off + mirrors, the network perimeter, approvals, and the trust/audit surfaces."
  - id: governance
    label: "Governance & Meta"
    blurb: "Coverage audits, the build configurator, the aggregator itself, and operator personalization."
  - id: science
    label: "Science & Simulation"
    blurb: "Non-LLM domain compute tools — DNA / protein / particle simulation. NVIDIA Warp differentiable particle-sim (GPU or CPU) is integrated; the rest are cataloged."

dashboards:
  # ── Learn ───────────────────────────────────────────────────────────
  - {slug: course, category: learn, label: "Course", path: /course/, status: snapshot,
     description: "The guided course — a persistent bottom journey-rail that walks the operator through sovereign-os module by module, most-important pieces first (Trinity, the build pipeline, security & selfdef), then the rest, clearly tier-labelled (Core/Standard/Advanced/Optional). Survives navigation and travels you panel-to-panel on Next. Client-only (localStorage progress), DEMO-mode friendly. Distinct from the Assistant: a tour ACROSS panels, not help for the one you are on.", refs: [SDD-067, M090]}

  # ── Trinity & Orchestration ─────────────────────────────────────────
  - {slug: trinity, category: trinity, label: "Trinity", path: /trinity/, api: sovereign-trinity-api, status: live,
     description: "The 3-tier runtime at a glance — Pulse (CPU/AVX-512 ternary), Weaver (sandboxed GPU fabric), Auditor (immutable gatekeeper): live tier status, model assignments, health.", refs: [master-spec §17]}
  - {slug: brain, category: trinity, label: "Sovereign Brain", path: /brain/, api: sovereign-brain-api, status: live,
     description: "Observe + operate the Rust intelligence layer: the DECODED cortex memory (the 8 CoALA types, trust/value, ground-truths) plus the Python Memory-OS beside it, live gateway telemetry + the never-cloud-spill tripwire, a routing probe that shows the brain decide, inline chat with the local model (:8787 shim), and the daemon/crate map.", refs: [M048, M028, M009]}
  - {slug: weaver, category: trinity, label: "Weaver (fabric)", path: /weaver/, api: sovereign-weaver-api, status: live,
     description: "The sandboxed fabric layer — Podman/VFIO isolation, the state-fabric (tank/context) writers, CCD1 allocation. Where untrusted work runs.", refs: [master-spec §17]}
  - {slug: auditor, category: trinity, label: "Auditor (gatekeeper)", path: /auditor/, api: sovereign-auditor-api, status: live,
     description: "The always-on immutable gatekeeper — Tetragon eBPF perimeter + Guardian violation tail. The last line that cannot be bypassed.", refs: [master-spec §17, M084]}
  - {slug: router, category: trinity, label: "Router", path: /router/, api: sovereign-router-api, status: live,
     description: "The deterministic request router (SDD-011): which tier answers a prompt, per-rule classification, routing-decision metrics. Pairs with the thinking-router planner (CLI: router plan).", refs: [SDD-011, R516]}
  - {slug: runtime-modes, category: trinity, label: "Runtime Modes", path: /runtime-modes/, api: sovereign-runtime-modes-api, status: live,
     description: "The master-spec §18 runtime profiles (ultra-sovereign-efficiency / high-concurrency / deep-context) — pick the mode; it drives core pinning, GPU power, model allocation.", refs: [M076, SDD-043]}
  - {slug: d-01-active-sessions, category: trinity, label: "D-01 Active Sessions", path: /d-01-active-sessions/, api: sovereign-sessions-api, status: live,
     description: "The 12-step task lifecycle per live operator session (init → inference → response → validation → cleanup).", refs: [M057]}
  - {slug: d-03-model-health, category: trinity, label: "D-03 Model Health", path: /d-03-model-health/, api: sovereign-model-health-api, status: live,
     description: "Per-tier inference health — SRP role, GPU binding, KV-cache pressure, latency. The live-serving view (distinct from the catalog).", refs: []}
  - {slug: d-21-lm-orchestration, category: models, label: "D-21 LM Orchestration", path: /d-21-lm-orchestration/, api: sovereign-lm-orchestration-api, status: live,
     description: "Profiles + model→hardware assignment grid (GPU0/GPU1/CPU0 = Logic/Oracle/Conductor per M075) + CPU AVX-512 / GPU capability panel. Read-only: Apply copies the signed profile verb.", refs: [M075, M076, R10212]}
  - {slug: d-24-cpu-features, category: models, label: "D-24 CPU Features", path: /d-24-cpu-features/, api: sovereign-cpu-features-api, status: live,
     description: "The deep AVX-512 capability view — extension map, per-AI-workload fit verdict, and advisory. Reuses avx512-advisor. Distinct from D-21 Features-CPU summary.", refs: [M008, M074]}
  - {slug: d-23-models-catalog, category: models, label: "D-23 Model Catalog", path: /d-23-models-catalog/, api: sovereign-models-catalog-api, status: live,
     description: "The canonical model registry (models/catalog.yaml) browsed by SRP tier — id, class, engine, precision, params, context, license, purpose, status. The portfolio view (distinct from D-03 live health).", refs: [M017, M075]}
  - {slug: d-22-lm-status-operability, category: models, label: "D-22 LM Status & Operability", path: /d-22-lm-status-operability/, api: sovereign-lm-status-operability-api, status: live,
     description: "Per-device (CPU0/GPU0/GPU1) Model 0/1/2 status + History|Selected latency + operability Actions/Tests + render-only Chat, plus a Compute Plane & Models view (live VRAM + claims from the plane :8142 + the gateway model registry :8787 — loaded models / GPU proxies / the background target — with copyable model-serve verbs). Reuses the model-health core; Actions copy signed CLI verbs.", refs: [M075, R10212, SDD-902]}
  - {slug: code-console, category: models, label: "Code Console", path: /code-console/, api: sovereign-code-console-api, status: live,
     description: "A claude.ai/code-style interface for the sovereign LOCAL LM — a left M057 session rail, a center conversation with the local model over the loopback router, a right Plan/artifact pane, and a bottom composer with an M075 device target. Read-only (R10212): the one sanctioned POST is the loopback chat; persisted-thread + Plan + repo chips are honest-deferred (SB-077).", refs: [SDD-112, SDD-062, M057, M075, R10212]}
  - {slug: d-25-selfdef-management, category: security, label: "D-25 Self-Defense Management", path: /d-25-selfdef-management/, api: sovereign-selfdef-management-api, status: live,
     description: "READ-ONLY consumer view (R10212) of the selfdef IPS — on/off enablement + M060 mirror-chain health + links to the 6 domain panels (D-13..D-18). Derives state via the m060-health probe() proxy; on/off is a clipboard-copied signed CLI verb.", refs: [M060, R10212, SDD-001]}
  - {slug: d-26-friction-audit, category: security, label: "D-26 Friction Audit", path: /d-26-friction-audit/, api: sovereign-friction-audit-api, status: snapshot,
     description: "The M060 boot-time friction-audit gate — 6 hardware/integrity gates (PCIe/ZFS/memory/immutability/MS003-signature/timeout) rendered in-browser by sovereign-cockpit-friction-audit-panel. Read-only: selfdef owns the verdict ring, the cockpit renders it and never fabricates PASS/FAIL.", refs: [M060, F-2026-001]}
  - {slug: d-27-guardian, category: security, label: "D-27 Guardian Daemon", path: /d-27-guardian/, api: sovereign-guardian-api, status: snapshot,
     description: "The selfdef IPS Guardian Daemon (sain-01 §10 guardian-core) — recent kill/audit verdicts + the 3-step SIGKILL/audit/console response, rendered in-browser by sovereign-cockpit-guardian-panel. Read-only: selfdef owns the verdict ring + the Tetragon socket, the cockpit renders and never fabricates a kill.", refs: [M060, F-2026-001]}
  - {slug: d-28-perimeter, category: security, label: "D-28 Perimeter Fence", path: /d-28-perimeter/, api: sovereign-perimeter-api, status: snapshot,
     description: "The selfdef IPS security perimeter (Tetragon sovereign-kernel-fence) — recent SIGKILL/allowlist/extension-allowed verdicts + the active signed extensions, rendered in-browser by sovereign-cockpit-perimeter-panel. Read-only: selfdef owns the verdict ring + TracingPolicy, the cockpit renders and never fabricates.", refs: [M060, F-2026-001]}
  - {slug: d-29-scheduler, category: security, label: "D-29 Goldilocks Scheduler", path: /d-29-scheduler/, api: sovereign-scheduler-api, status: snapshot,
     description: "The selfdef IPS Goldilocks Scheduler — recent 7-axis routing decisions (latency/cost/risk/energy/human-attention/hardware-pressure/compound) + the 6 backpressure surfaces, rendered in-browser by sovereign-cockpit-scheduler-panel. Read-only: selfdef owns the decision ring, the cockpit renders and never fabricates a route.", refs: [M060, F-2026-001]}
  - {slug: d-05-traces, category: trinity, label: "D-05 Traces", path: /d-05-traces/, api: sovereign-traces-api, status: live,
     description: "Distributed span search — 13-field trace tree, OCSF export. Debug why a request went where it did.", refs: [M049]}

  # ── Models & Compute (mostly un-paneled — the gap you found) ─────────
  - {slug: models-catalog, category: models, label: "Models & Catalog", path: /models-catalog/, status: live,
     cli: "sovereign-osctl models {query,select,suggest,info,eval,toolchains,fine-tune}",
     description: "The full model catalog (68 models across ternary-lm/RLM/SLM/LLM/mixture, every quantization) with VRAM-aware selection — browse and filter by class/quant/tier/purpose/VRAM. Backed by models/catalog.yaml (served at /models-catalog.json); operator CLI e.g. models select --class rlm --vram 48.", refs: [R212, R214, R231, SDD-043]}
  - {slug: cpu-features, category: models, label: "CPU / AVX-512 Choice", path: /cpu-features/, status: live,
     cli: "scripts/build/cpu-features.py · scripts/hardware/avx512-advisor.py · sovereign-osctl cpu-mode",
     description: "The tiered AVX-512 exploitation surface — which instructions (F/VL/BW/VNNI/BF16/VPOPCNTDQ…) THIS CPU exposes and how they map to the AI workloads they enable (Pulse ternary path). Live probe via avx512-advisor (R272), served at /cpu-avx.json.", refs: [SDD-043, R272]}
  - {slug: avx-modes, category: models, label: "AVX Modes (custom bit-machine)", path: /avx-modes/, status: live,
     cli: "sovereign-osctl avx-mode {list|show|inventory|set}",
     description: "The AVX execution-mode surface (SDD-600) — Custom-AVX (the M002/M007/M008 bit-machine: policy becomes bits, token-by-token routing) vs BuiltIn-Features-AVX (stock AVX-512 math) vs Hybrid vs Off, in one select, with the full mode inventory (M008 13 bit-cheats + cpu-dispatch paths + precision tiers). The Custom bit-machine has no other panel; honest-degrade — the ZMM kernels are scaffold today. Sibling of the CPU/AVX-512 Choice panel (which surfaces the BuiltIn hardware side).", refs: [SDD-600, M002, M007, M008, M061]}
  - {slug: token-law-coverage, category: models, label: "Token-Law Mask Coverage", path: /token-law-coverage/, api: sovereign-token-law-coverage-api, status: live,
     cli: "sovereign-osctl token-law {layers|fuse}",
     description: "Read-only per-layer coverage of the M00117 token-law engine (SDD-511, F00796) — how much each named law (grammar / regex / denylist / regex_denylist / policy) restricts the vocabulary at a prefix, rendered as a heatmap. Checkpoint-free: the daemon POSTs a built-in SAMPLE scenario (one representative source per layer over a fixed sample vocab) to the gateway's sanctioned POST /v1/data-plane/token-law/fuse route (F00797) and reads allowed_tokens per layer — no model, no mutation, the same pure decision the osctl token-law verb inspects. The mask-layer SELECTION (which layers are active) is operator-configurable via the profile knob / SOVEREIGN_TOKEN_LAW_MASK_LAYERS / --token-law-mask-layers (SDD-510). Honest-degrades to offline when sovereign-gatewayd (:8787) is unreachable; never fabricates.", refs: [SDD-511, F00796, SDD-507, SDD-510]}
  - {slug: orchestration, category: models, label: "Thinking Router / Orchestration", path: /orchestration/, status: live,
     cli: "sovereign-osctl router plan <prompt>",
     description: "The thinking-router / orchestration view — the 7-axis routing rules (SDD-011) + live routing metrics (which tier/class/task-type requests landed on) + the per-profile escalation (CoT → Validator → self-consistency → MoE). Served at /orchestration.json (router rules|metrics).", refs: [SDD-043 P4]}
  - {slug: profile-generation, category: models, label: "Runtime-Profile Generation", path: /profile-generation/, status: live,
     cli: "sovereign-osctl profiles generate-runtime <hw> <strategy>",
     description: "Generate a whole runtime profile from hardware × strategy, with tier_intent resolved against the catalog (the '20+ combos' producer) — shows the resolved allocations each strategy produces + the generate command. Served at /profile-generation.json from profiles/runtime/*.yaml.", refs: [SDD-043 P3]}
  - {slug: d-10-eval-history, category: models, label: "D-10 Eval History", path: /d-10-eval-history/, api: sovereign-evals-api, status: live,
     description: "Per-task/model eval results (mmlu/humaneval/gsm8k/…), white-box + black-box.", refs: [R232]}
  - {slug: d-11-adapter-status, category: models, label: "D-11 Adapter Status", path: /d-11-adapter-status/, api: sovereign-adapters-api, status: live,
     description: "LoRA adapter inventory + rollback state — which fine-tunes are resident and active.", refs: [MS041]}
  - {slug: d-19-super-model-manifest, category: models, label: "D-19 Super-Model Manifest", path: /d-19-super-model-manifest/, api: sovereign-super-model-api, status: live,
     description: "The live super-model version + the M001..M080 module table — what capabilities are shipped.", refs: []}

