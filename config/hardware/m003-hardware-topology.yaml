  - {component: "AMD Ryzen 9 9900X Zen 5", spec: "single-cycle native 512-bit AVX-512 (not double-pumped 256-bit)"}
  - {component: "ASUS ProArt X870E-Creator", spec: "dual PCIe 5.0 x8/x8 symmetric / IOMMU topology for VFIO"}
