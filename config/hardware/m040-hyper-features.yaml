  module: M00668
  axes: [coding, tool_use, schema_validity, agent_trajectory, long_context_recall,
         reasoning, latency, vram, energy]

# ── E0381 — the 6 AVX-512 hot tables (M00669-M00674, dump 11548-11553) — VERBATIM ──
hot_tables:
  module_range: "M00669-M00674"
  tables: [BranchTable, MemoryMetaTable, ToolCapabilityTable, ModelRegistryTable,
           EvalResultTable, KVBlockTable]

# ── E0381 — AVX-512 ops (M00675, dump 11558-11563) — VERBATIM ──
avx512_ops:
  module: M00675
  ops: [filter, intersect, popcount-score, compress-survivors, route-batches]

# ── E0382 — GDS adoption phases (M00676, dump 11595-11603) — VERBATIM ──
gds_adoption_phases:
