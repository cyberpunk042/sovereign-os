  candidates: ["BF16-baseline", FP8, "NVFP4-MXFP4", "GPTQ-AWQ-SmoothQuant", "KV-quantized"]

# ── E0380 — model qualification test axes, 9 (M00668, dump 11501-11509) — VERBATIM ──
