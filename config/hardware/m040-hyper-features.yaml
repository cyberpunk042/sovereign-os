# config/hardware/m040-hyper-features.yaml
# ============================================================================
# M040 "Hyper features — MIG / FP4 / VFIO / ZFS commit gate" — the hyper-feature
# CONTRACT. Materializes the milestone spec (backlog/milestones/M040-..., dump
# 11440-11603): the 4 MIG profiles (E0379), the FP4 quantization roster + model
# qualification axes (E0380), the 6 AVX-512 hot tables + ops (E0381), and the GDS
# adoption phases (E0382). No invention — every entry traces to a module + dump
# line range.
#
# Ties: the Multi-tenant MIG profile (Claude Code + OpenCode/Cline + background
# evals) connects to root-ghostproxy endpoint safety (SDD-046); the ZFS commit
# gate connects to crates/sovereign-zfs-commit-gate; the 6 hot tables extend
# M039's hot-path SoA + M024's 5 registries.
# STATUS: spec-materialization (SDD+TDD — hyper-feature contract).
# Locked to spec by tests/lint/test_m040_hyper_features.py.
# Per operator §1g (sacrosanct): "We do not minimize anything."
# ============================================================================
schema_version: "1.0.0"
milestone: M040
source_dump_lines: "11440-11603"

# ── E0379 — the 4 MIG profiles (M00663-M00666, dump 11440-11455) — VERBATIM ──
mig_profiles:
  - {module: M00663, profile: Monolith, layout: "full 96GB Blackwell for one large oracle"}
  - {module: M00664, profile: Partition, layout: "oracle slice + verifier slice + embedding-rerank slice + service slice"}
  - {module: M00665, profile: Sandbox, layout: "isolate experimental model from production oracle"}
  - {module: M00666, profile: Multi-tenant, layout: "one slice Claude Code + one OpenCode/Cline + one background evals"}

# ── E0380 — FP4 quantization roster (M00667, dump 11491-11496) — VERBATIM ──
