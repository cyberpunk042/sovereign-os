# ── E0169 — the 12 cognitive operators (M00302, dump 5058-5070) — VERBATIM ──
cognitive_operators:
  module: M00302
  operators: [route, draft, debate, verify, decompose, retrieve, simulate,
              reflect, vote, merge, compress, commit]

# ── E0172 — composable recipes (M00310-M00316, dump 5176-5198) ──
recipes:
  - {module: M00310, name: Fast Executor, graph: "scout → deterministic checks → answer"}
  - {module: M00311, name: Careful Oracle, graph: "retrieve → oracle → verifier → answer"}
  - {module: M00312, name: Debate, graph: "scout A + scout B + oracle critic → merge"}
  - {module: M00313, name: Tree Search, graph: "expand N → score → expand top K → verify"}
  - {module: M00314, name: Cascade, graph: "small model first → escalate only if confidence/risk demands"}
  - {module: M00315, name: Perception Loop, graph: "Nano Omni → state extractor → action planner → tool gate"}
  - {module: M00316, name: Code Repair, graph: "test failure → retrieve symbols → patch candidates → test → reflect"}

