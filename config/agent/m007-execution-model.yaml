schema_version: "1.0.0"
milestone: M007
source_dump_lines: "1228-1600"
canon_note: "M061 pins Scheduler-as-policy-layer (BREAKING, home M058) + Authority Levels (ADDITIVE, home M056)"

# ── E0051 — branch primitive (M00096) — VERBATIM ──
branch_primitive:
  module: M00096
  definition: "live hypothesis with deterministic metadata"

# ── E0052 — 8-step branch loop (M00098, dump 1280-1304) — VERBATIM ──
branch_loop:
  module: M00098
  steps: [Spawn, Retrieve, Draft, Filter, Verify, Act, Commit, Learn]

# ── E0053 — SoA branch state arrays + per-tick ops (M00099/M00100) — VERBATIM ──
soa_arrays:
  module: M00099
  arrays: [id, control, budget, score, flags, grammar, memory, route]
per_tick_ops:
  module: M00100
  masks: ["budget decrement", dead_mask, risk_mask, oracle_mask, scout_mask, tool_mask, merge_mask]

# ── E0054 — composable control word + branch queries (M00103/M00104) — VERBATIM ──
control_word_fields: [route, task, risk, permissions, grammar, priority, spec_depth, flags]
branch_queries:
  module: M00104
  queries: ["shell-allowed", "file-write-allowed", "JSON-required", "verification-required",
            "speculative-only", "network-allowed"]
psychological_shift: "instructions become data / policy becomes bits / reasoning becomes state transitions"

# ── E0055 — epistemic roles, 5 (M00106-M00110, dump 1390-1434) — VERBATIM ──
epistemic_roles:
  - {role: Oracle, scope: "final reasoning, hard synthesis, verification, architecture, long context"}
  - {role: Verifier, scope: "checks claims, code diffs, tool plans; may be oracle with different prompt"}
  - {role: Scout, scope: "cheap exploration / draft continuations"}
  - {role: Specialists, scope: "embeddings / rerank / code-local / vision / classification / safety-risk"}
  - {role: Law, scope: "FSMs / grammar / token masks / permission masks / deterministic tests / scheduler / replay"}

# ── E0056 — memory typing, 6 (dump 1444-1451) — VERBATIM ──
memory_types: [episodic, semantic, procedural, project, policy, trace]

# ── E0057 — MemoryRef struct, 8 fields (M00111, dump 1456-1465) — VERBATIM ──
memory_ref:
  module: M00111
  fields: [id, type, embedding_ref, trust, freshness, access_count, decay, flags]

# ── E0058 — transactional tool call (dump 1480-1517) — VERBATIM ──
transactional_tool_call:
  flow: "intent -> CPU permission check -> execute/ask/rewrite/reject/sandbox"
