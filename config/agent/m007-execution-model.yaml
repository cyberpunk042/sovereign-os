# config/agent/m007-execution-model.yaml
# ============================================================================
# M007 "Execution model — branch primitive + AVX-512 scheduler" — the
# execution-model CONTRACT. Materializes the milestone spec (backlog/milestones/
# M007-...; source raw/dumps/2026-05-18-...AVX-plus-plus.md lines 1228-1600): the
# branch primitive (E0051), the 8-step branch loop (E0052), the SoA branch state
# arrays + per-tick ops (E0053), the composable control word + branch queries
# (E0054), the epistemic roles (E0055), memory typing (E0056), the MemoryRef
# struct (E0057), and the transactional tool call (E0058). No invention — every
# entry traces to a module + dump line range.
#
# AVX++ CANON UPDATE 2026-05-19 (M061): interpreted under canonical later
# definitions — Authority Levels 0..6 (ADDITIVE, home M056), Scheduler-as-policy-
# layer (BREAKING, home M058). Ties: the 8-step branch loop is the precursor of
# M057's 12-step task lifecycle; the 5 epistemic roles are M075's SRP; the SoA
# arrays are M050/M051's hot-path SoA; the MemoryRef struct is M054's MemoryRef
# interface; the transactional tool call is M054's Tool 4-state pipeline.
# STATUS: spec-materialization (SDD+TDD — the branch/scheduler execution model).
