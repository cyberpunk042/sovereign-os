schema_version: "1.0.0"
milestone: M082
source_dump_lines: "229-285"

# ── E0788 — the 5-layer test pyramid (M01369/M01374/M01378/M01381/M01384) — VERBATIM ──
test_pyramid:
  - {layer: 1, name: "schema/lint", module: M01369, virtualization: "none (pure CI)"}
  - {layer: 2, name: "unit", module: M01374, virtualization: "mocked filesystem + apt + dpkg"}
  - {layer: 3, name: "stage acceptance", module: M01378, virtualization: "chroot / systemd-nspawn (pre/during/post-install)"}
  - {layer: 4, name: "integration", module: M01381, virtualization: "full image boot in QEMU"}
  - {layer: 5, name: "hardware-conformance", module: M01384, virtualization: "gated on real SAIN-01 hardware (procurement gate)"}

# ── E0789 — virtualization stack (M01379/M01380/M01382/M01383) — VERBATIM ──
virtualization_stack: ["chroot", "systemd-nspawn", "QEMU (system)", "qemu-user"]

# ── E0790 — per-stage invariants (dump 245-246) — VERBATIM ──
per_stage_invariants: ["pre-install", "during-install", "post-install-first-boot"]

# ── E0791 — discovery + CI + flake policy (dump 247) — VERBATIM ──
test_conventions:
  covers: ["test discovery", "naming convention", "CI execution model", "flake policy"]

# ── E0792 — test catalog (dump 248) — VERBATIM ──
test_catalog: ["tests/INDEX.md", "tests/README.md"]

# ── E0793/E0794 — scaffold deliverables + CI workflow (dump 263-269) — VERBATIM ──
scaffold_deliverables: ["tests/schema/", "tests/lint/", "tests/chroot/scaffold.sh",
                        "tests/nspawn/scaffold.sh", "tests/qemu/scaffold.sh",
                        ".github/workflows/test.yml"]
ci_workflow:
  every_pr: "schema + lint"
  on_merge_or_label: "chroot / nspawn / qemu"

# ── E0795/E0796 — bootstrap + stage-2 stub SDDs (dump 270-274) — VERBATIM ──
sdd_docs:
  bootstrap: "docs/sdd/009-test-harness-bootstrap.md (what scaffold delivers + what it explicitly does NOT)"
  stage_2_stub: "docs/sdd/010-stage-2-stub.md (placeholder for Stage 2 actual build-script PR)"

# ── E0797 — Stage Gate 5, foundation-complete (dump 280-283) — VERBATIM ──
stage_gate_5:
  name: "foundation-complete gate"
  scope: "operator reviews the full 10-PR arc holistically; Stage 2 (actual build scripts) authorized ONLY after this gate"
