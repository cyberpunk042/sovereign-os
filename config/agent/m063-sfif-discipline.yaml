  rule: "phase-to-phase transitions are operator-acknowledged"
cross_repo_applicability:
  module: M01069
  repos: [selfdef, "sovereign-os", "info-hub"]
  basis: "per 'second-brain knowledge'"
audit_trail:
  module: M01070
  rule: "every PR labeled with SFIF phase + IaC quality bar checklist passed"
  emits: "M049 trace + selfdef MS026 OCSF"
