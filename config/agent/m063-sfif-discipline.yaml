schema_version: "1.0.0"
milestone: M063
source_dump_lines: "389-396"

doctrinal_anchor: "SFIF discipline: the arc itself follows Scaffold -> Foundation -> Infrastructure -> Features. PRs 1-3 = Scaffold; PRs 4-8 = Foundation; PRs 9-10 begin Infrastructure; Stage 2 onwards delivers Infrastructure + Features"

# ── E0608-E0612 — the 5 SFIF phases mapped to PR ranges (M01054-M01058) — VERBATIM ──
sfif_phases:
  - {phase: 1, module: M01054, name: Scaffold, prs: "1-3",
     delivers: "repo genesis / architecture / docs pipeline"}
  - {phase: 2, module: M01055, name: Foundation, prs: "4-8",
     delivers: "substrate / profile schema / instances / whitelabel audit / whitelabel mechanism"}
  - {phase: 3, module: M01056, name: "Infrastructure begins", prs: "9-10",
     delivers: "TDD harness spec + scaffold"}
  - {phase: 4, module: M01057, name: "Infrastructure continues", prs: "Stage 2+",
     delivers: "build scripts / image generation / first installable artifact"}
  - {phase: 5, module: M01058, name: Features, prs: "Stage 3+",
     delivers: "actual OS features layer on infrastructure"}

# ── E0613/E0614 — IaC Quality Bar (M01060-M01068, dump 392-393) — VERBATIM ──
iac_quality_bar:
  module: M01060
  per_pr_checklist: [scripts, libs, configuration, "easily tweakable", customisable,
                     "env-var-driven", "restart-from-state"]
  pipeline_properties: [resumable, observable]
  doctrine: "Build pipeline is resumable + observable, not one-shot"

# ── E0615-E0617 — transition gates + cross-repo + audit trail (M01059/M01069/M01070) — VERBATIM ──
