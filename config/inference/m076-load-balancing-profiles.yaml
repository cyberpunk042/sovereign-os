# ── E0728-E0737 — the 3 load-balancing profiles (M01258/M01259/M01260) — VERBATIM ──
profiles:
  - id: 1
    module: M01258
    name: "Ultra-Sovereign Efficiency Mode"
    focus: "CPU Focused"
    purpose: "continuous background state monitoring + log auditing + autonomous maintenance (near-zero power draw)"
    allocation: "Conductor pinned to CPU cores 0-7, executes BitNet-b1.58-3B via bitnet.cpp; GPUs into low-power sleep states (nvidia-smi -pm 1, core clocks throttled); no scheduling across physical CCD boundary"
    orchestration: 'taskset -c 0-7 bitnet-cli -m ./models/bitnet_b1_58_3b/ggml-model-i2.gguf --threads 8 --memory-f32'

  - id: 2
    module: M01259
    name: "High-Concurrency Agent Burst Mode"
    focus: "Asymmetric Load Balancing"
    purpose: "multiple specialist sub-agents on an extensive code repository simultaneously"
    allocation: "conductor_01 (CPU cores 0-11, BitNet-b1.58-13B) + translator_01 (cuda:0 22GB, vllm-vulkan, Qwen-32B-Ternary-Quant) + deep_reasoner_01 (cuda:1 94GB, llama.cpp, DeepSeek-R1-Distill-Llama-70B-FP16)"
    strategy: "host CPU coordinates state tracking; workloads strictly distributed per VRAM + compute generation"

  - id: 3
    module: M01260
    name: "Deep Context Synthesis Mode"
    focus: "Unified Memory Span"
    purpose: "reading whole-system telemetry / parsing entire application source files"
    allocation: "layers 0-30 pinned to GPU 0 / layers 31-80 pinned to GPU 1 / KV Cache 4-bit width"
    strategy: "chain dual GPUs via unified memory OR optimized layer split maps; CPU runs streaming tokenizers only"
    orchestration: 'podman run --device nvidia.com/gpu=all ... --tensor-parallel-size 2 --pipeline-parallel-size 1 --gpu-memory-utilization 0.95 --kv-cache-dtype fp8'
