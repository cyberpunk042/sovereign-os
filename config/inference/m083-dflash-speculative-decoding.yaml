# config/inference/m083-dflash-speculative-decoding.yaml
# ============================================================================
# M083 "DFlash speculative decoding fast-path (task-type-gated 3x decode
# acceleration)" — the speculative-decoding CONTRACT. Materializes the milestone
# spec (backlog/milestones/M083-...; source raw/dumps/2026-05-15-sain-01-master-
# spec-...md lines 1115-1131 + SDD-026): the operator addition (E0798), the
# task-type-conditional gain (E0799), the introspection mandate (E0800), the gated
# wrapper (E0801), operator override knobs (E0802), per-backend integration
# (E0803), graceful degradation (E0804), Layer A/B observability (E0805), the
# router task-type signal (E0806), and Layer-5 validation (E0807). No invention —
# verbatim operator text preserved; cross-ref arXiv:2602.06036 (Z-Lab).
#
# Doctrinal anchor (dump 1119, operator verbatim): "And there is also Dflash I
# recently learned about that somehow with code task on model that fit in memory
# like any functional model in general it can work 3 times faster, does not work
# on creative tasks in general but interesting topic and place of introspection
# and knowledge". Cross-ref arXiv:2602.06036 "DFlash: Block Diffusion for Flash
# Speculative Decoding" — operator's "3x on code, not creative" matches the paper
# (highest gains on math/code, moderate on conversational). Ties: DFlash is a
# fast-path sibling of M073 ternary + M074 VNNI, layered on top of Pulse/Logic
# (M075); the router task-type signal is M057's Step 3/6; observability feeds M049.
# STATUS: spec-materialization (SDD+TDD — the DFlash task-type-gated fast path).
# Locked to spec by tests/lint/test_m083_dflash_speculative_decoding.py.
# Per operator §1g (sacrosanct): "We do not minimize anything."
# ============================================================================
schema_version: "1.0.0"
milestone: M083
source_dump_lines: "1115-1131"

# ── E0798/E0799 — operator addition + task-type gain (dump 1119) — VERBATIM ──
operator_text: "with code task on model that fit in memory like any functional model in general it can work 3 times faster, does not work on creative tasks in general but interesting topic and place of introspection and knowledge"
task_type_gain:
  module: M01396
  speedup: "3x on code (+math per paper)"
  does_not_work_on: "creative tasks"
paper_cross_ref: "arXiv:2602.06036 DFlash: Block Diffusion for Flash Speculative Decoding (Z-Lab)"

# ── E0800 — introspection mandate (M01411) — VERBATIM ──
introspection:
  module: M01411
  mandate: "the integration must surface its decision to the operator (operator's exact phrasing preserved in runtime decision reasons)"

# ── E0801 — gated wrapper (M01395) — VERBATIM ──
gated_wrapper:
  module: M01395
  script: "scripts/inference/dflash-wrap.sh"
  shape: "argv-prefix wrapper, gating BEFORE the backend sees argv"

# ── E0802 — operator override knobs (M01397) — VERBATIM ──
override_knobs:
  module: M01397
  enable: "DFLASH_ENABLE_OVERRIDE"
  disable: "DFLASH_DISABLE_OVERRIDE"
  precedence: "DISABLE wins when both set"

# ── E0803 — per-backend integration (M01398/M01399/M01400) — VERBATIM ──
backend_bindings:
  - {backend: vllm, module: M01398, argv: '--speculative-config ''{"method":"dflash",...}'''}
  - {backend: llama_cpp, module: M01399, argv: "--draft-model ${DFLASH_PATH}/draft.gguf"}
  - {backend: transformers, module: M01400, env: "PYTHONPATH=${DFLASH_PATH} generation strategy"}

# ── E0804 — graceful degradation (M01401) — VERBATIM ──
graceful_degradation:
  module: M01401
  rule: "absent install -> vanilla decoding + clearly-tagged downshift, never a hard failure"

# ── E0805 — Layer A/B observability (M01402/M01403) — VERBATIM ──
observability:
  layer_b_counters: {module: M01402, metric: "sovereign_os_dflash_*"}
  layer_a_journal: {module: M01403, sink: "journald decision+reason log (SDD-016 pipeline)"}

# ── E0806 — router task-type signal (M01404, R161) — VERBATIM ──
router_signal:
  module: M01404
  classifier: "classify_task_type"
  header: "X-Sovereign-Task-Type"

# ── E0807 — Layer-5 empirical validation (M01405, out-of-scope forward) — VERBATIM ──
layer5_validation:
  module: M01405
  scope: "benchmark the 3x claim on the operator's real code+math workload (hardware-required; catalogued forward)"

# ============================================================================
# DSpark — the DFlash SUCCESSOR (DeepSeek, open-sourced 2026-06-27). Operator
# directive (2026-07-13, verbatim): "search for Dspark from Deepseek online and
# we are going to implement that ... opt-in like we want everything but on by
# default for now and we find it a proper place an a panel, like for the LM
# Orchestrator Features GPUs section". DSpark is speculative decoding built
# DIRECTLY on DFlash: DFlash is DSpark's parallel draft BACKBONE; DSpark adds a
# lightweight sequential "Markov head" (a prefix-dependent bias added before
# sampling each drafted token, cutting suffix decay) + domain confidence
# thresholding, extending the gain from code/math to CHAT — and it is LOSSLESS
# (the whole draft block is verified in ONE target forward pass by rejection
# sampling, preserving the target model's output distribution EXACTLY). SAME
# lineage as M083 DFlash, modeled here as the DFlash fast-path's successor — NOT
# a separate milestone (M084-M086 are already claimed by unrelated milestones,
# and DFlash IS the backbone, so the honest home is right here).
#
# Sources (operator-required web citations, research 2026-07-13):
#   - marktechpost.com/2026/06/27/deepseek-releases-dspark-a-speculative-
#     decoding-framework-that-accelerates-deepseek-v4-per-user-generation-60-85-
#     over-mtp-1  (architecture: DFlash backbone + Markov head; DSpark-5;
#     rejection-sampling verify; 60-85% V4-Flash / 57-78% Pro; acceptance
#     45.7%->95.7% via confidence thresholding; DeepSpec MIT training codebase)
#   - venturebeat.com/orchestration/deepseek-open-sources-dspark-a-new-framework-
#     to-speed-up-llm-inference-by-up-to-85
#   - fullstack.com/labs/resources/blog/what-deepseeks-dspark-means-for-llm-performance
#   - medium.com/data-science-collective/deepseeks-dspark-the-breakthrough-that-
#     makes-llms-up-to-85-faster-without-a-new-model-868542e96c3d
# Per operator §1g (sacrosanct): "We do not minimize anything."
# ============================================================================
dspark:
  successor_to: M083                     # DFlash IS DSpark's draft backbone (same lineage)
  released: "2026-06-27"
  origin: "DeepSeek (open source); DeepSpec training+eval codebase is MIT-licensed (3 stages: data prep, training, evaluation; default 1 node x 8 GPUs)"
  operator_directive: "opt-in like we want everything but on by default for now ... a panel, like for the LM Orchestrator Features GPUs section"

  # ── the architecture (research-sourced) ──
  architecture:
    draft_backbone: "DFlash (M083) — parallel draft that emits base logits for every position in one pass"
    sequential_head: "lightweight Markov head — a prefix-dependent bias added before sampling each drafted token (cuts suffix decay)"
    verification: "the target model verifies the WHOLE draft block in ONE forward pass via rejection sampling"
    lossless: true                       # preserves the target model's output distribution EXACTLY
    production_config: "DSpark-5 — a 5-token draft block with the Markov head (the shipped default)"
    block_size_tested_up_to: 16          # 4->16 adds only 0.2-1.3% per-round latency
    confidence_thresholding: "domain confidence gate — raised chat acceptance 45.7% -> 95.7%"

  # ── measured gains over MTP-1 (research-sourced) ──
  speedup:
    v4_flash: "60-85% faster per-user generation"
    v4_pro: "57-78% faster per-user generation"
    vs_dflash_offline: "16-18% higher accepted length"
    note: "lossless — unlike quantization there is no quality trade to buy the speed"

  # ── the operator's toggle: OPT-IN but ON BY DEFAULT for now ──
  toggle:
    opt_in: true
    default_enabled: true                # "on by default for now" (operator, 2026-07-13)
    control: dspark-speculative-decoding # -> config/control-systems.yaml entry id
    rationale: "DSpark is lossless + confidence-gated, so — unlike DFlash which gates creative OFF — it defaults ON for ALL task types"

  # ── the gated wrapper (mirrors the DFlash argv-prefix shape) ──
  gated_wrapper:
    script: "scripts/inference/dspark-wrap.sh"
    shape: "argv-prefix wrapper, gating BEFORE the backend sees argv (DFlash-sibling); default-ON for every task type since DSpark is lossless"
    block_knob: "DSPARK_BLOCK (default 5 = DSpark-5)"

  # ── operator override knobs (DISABLE wins, mirrors DFlash) ──
  override_knobs:
    enable: "DSPARK_ENABLE_OVERRIDE"
    disable: "DSPARK_DISABLE_OVERRIDE"
    precedence: "DISABLE wins when both set"

  # ── per-backend integration (vLLM is the Oracle/Logic serving path) ──
  backend_bindings:
    - {backend: vllm, argv: '--speculative-config ''{"method":"dspark","num_speculative_tokens":5,...}'''}
    - {backend: llama_cpp, argv: "--draft-model ${DSPARK_PATH}/draft.gguf"}
    - {backend: transformers, env: "PYTHONPATH=${DSPARK_PATH} generation strategy"}

  # ── graceful degradation — never a hard failure ──
  graceful_degradation:
    rule: "absent DSpark install -> fall back to the DFlash draft (code/math) then vanilla decoding + a clearly-tagged downshift, never a hard failure"

  # ── observability (Layer B counters, DFlash-sibling namespace) ──
  observability:
    layer_b_counters: {metric: "sovereign_os_dspark_*", of: "decision, acceptance_rate, accepted_length, speedup"}
    layer_a_journal: {sink: "journald decision+reason log (SDD-016 pipeline)"}

  # ── where the draft runs (SRP topology + the incoming hardware change) ──
  placement:
    draft_tier: "Oracle Core (Blackwell PRO 6000) — vLLM + the DFlash backbone is already resident there (M075 SRP)"
    hardware_transition_2026_07: "RTX 5090 replaces the RTX 4090 (which becomes an EXTERNAL GPU) in ~2-3 days; the draft/scout can retarget the 5090 Logic tier once present"

  # ── the panel surface (operator's chosen home) ──
  panel_surface:
    dashboard: d-21-lm-orchestration
    section: "Features GPUs"
    endpoint: "/api/lm-orchestration/features (dspark block)"
