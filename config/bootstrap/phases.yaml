# config/bootstrap/phases.yaml — canonical master spec § 12 phase table (R202+R203).
#
# Single source of truth for the chronological 5-phase pipeline.
# Consumed by:
#   scripts/bootstrap/phases.sh  (R160 — inventory mode)
#   scripts/bootstrap/run.sh     (R201 — dry-run plan)
#   scripts/bootstrap/lib/render-phases-md.py  (R203 — doc generator)
#   tests/lint/test_bootstrap_phases_yaml.py   (R202 — schema lint)
#
# Each phase carries:
#   id              roman numeral I..V (verbatim from master spec § 12)
#   name            short summary used as the header
#   description     long-form spec reference
#   preconditions   what state must hold BEFORE this phase runs
#   postconditions  what state results AFTER this phase completes
#   artifacts       ordered list of repo-relative paths driving the phase
#
# The phase order is the chronological order operators MUST honor on a
# real SAIN-01 box: master spec § 12 "Each phase must be completed and
# validated before the downstream phase is initiated."
#
# Drift policy: when a phase's artifact set or pre/post-conditions
# change, edit THIS file only — every consumer re-parses on invocation,
# and the rendered docs/src/bootstrap-phases.md is regenerated by
# render-phases-md.py.

phases:
  - id: I
    name: Minimal Trixie Base
    description: Master spec § 12 Phase I — empty NVMe → debootstrap'd Trixie base
    preconditions:
      - SAIN-01 box powered on with a Trixie netinst USB / PXE source available
      - Both NVMe drives present and visible to UEFI (lsblk shows nvme0n1, nvme1n1)
      - Operator has reviewed config/preseed/sain-01.preseed.example.cfg
    postconditions:
      - Base Debian 13 (trixie) userspace installed on the EFI + root partitions
      - cloud-init has consumed the user-data and applied first-boot config
      - SSH access available; operator can drive subsequent phases remotely
    artifacts:
      - scripts/build/01-bootstrap-forge.sh
      - config/preseed/sain-01.preseed.example.cfg
      - config/cloud-init/sain-01.user-data.example.yaml

  - id: II
    name: Zen 5 Kernel Compilation
    description: Master spec § 12 Phase II + § 2 — kernel.org-stable, AVX-512 + Zen 5 tunings
    preconditions:
      - Phase I complete (Trixie base is the build host)
      - /mnt/kernel_forge (≥ 64 GiB tmpfs) mounted by 01-bootstrap-forge.sh
      - GCC 14 + build toolchain installed
    postconditions:
      - Custom kernel .deb packages present under /var/cache/kernel-forge/
      - Kernel signed if profile.kernel.signing enabled (SDD-015 posture honored)
      - inputs_hash recorded in build-state.yaml for SDD-019 reproducibility
    artifacts:
      - scripts/build/02-kernel-fetch.sh
      - scripts/build/03-kernel-config.sh
      - scripts/build/04-kernel-compile.sh

  - id: III
    name: Storage Layer + DKMS (ZFS)
    description: Master spec § 12 Phase III + §§ 3, 4.1 — ZFS native tank pool + tiered datasets
    preconditions:
      - Phase II kernel installed and booted
      - ZFS DKMS module compiles cleanly against the new kernel
      - Operator has acknowledged the NVMe wipe (raid0 is destructive)
    postconditions:
      - tank pool active across both NVMe drives
      - 3 tiered datasets mounted (state-fabric, ai-workspace, scratch) with recordsize/compression per SDD-017
      - ARC max clamped per profile; nightly scrub timer enabled
    artifacts:
      - scripts/hooks/during-install/zfs-pool-create.sh
      - scripts/hooks/during-install/zfs-datasets-create.sh
      - scripts/hooks/post-install/zfs-arc-clamp.sh
      - scripts/hooks/recurrent/zfs-scrub.sh
      - systemd/system/sovereign-zfs-arc-clamp.service
      - systemd/system/sovereign-zfs-scrub.service
      - systemd/system/sovereign-zfs-scrub.timer

  - id: IV
    name: Container + Network Edge Isolation
    description: Master spec § 12 Phase IV + §§ 4.3, 8 — Podman, VFIO 4090 detach, asymmetric net
    preconditions:
      - Phase III complete (tank pool hosts the container storage driver)
      - IOMMU enabled in UEFI (intel_iommu / amd_iommu kernel cmdline)
      - 4090 PCI ID identified for vfio-pci binding
    postconditions:
      - 4090 detached from nouveau/nvidia, bound to vfio-pci for guest passthrough
      - PRO 6000 owned by host nvidia driver
      - Asymmetric network rendered (data vs control plane on separate VLANs)
      - Podman storage driver pointed at the tank ai-workspace dataset
    artifacts:
      - scripts/hooks/post-install/vfio-bind-4090.sh
      - scripts/hooks/post-install/network-vlan-config.sh
      - scripts/network/render-asymmetric.sh
      - systemd/system/sovereign-vfio-bind.service
      - systemd/system/sovereign-network-vlan.service
      - systemd/system/sovereign-nvidia-driver-bind.service

  - id: V
    name: Tetragon eBPF + Guardian + State Fabric Mount
    description: Master spec § 12 Phase V + §§ 5, 6, 10, 21 — kernel BPF, guardian, atomic state
    preconditions:
      - Phase IV complete (network + GPU isolation enforced)
      - bpf() syscall enabled; CAP_BPF available in the policy-loader unit
      - operator-signed tetragon policy present in /etc/sovereign/tetragon/
    postconditions:
      - Tetragon kernel BPF policies loaded; sovereign-os events flowing to journal
      - sovereign-guardian-core service running; auditing observed in JSONL log
      - State fabric (state-fabric ZFS dataset) mounted with copies=2 redundancy
      - System reaches master spec § 22 lock-state (verify.sh exits 0)
    artifacts:
      - scripts/hooks/post-install/tetragon-policy-load.sh
      - scripts/hooks/recurrent/tetragon-policy-verify.sh
      - scripts/auditor/guardian-core.py
      - systemd/system/sovereign-guardian-core.service
      - systemd/system/sovereign-tetragon-policy-load.service
      - scripts/weaver/atomic-state.py
