#### sovereign-os debian-installer preseed — SAIN-01 profile
####
#### For operators using a debian-installer-based install path
#### (alternative to cloud-init NoCloud). Provide on the install media
#### or via auto-install kernel cmdline.
####
#### Usage with debian-installer:
####   - Place this file at /preseed/sain-01.cfg on the install media
####   - Boot installer with: auto url=file:///preseed/sain-01.cfg
####
#### See https://www.debian.org/releases/stable/amd64/apb.en.html for
#### the canonical Debian preseed reference.

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i debian-installer/clock-setup/utc boolean true
d-i time/zone string Etc/UTC

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string sain-01
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account setup
# operator account; SSH-key-only by default (lock password)
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Operator
d-i passwd/username string operator
d-i passwd/user-password password REPLACE-WITH-INITIAL-PASSWORD
d-i passwd/user-password-again password REPLACE-WITH-INITIAL-PASSWORD
d-i user-setup/allow-password-weak boolean false
d-i user-setup/encrypt-home boolean false

### Partitioning
# For SAIN-01: dual NVMe ZFS RAID 0; preseed handles only ESP + root
# placeholder. The during-install hook `zfs-pool-create.sh` does the
# real pool setup post-installation.
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/nvme0n1
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/expert_recipe string                         \
      sovereign-minimal ::                                    \
              512 512 512 fat32                               \
                      $primary{ } $bootable{ }                \
                      method{ efi } format{ }                 \
              .                                               \
              8192 65536 -1 ext4                              \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Apt setup
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/use_mirror boolean true
d-i apt-setup/enable-source-repositories boolean false

### Package selection
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server sudo tmux curl git python3-minimal python3-pip htop jq ca-certificates
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/nvme0n1

### Finishing up the installation
d-i finish-install/reboot_in_progress note

### Post-install commands (in-target)
# Drop a sovereign-os profile marker so first-boot ConditionFirstBoot=yes
# services pick the right profile.
d-i preseed/late_command string \
    in-target mkdir -p /etc/sovereign-os; \
    in-target sh -c 'echo "SOVEREIGN_OS_PROFILE=sain-01" > /etc/sovereign-os/active-profile.env'; \
    in-target sh -c 'echo "sain-01" > /etc/sovereign-os/active-profile'; \
    in-target sh -c 'echo "default" > /etc/sovereign-os/active-whitelabel'; \
    in-target systemctl enable sovereign-firstboot.target
