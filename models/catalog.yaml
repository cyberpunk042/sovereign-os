# sovereign-os model catalog.
#
# Canonical declaration of the models this system intends to host across
# The Genesis Trinity (master spec § 17: Pulse · Logic · Oracle). Bound
# to the three runtime profiles (master spec § 18).
#
# Status conventions (schemas/model-catalog.schema.yaml):
#   verified-real        — hf_repo_id confirmed live on HF Hub at L0 ingest
#                           (operator-verifiable; see info-hub raw/notes)
#   aspirational         — master spec names this; no real HF repo yet.
#                           closest_real_alternative is the operator's
#                           current best substitute.
#   operator-must-confirm — candidate; operator hasn't decided.
#
# Operator command surface:
#   scripts/models/pull.sh    — download a model (or all)
#   scripts/models/verify.sh  — verify resident matches catalog
#
# Schema: schemas/model-catalog.schema.yaml

schema_version: "1.0.0"

catalog:
  version: "1.0.0"
  description: |
    Canonical model catalog for sovereign-os Genesis Trinity (master
    spec § 17). 8 models declared across pulse/logic/oracle tiers.
    Verified-real entries cross-checked at L0 ingest 2026-05-15 against
    HuggingFace Hub.

  models:

    # ---------- Pulse tier (master spec § 17.1 Vector Core) ----------

    - id: BitNet-b1.58-2B-4T
      tier: pulse
      engine: bitnet.cpp
      status: verified-real
      license: mit
      hf_repo_id: microsoft/bitnet-b1.58-2B-4T
      parameters_millions: 849.8
      master_spec_section: "§ 15, § 16, § 20"
      runtime_profile_bindings: []  # default fetch target; not pinned by profile
      operator_note: |
        Pulled by scripts/pulse/build-bitnet.sh as BITNET_MODEL_REPO
        default. The actual Microsoft BitNet release that exists on HF
        today (Dec 2025 update, 850M params trained on 4T tokens).

    - id: BitNet-b1.58-3B
      tier: pulse
      engine: bitnet.cpp
      status: aspirational
      license: mit
      closest_real_alternative: microsoft/bitnet-b1.58-2B-4T
      master_spec_section: "§ 18.1 (ultra-sovereign-efficiency conductor)"
      runtime_profile_bindings: [ultra-sovereign-efficiency]
      operator_note: |
        Master spec § 18.1 names BitNet-b1.58-3B for the
        ultra-sovereign-efficiency profile. No 3B BitNet release on HF
        as of L0 ingest 2026-05-15. Operator substitutes the real
        microsoft/bitnet-b1.58-2B-4T until upstream ships a 3B variant.

    - id: BitNet-b1.58-13B
      tier: pulse
      engine: bitnet.cpp
      status: aspirational
      license: mit
      closest_real_alternative: microsoft/bitnet-b1.58-2B-4T
      master_spec_section: "§ 18.2 (high-concurrency-burst conductor_01)"
      runtime_profile_bindings: [high-concurrency-burst]
      operator_note: |
        Master spec § 18.2 names BitNet-b1.58-13B for the conductor in
        the high-concurrency-burst profile. No 13B BitNet release on HF
        as of L0 ingest 2026-05-15. Operator substitutes 2B-4T as the
        fallback or waits for upstream.

    # ---------- Logic tier (master spec § 17.2 Sandboxed Fabric) ----------

    - id: Qwen-32B-Ternary-Quant
      tier: logic
      engine: vllm-vulkan
      status: aspirational
      license: apache-2.0
      closest_real_alternative: Qwen/Qwen2.5-32B-Instruct-AWQ
      parameters_millions: 32500
      master_spec_section: "§ 18.2 (high-concurrency-burst translator_01)"
      runtime_profile_bindings: [high-concurrency-burst]
      operator_note: |
        Master spec § 18.2 names Qwen-32B-Ternary-Quant. No
        ternary-quantized 32B Qwen on HF as of L0 ingest 2026-05-15.
        Closest real is Qwen/Qwen2.5-32B-Instruct-AWQ (1.2M downloads,
        Apache-2.0, 4-bit AWQ — not ternary but the closest available
        compressed variant; vllm-vulkan engine compatible).

    # ---------- Oracle tier (master spec § 17.3 high-VRAM reasoning) ----------

    - id: DeepSeek-R1-Distill-Llama-70B-FP16
      tier: oracle
      engine: llama.cpp
      status: verified-real
      license: mit
      hf_repo_id: deepseek-ai/DeepSeek-R1-Distill-Llama-70B
      parameters_millions: 70553.7
      master_spec_section: "§ 18.2 (high-concurrency-burst deep_reasoner_01)"
      runtime_profile_bindings: [high-concurrency-burst]
      operator_note: |
        Real HF release. Master spec specifies the FP16 variant; HF
        ships base safetensors that the operator runs through
        llama.cpp's quantizer to land FP16 .gguf on /mnt/vault/models/.

    - id: DeepSeek-V3-Quant
      tier: oracle
      engine: vllm
      status: verified-real
      license: other  # DeepSeek custom license per upstream
      hf_repo_id: deepseek-ai/DeepSeek-V3
      parameters_millions: 684531.4
      master_spec_section: "§ 18.3 (deep-context-synthesis synthesizer_01)"
      runtime_profile_bindings: [deep-context-synthesis]
      operator_note: |
        Master spec § 18.3 runs this with --tensor-parallel-size 2
        --kv-cache-dtype fp8 across both GPUs (RTX PRO 6000 + RTX 3090).
        Master spec specifies the "Quant" variant; upstream ships FP8
        weights natively on the V3 repo (see repo tags fp8 + Q4/Q8
        community quants).

    # ---------- Oracle tier — operator-added (HF dump L0 ingest) ----------

    - id: Ling-2.6-flash
      tier: oracle
      engine: vllm
      status: verified-real
      license: mit
      hf_repo_id: inclusionAI/Ling-2.6-flash
      parameters_millions: 107494.4
      master_spec_section: "Block 7 (operator addition — RTX PRO 6000 candidate)"
      runtime_profile_bindings: []  # operator-allocated at runtime
      operator_note: |
        Operator-flagged candidate for RTX PRO 6000 96GB hosting.
        bailing_hybrid architecture. Confirmed real on HF Hub at L0
        ingest 2026-05-15.

    - id: Nemotron-3-Nano-Omni-30B-Reasoning-BF16
      tier: oracle
      engine: transformers
      status: verified-real
      license: other  # nvidia license per HF metadata
      hf_repo_id: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16
      parameters_millions: 33015.6
      master_spec_section: "Block 7 (operator addition — multimodal RTX PRO 6000 candidate)"
      runtime_profile_bindings: []  # operator-allocated at runtime
      operator_note: |
        Operator-flagged candidate. Multimodal (any-to-any).
        NemotronH_Nano_Omni_Reasoning_V3 architecture. Confirmed real
        on HF Hub at L0 ingest 2026-05-15.
