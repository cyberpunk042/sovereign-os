# sovereign-os model catalog.
#
# Canonical declaration of the models this system intends to host across
# The Genesis Trinity (master spec § 17: Pulse · Logic · Oracle). Bound
# to the three runtime profiles (master spec § 18).
#
# R212 EXTENDED (schema 1.0.0 → 1.1.0) — per operator directive
# verbatim ("all the best selection of models adapted for various size
# and at various quantization or for various specific purpose"). Each
# entry now carries:
#   - class            — LLM / SLM / RLM / TernaryLM / LoRA / Embed …
#   - quantization     — fp16 / bf16 / fp8 / int4 / ternary-1.58bit …
#   - size_class       — xs / s / m / l / xl / xxl
#   - purpose          — chat / reasoning / code / multimodal / agent …
#   - vram_gib_min     — quantization-aware minimum VRAM
#   - context_window_tokens — max context window
#   - base_model       — required when class=lora-adapter
#
# Status conventions:
#   verified-real        — hf_repo_id confirmed live on HF Hub at L0 ingest
#   aspirational         — master spec names this; no real HF repo yet
#                          (closest_real_alternative is the operator
#                          substitute)
#   operator-must-confirm — candidate; operator hasn't decided
#
# Operator command surface:
#   scripts/models/pull.sh                — download a model (or all)
#   scripts/models/verify.sh              — verify resident matches catalog
#   scripts/models/render-catalog-md.py   — regenerate docs/src/model-catalog.md
#   sovereign-osctl models {list,pull,verify,size,remove,docs}
#
# Schema: schemas/model-catalog.schema.yaml

schema_version: "1.1.0"

catalog:
  version: "1.1.0"
  description: |
    Canonical model catalog for sovereign-os Genesis Trinity (master
    spec § 17) — R212 expansion. Now spans the full taxonomy
    operators care about: model class (LLM / SLM / RLM / TernaryLM /
    LoRA / Embed / Vision / Multimodal / Code / Mixture /
    Speculative / Reranker) × quantization × size_class × purpose.
    Verified-real entries cross-checked at L0 ingest.

  models:

