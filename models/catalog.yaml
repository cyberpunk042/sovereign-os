      vram_gib_min: 10
      context_window_tokens: 4096
      master_spec_section: "§ 18.2 (high-concurrency-burst conductor_01)"
      runtime_profile_bindings: [high-concurrency-burst]
      operator_note: |
        Master spec § 18.2 names BitNet-b1.58-13B. Waiting on upstream.

