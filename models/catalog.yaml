    # ============================================================

    - id: BitNet-b1.58-2B-4T
      tier: pulse
      engine: bitnet.cpp
      class: ternary-lm
      quantization: ternary-1.58bit
      size_class: s
      purpose: [chat, agent]
      status: verified-real
      license: mit
      hf_repo_id: microsoft/bitnet-b1.58-2B-4T
      parameters_millions: 849.8
      vram_gib_min: 1.5
      context_window_tokens: 4096
      master_spec_section: "§ 15, § 16, § 20"
      runtime_profile_bindings: []
      operator_note: |
        Pulled by scripts/pulse/build-bitnet.sh as BITNET_MODEL_REPO
        default. The actual Microsoft BitNet release that exists on HF
        today (Dec 2025 update, 850M params trained on 4T tokens).
        SD-R64 ternary_aot_capable predicate gates this onto AVX-512
        VNNI hosts (single-cycle 64×INT8 per ZMM register).

    - id: BitNet-b1.58-3B
      tier: pulse
